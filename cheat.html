<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheat Sheet Generator</title>
    <link rel="icon" type="image/png" href="Smart Study.jpeg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/katex/0.16.8/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/katex/0.16.8/contrib/auto-render.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/katex/0.16.8/katex.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 600px;
        }

        .upload-section {
            padding: 40px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
        }

        .preview-section {
            padding: 40px;
            background: white;
        }

        .upload-area {
            border: 3px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #4f46e5;
            background: rgba(79, 70, 229, 0.05);
        }

        .upload-area.dragover {
            border-color: #4f46e5;
            background: rgba(79, 70, 229, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            color: #64748b;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.1rem;
            color: #475569;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        #fileInput {
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        select, input {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin: 10px 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .btn-secondary:hover {
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f46e5, #7c3aed);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 500;
            display: none;
        }

        .status-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .status-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .status-info {
            background: #dbeafe;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }

        .cheat-sheet-preview {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            min-height: 400px;
            padding: 20px;
            font-family: 'Times New Roman', serif;
            line-height: 1.4;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .cheat-sheet-preview h1 {
            color: #1f2937;
            border-bottom: 3px solid #4f46e5;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .cheat-sheet-preview h2 {
            color: #374151;
            margin-top: 25px;
            margin-bottom: 15px;
            padding: 8px 12px;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            border-left: 4px solid #4f46e5;
            font-size: 1.3rem;
        }

        .cheat-sheet-preview h3 {
            color: #4b5563;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .cheat-sheet-preview ul, .cheat-sheet-preview ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .cheat-sheet-preview li {
            margin-bottom: 5px;
        }

        .cheat-sheet-preview pre {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 12px;
            margin: 15px 0;
            font-size: 0.9rem;
            overflow-x: auto;
        }

        .cheat-sheet-preview code {
            background: #f1f5f9;
            color: #dc2626;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .cheat-sheet-preview pre code {
            background: none;
            color: inherit;
            padding: 0;
        }

        .math-expression {
            margin: 10px 0;
            text-align: center;
        }

        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 60px 20px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .upload-section {
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
        }

        @page {
            margin: 0.5in;
            size: letter;
        }

        @media print {
            body { 
                background: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                background: white;
            }
            .header, .upload-section {
                display: none;
            }
            .main-content {
                grid-template-columns: 1fr;
            }
            .preview-section {
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Cheat Sheet Generator</h1>
            <p>Upload your PDF and get a concise, printable study guide powered by AI</p>
        </div>
        
        <div class="main-content">
            <div class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">Click to upload or drag & drop your PDF</div>
                    <div class="upload-hint">Maximum file size: 10MB</div>
                    <input type="file" id="fileInput" accept=".pdf" />
                </div>
                
                <div class="controls">
                    <div class="form-group">
                        <label for="language">Target Language</label>
                        <select id="language">
                            <option value="en">English</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                            <option value="de">German</option>
                            <option value="zh">Chinese</option>
                            <option value="ja">Japanese</option>
                            <option value="ko">Korean</option>
                            <option value="hi">Hindi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="focusArea">Focus Area</label>
                        <select id="focusArea">
                            <option value="general">General Overview</option>
                            <option value="formulas">Formulas & Equations</option>
                            <option value="definitions">Key Definitions</option>
                            <option value="examples">Code Examples</option>
                            <option value="concepts">Main Concepts</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="customPrompt">Additional Instructions (Optional)</label>
                    <input type="text" id="customPrompt" placeholder="e.g., Focus on chapter 3, include more examples..." />
                </div>
                
                <button class="btn" id="generateBtn" disabled>
                    ✨ Generate Cheat Sheet
                </button>
                <button class="btn btn-secondary" id="exportBtn" disabled>
                    📥 Export PDF
                </button>
                <button class="btn btn-secondary" id="printBtn" disabled style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                    🖨️ Print
                </button>
                
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                
                <div class="loading-spinner"></div>
                <div class="status-message"></div>
            </div>
            
            <div class="preview-section">
                <div class="cheat-sheet-preview" id="cheatSheetPreview">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
                        </svg>
                        <h3>Your cheat sheet will appear here</h3>
                        <p>Upload a PDF and click "Generate Cheat Sheet" to get started</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class CheatSheetGenerator {
            constructor() {
                this.apiKey = 'AIzaSyAM1p730RTRu40S1sHghd1KD4501K6iCsI';
                this.pdfContent = '';
                this.generatedContent = '';
                this.initializeEventListeners();
                this.setupPdfJs();
            }

            setupPdfJs() {
                if (typeof pdfjsLib !== 'undefined') {
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                }
            }

            initializeEventListeners() {
                const uploadArea = document.getElementById('uploadArea');
                const fileInput = document.getElementById('fileInput');
                const generateBtn = document.getElementById('generateBtn');
                const exportBtn = document.getElementById('exportBtn');
                const printBtn = document.getElementById('printBtn');

                // File upload events
                uploadArea.addEventListener('click', () => fileInput.click());
                uploadArea.addEventListener('dragover', this.handleDragOver.bind(this));
                uploadArea.addEventListener('drop', this.handleDrop.bind(this));
                uploadArea.addEventListener('dragleave', this.handleDragLeave.bind(this));
                fileInput.addEventListener('change', this.handleFileSelect.bind(this));

                // Button events
                generateBtn.addEventListener('click', this.generateCheatSheet.bind(this));
                exportBtn.addEventListener('click', this.exportToPDF.bind(this));
                printBtn.addEventListener('click', this.printCheatSheet.bind(this));
            }

            handleDragOver(e) {
                e.preventDefault();
                document.getElementById('uploadArea').classList.add('dragover');
            }

            handleDragLeave(e) {
                e.preventDefault();
                document.getElementById('uploadArea').classList.remove('dragover');
            }

            handleDrop(e) {
                e.preventDefault();
                document.getElementById('uploadArea').classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    this.processFile(files[0]);
                }
            }

            handleFileSelect(e) {
                const file = e.target.files[0];
                if (file) {
                    this.processFile(file);
                }
            }

            async processFile(file) {
                if (file.type !== 'application/pdf') {
                    this.showStatus('Please select a PDF file.', 'error');
                    return;
                }

                if (file.size > 10 * 1024 * 1024) {
                    this.showStatus('File size must be less than 10MB.', 'error');
                    return;
                }

                this.showProgress(true);
                this.showStatus('Processing PDF...', 'info');

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                    let fullText = '';

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        fullText += pageText + '\n\n';
                        
                        this.updateProgress((i / pdf.numPages) * 100);
                    }

                    this.pdfContent = fullText.trim();
                    this.showStatus(`PDF processed successfully! ${pdf.numPages} pages extracted.`, 'success');
                    document.getElementById('generateBtn').disabled = false;
                    
                } catch (error) {
                    console.error('Error processing PDF:', error);
                    this.showStatus('Error processing PDF. Please try another file.', 'error');
                } finally {
                    this.showProgress(false);
                }
            }

            async generateCheatSheet() {
                if (!this.pdfContent) {
                    this.showStatus('Please upload a PDF first.', 'error');
                    return;
                }

                const language = document.getElementById('language').value;
                const focusArea = document.getElementById('focusArea').value;
                const customPrompt = document.getElementById('customPrompt').value;

                this.showStatus('Generating cheat sheet with AI...', 'info');
                this.showSpinner(true);
                document.getElementById('generateBtn').disabled = true;

                try {
                    const prompt = this.buildPrompt(language, focusArea, customPrompt);
                    const response = await this.callGeminiAPI(prompt);
                    
                    this.generatedContent = response;
                    this.renderCheatSheet(response);
                    this.showStatus('Cheat sheet generated successfully!', 'success');
                    document.getElementById('exportBtn').disabled = false;
                    document.getElementById('printBtn').disabled = false;
                    
                } catch (error) {
                    console.error('Error generating cheat sheet:', error);
                    this.showStatus('Error generating cheat sheet. Please try again.', 'error');
                } finally {
                    this.showSpinner(false);
                    document.getElementById('generateBtn').disabled = false;
                }
            }

            buildPrompt(language, focusArea, customPrompt) {
                const languageMap = {
                    'en': 'English',
                    'es': 'Spanish',
                    'fr': 'French',
                    'de': 'German',
                    'zh': 'Chinese',
                    'ja': 'Japanese',
                    'ko': 'Korean',
                    'hi': 'Hindi'
                };

                const focusMap = {
                    'general': 'Provide a comprehensive overview of all major topics',
                    'formulas': 'Focus heavily on mathematical formulas, equations, and calculations',
                    'definitions': 'Emphasize key definitions, terms, and concepts',
                    'examples': 'Include plenty of code examples and practical implementations',
                    'concepts': 'Focus on core concepts and theoretical frameworks'
                };

                let prompt = `Create a comprehensive, well-structured cheat sheet from the following PDF content. 

Requirements:
- Language: ${languageMap[language]}
- Focus: ${focusMap[focusArea]}
- Format: Use clear headings, bullet points, and organize information logically
- Length: Fit on one printable page (concise but complete)
- Include: Key concepts, important formulas/code, essential definitions
- Style: Academic but accessible, suitable for quick reference during study

${customPrompt ? `Additional instructions: ${customPrompt}` : ''}

Format the response in markdown with:
- Clear hierarchical headings (# ## ###)
- Bullet points for lists
- Code blocks for programming content (\`\`\`language)
- Math expressions in LaTeX format ($$formula$$)
- Bold for key terms (**term**)

PDF Content:
${this.pdfContent.substring(0, 15000)}`;

                return prompt;
            }

            async callGeminiAPI(prompt) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 2048,
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`API request failed: ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
                    throw new Error('Invalid response from API');
                }

                return data.candidates[0].content.parts[0].text;
            }

            renderCheatSheet(content) {
                const preview = document.getElementById('cheatSheetPreview');
                
                // Convert markdown to HTML
                let html = marked.parse(content);
                
                // Render math expressions
                html = html.replace(/\$\$(.*?)\$\$/g, (match, formula) => {
                    try {
                        return katex.renderToString(formula, { displayMode: true });
                    } catch (e) {
                        return `<div class="math-expression">$$${formula}$$</div>`;
                    }
                });

                html = html.replace(/\$(.*?)\$/g, (match, formula) => {
                    try {
                        return katex.renderToString(formula, { displayMode: false });
                    } catch (e) {
                        return `$${formula}$`;
                    }
                });

                preview.innerHTML = html;
                
                // Apply syntax highlighting
                Prism.highlightAllUnder(preview);
            }

            async exportToPDF() {
                if (!this.generatedContent) {
                    this.showStatus('No content to export. Generate a cheat sheet first.', 'error');
                    return;
                }

                this.showStatus('Generating PDF...', 'info');
                
                try {
                    const element = document.getElementById('cheatSheetPreview');
                    
                    // Ensure element is visible and has content
                    if (!element || !element.innerHTML.trim()) {
                        throw new Error('No content to export');
                    }

                    // Wait a moment for any rendering to complete
                    await new Promise(resolve => setTimeout(resolve, 500));

                    const canvas = await html2canvas(element, {
                        scale: 1.5,
                        useCORS: true,
                        allowTaint: true,
                        logging: false,
                        backgroundColor: '#ffffff',
                        width: element.scrollWidth,
                        height: element.scrollHeight
                    });

                    if (!canvas || canvas.width === 0 || canvas.height === 0) {
                        throw new Error('Failed to capture content');
                    }

                    const imgData = canvas.toDataURL('image/png', 0.95);
                    
                    // Initialize jsPDF
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: 'a4'
                    });
                    
                    const pageWidth = pdf.internal.pageSize.getWidth();
                    const pageHeight = pdf.internal.pageSize.getHeight();
                    const margin = 10;
                    const imgWidth = pageWidth - (margin * 2);
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;

                    let y = margin;
                    let remainingHeight = imgHeight;

                    // Add image to PDF, splitting across pages if necessary
                    while (remainingHeight > 0) {
                        const availableHeight = pageHeight - margin * 2;
                        const currentHeight = Math.min(remainingHeight, availableHeight);
                        
                        const sourceY = imgHeight - remainingHeight;
                        const sourceHeight = (currentHeight * canvas.height) / imgHeight;
                        
                        // Create a temporary canvas for this section
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = canvas.width;
                        tempCanvas.height = sourceHeight;
                        
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(
                            canvas,
                            0, sourceY * canvas.height / imgHeight,
                            canvas.width, sourceHeight,
                            0, 0,
                            canvas.width, sourceHeight
                        );
                        
                        const tempImgData = tempCanvas.toDataURL('image/png', 0.95);
                        
                        pdf.addImage(tempImgData, 'PNG', margin, y, imgWidth, currentHeight);
                        
                        remainingHeight -= currentHeight;
                        
                        if (remainingHeight > 0) {
                            pdf.addPage();
                            y = margin;
                        }
                    }

                    // Generate filename with timestamp
                    const timestamp = new Date().toISOString().slice(0, 19).replace(/[:.]/g, '-');
                    const filename = `cheat-sheet-${timestamp}.pdf`;
                    
                    pdf.save(filename);
                    this.showStatus('PDF exported successfully!', 'success');
                    
                } catch (error) {
                    console.error('Error exporting PDF:', error);
                    this.showStatus(`Export failed: ${error.message}. Try using Ctrl+P to print instead.`, 'error');
                    
                    // Fallback: offer browser print
                    setTimeout(() => {
                        if (confirm('PDF export failed. Would you like to use browser print instead?')) {
                            window.print();
                        }
                    }, 2000);
                }
            }

            printCheatSheet() {
                if (!this.generatedContent) {
                    this.showStatus('No content to print. Generate a cheat sheet first.', 'error');
                    return;
                }
                
                // Hide non-essential elements for printing
                const sections = document.querySelectorAll('.upload-section, .header');
                sections.forEach(section => section.style.display = 'none');
                
                window.print();
                
                // Restore elements after printing
                setTimeout(() => {
                    sections.forEach(section => section.style.display = '');
                }, 100);
            }

            // Alternative simple PDF export using browser's print-to-PDF
            async exportSimplePDF() {
                if (!this.generatedContent) {
                    this.showStatus('No content to export. Generate a cheat sheet first.', 'error');
                    return;
                }

                this.showStatus('Opening print dialog for PDF export...', 'info');
                
                try {
                    // Create a new window with just the cheat sheet content
                    const printWindow = window.open('', '_blank', 'width=800,height=600');
                    const content = document.getElementById('cheatSheetPreview').innerHTML;
                    
                    printWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>Cheat Sheet</title>
                            <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet">
                            <link href="https://cdnjs.cloudflare.com/ajax/libs/katex/0.16.8/katex.min.css" rel="stylesheet">
                            <style>
                                body { 
                                    font-family: 'Times New Roman', serif; 
                                    line-height: 1.4; 
                                    padding: 20px; 
                                    max-width: 800px; 
                                    margin: 0 auto;
                                }
                                h1 { color: #1f2937; border-bottom: 3px solid #4f46e5; padding-bottom: 10px; }
                                h2 { color: #374151; margin-top: 25px; background: #f3f4f6; padding: 8px 12px; border-left: 4px solid #4f46e5; }
                                pre { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 6px; }
                                code { background: #f1f5f9; color: #dc2626; padding: 2px 6px; border-radius: 4px; }
                                @media print { body { padding: 10px; } }
                            </style>
                        </head>
                        <body>
                            ${content}
                        </body>
                        </html>
                    `);
                    
                    printWindow.document.close();
                    
                    // Wait for content to load then trigger print
                    setTimeout(() => {
                        printWindow.print();
                        setTimeout(() => printWindow.close(), 1000);
                    }, 500);
                    
                } catch (error) {
                    console.error('Error with simple PDF export:', error);
                    this.showStatus('Export failed. Please try using Ctrl+P to print.', 'error');
                }
            }

            showStatus(message, type) {
                const statusEl = document.querySelector('.status-message');
                statusEl.textContent = message;
                statusEl.className = `status-message status-${type}`;
                statusEl.style.display = 'block';
                
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 5000);
            }

            showProgress(show) {
                const progressBar = document.querySelector('.progress-bar');
                progressBar.style.display = show ? 'block' : 'none';
                if (!show) {
                    this.updateProgress(0);
                }
            }

            updateProgress(percent) {
                const progressFill = document.querySelector('.progress-fill');
                progressFill.style.width = `${percent}%`;
            }

            showSpinner(show) {
                const spinner = document.querySelector('.loading-spinner');
                spinner.style.display = show ? 'block' : 'none';
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            new CheatSheetGenerator();
        });
    </script>
</body>
</html>
