<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whizan - Cheat Sheet Generator</title>
    <link rel="icon" type="image/png" href="smart study.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/katex/0.16.8/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/katex/0.16.8/contrib/auto-render.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-dark.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/katex/0.16.8/katex.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0 50%; }
        }

        .app-header {
            background: linear-gradient(135deg, #1a1a1a, #000000);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .app-logo {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .app-title {
            flex: 1;
        }

        .app-title h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #8a2be2, #ff6b6b, #4ecdc4);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGradient 3s ease infinite;
        }

        @keyframes textGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-title p {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .container {
            padding: 20px;
            max-width: 100%;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .upload-section {
            background: rgba(26, 26, 26, 0.8);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            animation: cardSlide 0.6s ease;
        }

        @keyframes cardSlide {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #8a2be2;
            background: rgba(138, 43, 226, 0.1);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3);
        }

        .upload-icon {
            font-size: 3rem;
            color: #8a2be2;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .upload-text {
            font-size: 16px;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .upload-hint {
            font-size: 12px;
            color: #888;
        }

        #fileInput {
            display: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input {
            padding: 15px;
            border: 1px solid #444;
            border-radius: 12px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #8a2be2;
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.2);
            transform: translateY(-2px);
        }

        .btn {
            background: linear-gradient(135deg, #8a2be2, #ff6b6b);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 8px 0;
            box-shadow: 0 8px 25px rgba(138, 43, 226, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(138, 43, 226, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        }

        .btn-secondary:hover {
            box-shadow: 0 12px 35px rgba(78, 205, 196, 0.4);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(68, 68, 68, 0.3);
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8a2be2, #ff6b6b);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
            animation: progressGlow 2s ease infinite;
        }

        @keyframes progressGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(138, 43, 226, 0.5); }
            50% { box-shadow: 0 0 20px rgba(138, 43, 226, 0.8); }
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 10px;
            margin: 15px 0;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .status-success {
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }

        .status-error {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .status-info {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border: 1px solid #3498db;
        }

        .preview-section {
            background: rgba(26, 26, 26, 0.8);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            animation: cardSlide 0.8s ease;
            animation-delay: 0.2s;
            animation-fill-mode: both;
        }

        .cheat-sheet-preview {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            min-height: 300px;
            padding: 20px;
            font-family: 'Times New Roman', serif;
            line-height: 1.5;
            border: 1px solid #444;
            color: #fff;
        }

        .cheat-sheet-preview h1 {
            color: #8a2be2;
            border-bottom: 2px solid #8a2be2;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.6rem;
        }

        .cheat-sheet-preview h2 {
            color: #ff6b6b;
            margin-top: 25px;
            margin-bottom: 15px;
            padding: 8px 12px;
            background: rgba(255, 107, 107, 0.1);
            border-left: 4px solid #ff6b6b;
            border-radius: 8px;
            font-size: 1.2rem;
        }

        .cheat-sheet-preview h3 {
            color: #4ecdc4;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .cheat-sheet-preview pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-size: 0.9rem;
            overflow-x: auto;
        }

        .cheat-sheet-preview code {
            background: rgba(138, 43, 226, 0.2);
            color: #8a2be2;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .loading-spinner {
            border: 4px solid rgba(68, 68, 68, 0.3);
            border-top: 4px solid #8a2be2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px 20px;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 15px;
            opacity: 0.6;
            fill: #8a2be2;
        }

        .navigation {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(26, 26, 26, 0.9);
            padding: 10px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            z-index: 1000;
        }

        .nav-btn {
            padding: 12px 20px;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid #8a2be2;
            border-radius: 20px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-align: center;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #8a2be2;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.4);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .app-header {
                padding: 12px 15px;
            }

            .app-logo {
                width: 40px;
                height: 40px;
            }

            .app-title h1 {
                font-size: 20px;
            }

            .upload-section, .preview-section {
                padding: 20px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 15px;
            }

            .navigation {
                bottom: 15px;
                flex-wrap: wrap;
                max-width: calc(100% - 30px);
            }

            .nav-btn {
                padding: 10px 15px;
                font-size: 12px;
            }
        }

        /* Touch-friendly improvements */
        .btn, .nav-btn, .upload-area {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(138, 43, 226, 0.5);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(138, 43, 226, 0.8);
        }
    </style>
</head>
<body>
    <div class="app-header">
        <img src="smart study.png" alt="Whizan Logo" class="app-logo">
        <div class="app-title">
            <h1>Whizan</h1>
            <p>Cheat Sheet Generator</p>
        </div>
    </div>

    <div class="container">
        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <div class="upload-text">Tap to upload or drag & drop your PDF</div>
                <div class="upload-hint">Maximum file size: 10MB</div>
                <input type="file" id="fileInput" accept=".pdf" />
            </div>
            
            <div class="controls">
                <div class="form-group">
                    <label for="language">Target Language</label>
                    <select id="language">
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="zh">Chinese</option>

                        <option value="hi">Hindi</option>

                        <option value="general">General Overview</option>
                        <option value="formulas">Formulas & Equations</option>
                        <option value="definitions">Key Definitions</option>
                        <option value="examples">Code Examples</option>
                        <option value="concepts">Main Concepts</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="customPrompt">Additional Instructions (Optional)</label>
                <input type="text" id="customPrompt" placeholder="e.g., Focus on chapter 3, include more examples..." />
            </div>
            
            <button class="btn" id="generateBtn" disabled>
                ✨ Generate Cheat Sheet
            </button>
            <button class="btn btn-secondary" id="exportBtn" disabled>
                📥 Export PDF
            </button>
            <button class="btn btn-secondary" id="printBtn" disabled style="background: linear-gradient(135deg, #f39c12, #e67e22);">
                🖨️ Print
            </button>

                <div class="progress-fill"></div>

        </div>
        
        <div class="preview-section">
            <div class="cheat-sheet-preview" id="cheatSheetPreview">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
                    </svg>
                    <h3>Your cheat sheet will appear here</h3>
                    <p>Upload a PDF and tap "Generate Cheat Sheet" to get started</p>
                </div>
            </div>
        </div>
    </div>

    <!-- <div class="navigation">
        <a href="cheat.html" class="nav-btn active">📄 Cheat</a>
        <a href="humaniser.html" class="nav-btn">🤖 Humanizer</a>

    <script>
        class CheatSheetGenerator {
            constructor() {
                this.apiKey = 'AIzaSyAM1p730RTRu40S1sHghd1KD4501K6iCsI';
                this.pdfContent = '';
                this.generatedContent = '';
                this.initializeEventListeners();
                this.setupPdfJs();
            }

            setupPdfJs() {
                if (typeof pdfjsLib !== 'undefined') {
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                }
            }

            initializeEventListeners() {
                const uploadArea = document.getElementById('uploadArea');
                const fileInput = document.getElementById('fileInput');
                const generateBtn = document.getElementById('generateBtn');
                const exportBtn = document.getElementById('exportBtn');
                const printBtn = document.getElementById('printBtn');

                // File upload events
                uploadArea.addEventListener('click', () => fileInput.click());
                uploadArea.addEventListener('dragover', this.handleDragOver.bind(this));
                uploadArea.addEventListener('drop', this.handleDrop.bind(this));
                uploadArea.addEventListener('dragleave', this.handleDragLeave.bind(this));
                fileInput.addEventListener('change', this.handleFileSelect.bind(this));

                // Button events
                generateBtn.addEventListener('click', this.generateCheatSheet.bind(this));
                exportBtn.addEventListener('click', this.exportToPDF.bind(this));
                printBtn.addEventListener('click', this.printCheatSheet.bind(this));
            }

            handleDragOver(e) {
                e.preventDefault();
                document.getElementById('uploadArea').classList.add('dragover');
            }

            handleDragLeave(e) {
                e.preventDefault();
                document.getElementById('uploadArea').classList.remove('dragover');
            }

            handleDrop(e) {
                e.preventDefault();
                document.getElementById('uploadArea').classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    this.processFile(files[0]);
                }
            }

            handleFileSelect(e) {
                const file = e.target.files[0];
                if (file) {
                    this.processFile(file);
                }
            }

            async processFile(file) {
                if (file.type !== 'application/pdf') {
                    this.showStatus('Please select a PDF file.', 'error');
                    return;
                }

                if (file.size > 10 * 1024 * 1024) {
                    this.showStatus('File size must be less than 10MB.', 'error');
                    return;
                }

                this.showProgress(true);
                this.showStatus('Processing PDF...', 'info');

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                    let fullText = '';

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        fullText += pageText + '\n\n';
                        
                        this.updateProgress((i / pdf.numPages) * 100);
                    }

                    this.pdfContent = fullText.trim();
                    this.showStatus(`PDF processed successfully! ${pdf.numPages} pages extracted.`, 'success');
                    document.getElementById('generateBtn').disabled = false;
                    
                } catch (error) {
                    console.error('Error processing PDF:', error);
                    this.showStatus('Error processing PDF. Please try another file.', 'error');
                } finally {
                    this.showProgress(false);
                }
            }

            async generateCheatSheet() {
                if (!this.pdfContent) {
                    this.showStatus('Please upload a PDF first.', 'error');
                    return;
                }

                const language = document.getElementById('language').value;
                const focusArea = document.getElementById('focusArea').value;
                const customPrompt = document.getElementById('customPrompt').value;

                this.showStatus('Generating cheat sheet with AI...', 'info');
                this.showSpinner(true);
                document.getElementById('generateBtn').disabled = true;

                try {
                    const prompt = this.buildPrompt(language, focusArea, customPrompt);
                    const response = await this.callGeminiAPI(prompt);
                    
                    this.generatedContent = response;
                    this.renderCheatSheet(response);
                    this.showStatus('Cheat sheet generated successfully!', 'success');
                    document.getElementById('exportBtn').disabled = false;
                    document.getElementById('printBtn').disabled = false;
                    
                } catch (error) {
                    console.error('Error generating cheat sheet:', error);
                    this.showStatus('Error generating cheat sheet. Please try again.', 'error');
                } finally {
                    this.showSpinner(false);
                    document.getElementById('generateBtn').disabled = false;
                }
            }

            buildPrompt(language, focusArea, customPrompt) {
                const languageMap = {
                    'en': 'English',
                    'es': 'Spanish',
                    'fr': 'French',
                    'de': 'German',
                    'zh': 'Chinese',
                    'ja': 'Japanese',
                    'ko': 'Korean',
                    'hi': 'Hindi'
                };

                const focusMap = {
                    'general': 'Provide a comprehensive overview of all major topics',
                    'formulas': 'Focus heavily on mathematical formulas, equations, and calculations',
                    'definitions': 'Emphasize key definitions, terms, and concepts',
                    'examples': 'Include plenty of code examples and practical implementations',
                    'concepts': 'Focus on core concepts and theoretical frameworks'
                };

                let prompt = `Create a comprehensive, well-structured cheat sheet from the following PDF content. 

Requirements:
- Language: ${languageMap[language]}
- Focus: ${focusMap[focusArea]}
- Format: Use clear headings, bullet points, and organize information logically
- Length: Fit on one printable page (concise but complete)
- Include: Key concepts, important formulas/code, essential definitions
- Style: Academic but accessible, suitable for quick reference during study

${customPrompt ? `Additional instructions: ${customPrompt}` : ''}

Format the response in markdown with:
- Clear hierarchical headings (# ## ###)
- Bullet points for lists
- Code blocks for programming content (\`\`\`language)
- Math expressions in LaTeX format ($$formula$$)
- Bold for key terms (**term**)

PDF Content:
${this.pdfContent.substring(0, 15000)}`;

                return prompt;
            }

            async callGeminiAPI(prompt) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            topK: 40,
                            topP: 0.95,
                            maxOutputTokens: 2048,
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`API request failed: ${response.status}`);
                }

                const data = await response.json();
                
                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
                    throw new Error('Invalid response from API');
                }

                return data.candidates[0].content.parts[0].text;
            }

            renderCheatSheet(content) {
                const preview = document.getElementById('cheatSheetPreview');
                
                // Convert markdown to HTML
                let html = marked.parse(content);
                
                // Render math expressions
                html = html.replace(/\$\$(.*?)\$\$/g, (match, formula) => {
                    try {
                        return katex.renderToString(formula, { displayMode: true });
                    } catch (e) {
                        return `<div class="math-expression">$$${formula}$$</div>`;
                    }
                });

                html = html.replace(/\$(.*?)\$/g, (match, formula) => {
                    try {
                        return katex.renderToString(formula, { displayMode: false });
                    } catch (e) {
                        return `$${formula}$`;
                    }
                });

                preview.innerHTML = html;
                
                // Apply syntax highlighting
                Prism.highlightAllUnder(preview);
            }

            async exportToPDF() {
                if (!this.generatedContent) {
                    this.showStatus('No content to export. Generate a cheat sheet first.', 'error');
                    return;
                }

                this.showStatus('Generating PDF...', 'info');
                
                try {
                    const element = document.getElementById('cheatSheetPreview');
                    
                    if (!element || !element.innerHTML.trim()) {
                        throw new Error('No content to export');
                    }

                    await new Promise(resolve => setTimeout(resolve, 500));

                    const canvas = await html2canvas(element, {
                        scale: 1.5,
                        useCORS: true,
                        allowTaint: true,
                        logging: false,
                        backgroundColor: '#ffffff',
                        width: element.scrollWidth,
                        height: element.scrollHeight
                    });

                    if (!canvas || canvas.width === 0 || canvas.height === 0) {
                        throw new Error('Failed to capture content');
                    }

                    const imgData = canvas.toDataURL('image/png', 0.95);
                    
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: 'a4'
                    });
                    
                    const pageWidth = pdf.internal.pageSize.getWidth();
                    const pageHeight = pdf.internal.pageSize.getHeight();
                    const margin = 10;
                    const imgWidth = pageWidth - (margin * 2);
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;

                    let y = margin;
                    let remainingHeight = imgHeight;

                    while (remainingHeight > 0) {
                        const availableHeight = pageHeight - margin * 2;
                        const currentHeight = Math.min(remainingHeight, availableHeight);
                        
                        const sourceY = imgHeight - remainingHeight;
                        const sourceHeight = (currentHeight * canvas.height) / imgHeight;
                        
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = canvas.width;
                        tempCanvas.height = sourceHeight;
                        
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(
                            canvas,
                            0, sourceY * canvas.height / imgHeight,
                            canvas.width, sourceHeight,
                            0, 0,
                            canvas.width, sourceHeight
                        );
                        
                        const tempImgData = tempCanvas.toDataURL('image/png', 0.95);
                        
                        pdf.addImage(tempImgData, 'PNG', margin, y, imgWidth, currentHeight);
                        
                        remainingHeight -= currentHeight;
                        
                        if (remainingHeight > 0) {
                            pdf.addPage();
                            y = margin;
                        }
                    }

                    const timestamp = new Date().toISOString().slice(0, 19).replace(/[:.]/g, '-');
                    const filename = `whizan-cheat-sheet-${timestamp}.pdf`;
                    
                    pdf.save(filename);
                    this.showStatus('PDF exported successfully!', 'success');
                    
                } catch (error) {
                    console.error('Error exporting PDF:', error);
                    this.showStatus(`Export failed: ${error.message}. Try using print instead.`, 'error');
                    
                    setTimeout(() => {
                        if (confirm('PDF export failed. Would you like to use browser print instead?')) {
                            window.print();
                        }
                    }, 2000);
                }
            }

            printCheatSheet() {
                if (!this.generatedContent) {
                    this.showStatus('No content to print. Generate a cheat sheet first.', 'error');
                    return;
                }
                
                window.print();
            }

            showStatus(message, type) {
                const statusEl = document.querySelector('.status-message');
                statusEl.textContent = message;
                statusEl.className = `status-message status-${type}`;
                statusEl.style.display = 'block';
                
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 5000);
            }

            showProgress(show) {
                const progressBar = document.querySelector('.progress-bar');
                progressBar.style.display = show ? 'block' : 'none';
                if (!show) {
                    this.updateProgress(0);
                }
            }

            updateProgress(percent) {
                const progressFill = document.querySelector('.progress-fill');
                progressFill.style.width = `${percent}%`;
            }

            showSpinner(show) {
                const spinner = document.querySelector('.loading-spinner');
                spinner.style.display = show ? 'block' : 'none';
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            new CheatSheetGenerator();
        });

        // Disable context menu
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
    </script>
</body>
