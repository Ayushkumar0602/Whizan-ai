<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sudoku & Crossword Generator</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }

    #sudoku, #crossword {
      display: none;
      margin-top: 20px;
    }

    table {
      margin: auto;
      border-collapse: collapse;
    }

    td {
      width: 30px;
      height: 30px;
      text-align: center;
      vertical-align: middle;
      border: 1px solid #555;
      font-size: 16px;
    }

    input {
      width: 100%;
      height: 100%;
      text-align: center;
      border: none;
      font-size: 16px;
    }

    .clue {
      margin-top: 20px;
      text-align: left;
      display: inline-block;
    }
  </style>
</head>
<body>

  <h1>Sudoku & Crossword Generator</h1>
  <button onclick="showSudoku()">Generate Sudoku</button>
  <button onclick="showCrossword()">Generate Crossword</button>

  <div id="sudoku">
    <h2>Sudoku Puzzle</h2>
    <table id="sudoku-grid"></table>
  </div>

  <div id="crossword">
    <h2>Mini Crossword Puzzle</h2>
    <table id="crossword-grid"></table>
    <div class="clue" id="crossword-clues"></div>
  </div>

  <script>
    function showSudoku() {
      document.getElementById('sudoku').style.display = 'block';
      document.getElementById('crossword').style.display = 'none';
      generateSudoku();
    }

    function showCrossword() {
      document.getElementById('crossword').style.display = 'block';
      document.getElementById('sudoku').style.display = 'none';
      generateCrossword();
    }

    async function generateSudoku() {
      const grid = document.getElementById('sudoku-grid');
      grid.innerHTML = '';
      const response = await fetch('https://sugoku.herokuapp.com/board?difficulty=easy');
      const data = await response.json();
      const board = data.board;

      for (let row = 0; row < 9; row++) {
        const tr = document.createElement('tr');
        for (let col = 0; col < 9; col++) {
          const td = document.createElement('td');
          if (board[row][col] !== 0) {
            td.textContent = board[row][col];
          } else {
            const input = document.createElement('input');
            input.maxLength = 1;
            td.appendChild(input);
          }
          tr.appendChild(td);
        }
        grid.appendChild(tr);
      }
    }

    async function generateCrossword() {
      const grid = document.getElementById('crossword-grid');
      const cluesDiv = document.getElementById('crossword-clues');
      grid.innerHTML = '';
      cluesDiv.innerHTML = '';

      const seedWords = ['code', 'data', 'web'];
      const clueData = [];

      for (let word of seedWords) {
        const clueRes = await fetch(`https://api.datamuse.com/words?ml=${word}&max=1`);
        const clueJson = await clueRes.json();
        const clue = clueJson[0]?.word || 'related';
        clueData.push({ word, clue });
      }

      // Build simple 3x4 grid horizontally
      for (let row = 0; row < clueData.length; row++) {
        const tr = document.createElement('tr');
        const word = clueData[row].word;
        for (let col = 0; col < 6; col++) {
          const td = document.createElement('td');
          if (col < word.length) {
            const input = document.createElement('input');
            input.maxLength = 1;
            input.placeholder = '_';
            td.appendChild(input);
          }
          tr.appendChild(td);
        }
        grid.appendChild(tr);
      }

      cluesDiv.innerHTML = '<h3>Clues:</h3>';
      clueData.forEach((item, i) => {
        cluesDiv.innerHTML += `${i + 1}. ${item.clue} (length: ${item.word.length})<br>`;
      });
    }
  </script>

</body>
</html>
