<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Courses - Smart Study</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="icon" type="image/png" href="smart study.png">
  <style>
    :root {
      --color1: #ff4d4d;
      --color2: #4d79ff;
      --color3: #07f407;
      --color4: #f309f3;
      --bg-color: #121212;
      --card-bg: rgba(30, 30, 30, 0.8);
      --text-primary: rgba(255, 255, 255, 0.9);
      --text-secondary: rgba(255, 255, 255, 0.7);
    }

    /* Color Background Animation */
    .color-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 90%;
      height: 100%;
      z-index: -2;
      opacity: 0.15;
    }

    .color {
      position: absolute;
      filter: blur(150px);
      border-radius: 50%;
      animation: moveColors 15s infinite alternate;
    }

    .color:nth-child(1) {
      background: var(--color1);
      width: 600px;
      height: 600px;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .color:nth-child(2) {
      background: var(--color2);
      width: 500px;
      height: 500px;
      bottom: -150px;
      left: 200px;
      animation-delay: -5s;
    }

    .color:nth-child(3) {
      background: var(--color3);
      width: 400px;
      height: 400px;
      top: 200px;
      right: -100px;
      animation-delay: -10s;
    }

    .color:nth-child(4) {
      background: var(--color4);
      width: 300px;
      height: 300px;
      bottom: 100px;
      right: 100px;
      animation-delay: -15s;
    }

    @keyframes moveColors {
      0% {
        transform: translate(0, 0);
      }
      25% {
        transform: translate(50px, 50px);
      }
      50% {
        transform: translate(-50px, 100px);
      }
      75% {
        transform: translate(100px, -50px);
      }
      100% {
        transform: translate(-100px, -100px);
      }
    }

    /* Base Styles */
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 15px;
      padding-bottom: 80px;
      color: var(--text-primary);
      min-height: 100vh;
      background: var(--bg-color);
      overflow-x: hidden;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px 0;
      margin-bottom: 20px;
    }

    .app-logo {
      width: 40px;
      height: 40px;
      margin-right: 15px;
      border-radius: 50%;
      object-fit: cover;
      zoom: 1.5;
    }

    .app-title {
      font-size: 2rem;
      font-weight: 600;
      margin: 0;
      background: linear-gradient(45deg, var(--color1), var(--color2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .courses-container {
      width: 100%;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
    }

    h1 {
      color: white;
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .courses-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .course-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 20px;
      transition: all 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      animation: fadeInUp 0.5s ease-out forwards;
    }

    .course-card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .course-card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .course-card:nth-child(3) {
      animation-delay: 0.3s;
    }

    .course-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .course-header h3 {
      font-size: 1.2rem;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-weight: 600;
    }

    .enrolled-badge {
      background: linear-gradient(135deg, var(--color3), #81C784);
      color: white;
      border-radius: 12px;
      padding: 4px 10px;
      font-size: 0.7rem;
      margin-left: 10px;
      font-weight: 600;
    }

    .course-difficulty {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      margin-top: 10px;
      font-weight: 600;
    }

    .beginner {
      background: linear-gradient(135deg, #81C784, var(--color3));
      color: white;
    }

    .intermediate {
      background: linear-gradient(135deg, #FFD54F, #FFB300);
      color: white;
    }

    .advanced {
      background: linear-gradient(135deg, #E57373, #F44336);
      color: white;
    }

    .course-description {
      color: var(--text-secondary);
      margin: 15px 0;
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .course-meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 8px;
      display: flex;
      gap: 15px;
    }

    .course-meta i {
      color: var(--color2);
    }

    .course-footer {
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .enroll-btn,
    .visit-btn,
    .test-btn,
    .chat-btn,
    .request-btn {
      border: none;
      padding: 8px 15px;
      font-size: 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .enroll-btn {
      background: linear-gradient(135deg, var(--color2), #34a853);
      color: white;
    }

    .visit-btn {
      background: linear-gradient(135deg, #34a853, var(--color2));
      color: white;
    }

    .test-btn {
      background: linear-gradient(135deg, #FBBC05, #FF9800);
      color: white;
    }

    .chat-btn {
      background: linear-gradient(135deg, #9C27B0, #673AB7);
      color: white;
    }

    .request-btn {
      background: linear-gradient(135deg, #FF5722, #FF9800);
      color: white;
      padding: 10px 20px;
      margin-bottom: 20px;
      width: 100%;
      justify-content: center;
    }

    /* Notification styling */
    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--color3), #81C784);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      z-index: 1000;
      animation: fadeInOut 3s ease;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
    }

    .notification.error {
      background: linear-gradient(135deg, #F44336, #E57373);
    }

    @keyframes fadeInOut {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      10% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      90% {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
    }

    /* Floating chat button */
    .floating-chat-btn {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: linear-gradient(135deg, #9C27B0, #673AB7);
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      z-index: 999;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: var(--card-bg);
      margin: 10% auto;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 90%;
      position: relative;
      animation: modalFadeIn 0.3s ease-out;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 24px;
      font-weight: bold;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.3s;
    }

    .close-modal:hover {
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.3s;
      background: rgba(0, 0, 0, 0.3);
      color: white;
    }

    .form-group input:focus {
      border-color: var(--color2);
      outline: none;
      box-shadow: 0 0 0 2px rgba(77, 121, 255, 0.2);
    }

    .submit-request-btn {
      background: linear-gradient(135deg, #673AB7, #9C27B0);
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 100%;
      justify-content: center;
    }

    /* Spinner styles */
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(6, 206, 49, 0.3);
      border-radius: 50%;
      border-top-color: var(--color3);
      animation: spin 1s ease-in-out infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .button-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 6px;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive Adjustments */
    @media (min-width: 768px) {
      .courses-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .floating-chat-btn {
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
      }
      
      h1 {
        font-size: 2.2rem;
      }
    }

    @media (min-width: 1024px) {
      .courses-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

<body>
  <!-- Animated Background -->
  <div class="color-bg">
    <div class="color"></div>
    <div class="color"></div>
    <div class="color"></div>
    <div class="color"></div>
  </div>

  <!-- App Header -->
  <div class="app-header">
    <img src="smart study.png" alt="Smart Study Logo" class="app-logo">
    <h1 class="app-title">Whizan.Ai</h1>
  </div>

  <!-- Courses Container -->
  <div class="courses-container">
    <h1>Available Courses</h1>
    <button id="requestCourseBtn" class="request-btn">
      <i class="material-icons">add_circle_outline</i> Request a Course
    </button>
    <div class="courses-grid" id="courses-grid">
      <!-- Courses will load here -->
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Floating chat button (hidden by default) -->
  <div class="floating-chat-btn" id="floatingChatBtn" style="display: none;">
    <i class="material-icons">chat</i>
  </div>

  <!-- Request Course Modal -->
  <div id="requestCourseModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Request a New Course</h2>
      <form id="requestCourseForm">
        <div class="form-group">
          <label for="coursePlaylist">YouTube Playlist URL/ID:</label>
          <input type="text" id="coursePlaylist" required placeholder="e.g., PLfqMhTWNBTe0b2nM6JHVCnAkhQRGiZMSJ">
        </div>
        <div class="form-group">
          <label for="courseTitle">Course Title:</label>
          <input type="text" id="courseTitle" required placeholder="e.g., Advanced JavaScript Concepts">
        </div>
        <div class="form-group">
          <label for="userEmail">Your Email:</label>
          <input type="email" id="userEmail" required>
        </div>
        <button type="submit" class="submit-request-btn">
          <i class="material-icons">send</i> Submit Request
        </button>
      </form>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <script>
    let currentUser = null;
    let hasEnrolledCourses = false;

    async function init() {
      // Initialize Firebase from backend config
      try {
        const configResponse = await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/getConfig');
        const config = await configResponse.json();
        firebase.initializeApp(config.firebase);

        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(async user => {
          if (user) {
            currentUser = user;
            try {
              const idToken = await user.getIdToken();
              await loadCourses(idToken);
              setupRequestCourse(idToken);
            } catch (error) {
              console.error('Authentication error:', error);
              window.location.href = "auth.html";
            }
          } else {
            window.location.href = "auth.html";
          }
        });
      } catch (error) {
        console.error('Failed to initialize app:', error);
        showNotification('Failed to load application. Please try again.', 'error');
      }
    }

    function setupRequestCourse(idToken) {
      const modal = document.getElementById('requestCourseModal');
      const btn = document.getElementById('requestCourseBtn');
      const closeBtn = document.querySelector('.close-modal');
      const form = document.getElementById('requestCourseForm');

      btn.addEventListener('click', () => {
        document.getElementById('userEmail').value = currentUser?.email || '';
        modal.style.display = 'block';
      });

      closeBtn.addEventListener('click', () => {
        modal.style.display = 'none';
      });

      window.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.style.display = 'none';
        }
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const playlist = document.getElementById('coursePlaylist').value.trim();
        const title = document.getElementById('courseTitle').value.trim();
        const email = document.getElementById('userEmail').value.trim();

        try {
          const submitBtn = form.querySelector('button[type="submit"]');
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="material-icons">hourglass_top</i> Submitting...';

          const response = await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/requestCourse', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${idToken}`
            },
            body: JSON.stringify({ title, playlist, email })
          });

          if (!response.ok) {
            throw new Error('Request failed');
          }

          modal.style.display = 'none';
          form.reset();
          showNotification('Course request submitted successfully!', 'success');
        } catch (error) {
          console.error('Error submitting course request:', error);
          showNotification('Failed to submit request. Please try again.', 'error');
        } finally {
          const submitBtn = form.querySelector('button[type="submit"]');
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="material-icons">send</i> Submit Request';
          }
        }
      });
    }

    async function loadCourses(idToken) {
      const coursesGrid = document.getElementById('courses-grid');
      coursesGrid.innerHTML = '<div class="spinner"></div>';

      try {
        const response = await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/getCourses', {
          headers: {
            'Authorization': `Bearer ${idToken}`
          }
        });

        if (!response.ok) {
          throw new Error('Failed to load courses');
        }

        const { courses, hasEnrolledCourses } = await response.json();

        // Show/hide floating chat button based on enrollments
        const floatingChatBtn = document.getElementById('floatingChatBtn');
        floatingChatBtn.style.display = hasEnrolledCourses ? 'flex' : 'none';

        coursesGrid.innerHTML = '';
        courses.forEach(course => {
          const card = document.createElement('div');
          card.className = 'course-card';
          card.innerHTML = `
            <div class="course-header">
              <h3>${course.title} ${course.isEnrolled ? '<span class="enrolled-badge">Enrolled</span>' : ''}</h3>
              <span class="course-difficulty ${course.difficulty}">
                ${course.difficulty.charAt(0).toUpperCase() + course.difficulty.slice(1)}
              </span>
              <div class="course-meta">
                <span><i class="material-icons" style="font-size:16px; vertical-align:middle">schedule</i> ${course.duration}</span>
                <span><i class="material-icons" style="font-size:16px; vertical-align:middle">menu_book</i> ${course.lessons}</span>
              </div>
            </div>
            <div class="course-description">${course.description}</div>
            <div class="course-footer">
              ${course.isEnrolled ? '' : `<button class="enroll-btn" data-course="${course.id}" data-playlist="${course.playlistId}">
                <i class="material-icons" style="font-size:18px">school</i> Enroll
              </button>`}
              <button class="visit-btn" data-playlist="${course.playlistId}">
                <i class="material-icons" style="font-size:18px">play_circle</i> ${course.isEnrolled ? 'Continue' : 'Preview'}
              </button>
              ${course.isEnrolled ? `<button class="test-btn" data-course="${course.id}">
                <i class="material-icons" style="font-size:18px">quiz</i> Test
              </button>` : ''}
              ${course.isEnrolled ? `<button class="chat-btn" data-course="${course.id}">
                <i class="material-icons" style="font-size:18px">forum</i> Chat
              </button>` : ''}
            </div>
          `;
          coursesGrid.appendChild(card);
        });

        document.querySelectorAll('.enroll-btn').forEach(btn =>
          btn.addEventListener('click', (e) => enrollInCourse(e, idToken))
        );
        document.querySelectorAll('.visit-btn').forEach(btn =>
          btn.addEventListener('click', visitCourse)
        );
        document.querySelectorAll('.test-btn').forEach(btn =>
          btn.addEventListener('click', takeTest)
        );
        document.querySelectorAll('.chat-btn').forEach(btn =>
          btn.addEventListener('click', openChat)
        );
      } catch (error) {
        console.error("Error loading courses:", error);
        showNotification('Failed to load courses. Please try again.', 'error');
      }
    }

    async function enrollInCourse(e, idToken) {
      const courseId = e.target.getAttribute('data-course');
      const playlistId = e.target.getAttribute('data-playlist');

      try {
        e.target.disabled = true;
        e.target.innerHTML = '<span class="button-spinner"></span> Enrolling...';

        const response = await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/enrollInCourse', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${idToken}`
          },
          body: JSON.stringify({ courseId, playlistId })
        });

        if (!response.ok) {
          throw new Error('Enrollment failed');
        }

        // Reload courses to reflect new enrollment
        await loadCourses(idToken);
        showNotification('Successfully enrolled in course!', 'success');
      } catch (error) {
        console.error("Error enrolling in course:", error);
        e.target.disabled = false;
        e.target.innerHTML = '<i class="material-icons" style="font-size:18px">school</i> Enroll';
        showNotification('Enrollment failed. Please try again.', 'error');
      }
    }

    function visitCourse(e) {
      const playlistId = e.target.getAttribute('data-playlist');
      window.location.href = `dashboard.html?playlistId=${playlistId}`;
    }

    function takeTest(e) {
      const courseId = e.target.getAttribute('data-course');
      window.location.href = `test.html?courseId=${courseId}`;
    }

    function openChat() {
      window.location.href = `chat.html`;
    }

    function showNotification(message, type) {
      const notification = document.createElement('div');
      notification.className = 'notification';
      if (type === 'error') notification.classList.add('error');
      notification.innerHTML = `<i class="material-icons" style="vertical-align:middle; margin-right:8px;">${type === 'success' ? 'check_circle' : 'error'}</i> ${message}`;
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 3000);
    }

    init();
  </script>
</body>
</html>
