<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whizan - Achievements</title>
    <link rel="icon" type="image/png" href="smart study.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --primary-light: rgba(138, 43, 226, 0.2);
            --secondary: #00ffff;
            --danger: #ff4d4d;
            --dark: #121212;
            --darker: #0a0a0a;
            --light: #f5f5f5;
            --card-bg: rgba(30, 30, 30, 0.7);
            --card-border: rgba(138, 43, 226, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --nav-bg: rgba(18, 18, 18, 0.95);
            --progress-fill: linear-gradient(90deg, var(--primary), var(--secondary));
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 90px;
            overflow-x: hidden;
            position: relative;
        }

        /* Particle Background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: rgba(138, 43, 226, 0.5);
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* App Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.9), rgba(10, 10, 10, 0.7));
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--card-border);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        .app-title {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .credits-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 30, 30, 0.8);
            padding: 8px 15px;
            border-radius: var(--border-radius-lg);
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
        }

        .credits-display:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.3);
        }

        .credits-display i {
            color: var(--secondary);
            font-size: 1.2rem;
        }

        /* Main Container */
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Achievements Grid */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Achievement Card */
        .achievement-card {
            background: var(--card-bg);
            border-radius: var(--border-radius-lg);
            padding: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--card-border);
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        .achievement-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(138, 43, 226, 0.1), transparent 70%);
            opacity: 0;
            transition: var(--transition);
        }

        .achievement-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(138, 43, 226, 0.2);
            border-color: rgba(138, 43, 226, 0.5);
        }

        .achievement-card:hover::before {
            opacity: 1;
        }

        .achievement-card.unlocked {
            animation: cardGlow 2s infinite alternate;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 5px 15px rgba(138, 43, 226, 0.2); }
            100% { box-shadow: 0 5px 25px rgba(138, 43, 226, 0.4); }
        }

        .achievement-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 15px;
        }

        .achievement-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 24px;
            position: relative;
        }

        .achievement-icon.locked {
            background: rgba(50, 50, 50, 0.7);
            color: var(--text-secondary);
            border: 2px dashed rgba(138, 43, 226, 0.3);
        }

        .achievement-icon.unlocked {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
        }

        .achievement-icon.unlocked::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        .achievement-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 3px;
            color: var(--text-primary);
        }

        .achievement-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .achievement-progress {
            height: 6px;
            background: rgba(50, 50, 50, 0.7);
            border-radius: 3px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--progress-fill);
            width: 0%;
            border-radius: 3px;
            transition: width 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                          rgba(255,255,255,0) 0%, 
                          rgba(255,255,255,0.3) 50%, 
                          rgba(255,255,255,0) 100%);
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .achievement-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .achievement-status {
            color: var(--text-secondary);
        }

        .claim-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: var(--border-radius-md);
            padding: 8px 15px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(138, 43, 226, 0.3);
        }

        .claim-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(138, 43, 226, 0.4);
        }

        .claim-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .claimed-badge {
            color: var(--secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }

        .claimed-badge i {
            font-size: 1rem;
        }

        /* Category Header */
        .category-header {
            grid-column: 1 / -1;
            font-size: 1.4rem;
            margin: 30px 0 10px 0;
            padding-bottom: 8px;
            position: relative;
            display: inline-block;
            font-weight: 600;
        }

        .category-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 10;
            transition: var(--transition);
        }

        .fab:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 6px 25px rgba(138, 43, 226, 0.4);
        }

        .fab i {
            font-size: 1.8rem;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.3);
            z-index: 10;
            border-top: 1px solid rgba(138, 43, 226, 0.1);
            backdrop-filter: blur(10px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.7rem;
            transition: var(--transition);
            width: 25%;
            position: relative;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 1.6rem;
            margin-bottom: 3px;
            transition: var(--transition);
        }

        .nav-item.active i {
            transform: translateY(-5px);
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
            transition: var(--transition);
        }

        .nav-item.active::after {
            opacity: 1;
            bottom: -8px;
        }

        /* Confetti Effect */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: var(--primary);
            opacity: 0;
            z-index: 100;
            animation: confettiFall 3s linear forwards;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Floating Stars */
        .floating-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; }
            100% { opacity: 0.8; }
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .achievements-grid {
                grid-template-columns: 1fr;
            }
            
            .app-header {
                padding: 12px 15px;
            }
            
            .app-title {
                font-size: 1.1rem;
            }
            
            .credits-display {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            
            .achievement-card {
                padding: 15px;
            }
            
            .achievement-icon {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
            
            .achievement-title {
                font-size: 1rem;
            }
            
            .achievement-description {
                font-size: 0.8rem;
            }
        }

        /* Loading Animation */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(138, 43, 226, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-primary);
            font-size: 1rem;
            margin-top: 15px;
            text-align: center;
        }

        /* Floating Particles */
        @keyframes floatParticle {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
        }
    </style>
</head>

<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Whizan Achievements</div>
    </div>

    <!-- Particle Background -->
    <div class="particles" id="particles"></div>

    <!-- Floating Stars -->
    <div class="floating-stars" id="floating-stars"></div>

    <!-- App Header -->
    <header class="app-header">
        <div class="logo-container">
            <img src="smart study.png" alt="Whizan Logo" class="logo-img">
            <h1 class="app-title">Whizan</h1>
        </div>
        <div class="credits-display">
            <i class="material-icons">monetization_on</i>
            <span id="user-credits">0</span> CREDITS
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="achievements-grid" id="achievements-grid">
            <!-- Achievements will be dynamically inserted here -->
        </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fab" id="trophy-fab" title="Your Trophy Case">
        <i class="material-icons">emoji_events</i>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="afterlogin.html" class="nav-item">
            <i class="material-icons">home</i>
            <span>Home</span>
        </a>
        <a href="course.html" class="nav-item">
            <i class="material-icons">school</i>
            <span>Learn</span>
        </a>
        <a href="achievements.html" class="nav-item active">
            <i class="material-icons">military_tech</i>
            <span>Achievements</span>
        </a>
        <a href="user_persona.html" class="nav-item">
            <i class="material-icons">person</i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCVYdfql5aqHrChlA1v3nxRLkIbYyWMvUg",
            authDomain: "study2-7bdc7.firebaseapp.com",
            databaseURL: "https://study2-7bdc7-default-rtdb.firebaseio.com",
            projectId: "study2-7bdc7",
            storageBucket: "study2-7bdc7.firebasestorage.app",
            messagingSenderId: "320617984870",
            appId: "1:320617984870:web:04b61ea4ee88ae057e4ea7",
            measurementId: "G-VRM14GRNWG"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Achievement data - organized by categories
        const achievements = {
            streak: [
                { 
                    id: 'streak-3', 
                    title: '2-Day Streak', 
                    icon: 'whatshot', 
                    description: 'Maintain a 2-day study streak', 
                    required: 2, 
                    credits: 10 
                },
                { 
                    id: 'streak-7', 
                    title: '7-Day Streak', 
                    icon: 'local_fire_department', 
                    description: 'Maintain a 7-day study streak', 
                    required: 7, 
                    credits: 20 
                },
                { 
                    id: 'streak-30', 
                    title: '30-Day Streak', 
                    icon: 'stars', 
                    description: 'Maintain a 30-day study streak', 
                    required: 30, 
                    credits: 50 
                }
            ],
            leetcode: [
                { 
                    id: 'leetcode-10', 
                    title: 'LeetCode Novice', 
                    icon: 'code', 
                    description: 'Solve 10 LeetCode problems', 
                    required: 10, 
                    credits: 10 
                },
                { 
                    id: 'leetcode-50', 
                    title: 'LeetCode Intermediate', 
                    icon: 'data_object', 
                    description: 'Solve 50 LeetCode problems', 
                    required: 50, 
                    credits: 20 
                },
                { 
                    id: 'leetcode-100', 
                    title: 'LeetCode Master', 
                    icon: 'terminal', 
                    description: 'Solve 100 LeetCode problems', 
                    required: 100, 
                    credits: 50 
                }
            ],
            goals: [
                { 
                    id: 'goals-5', 
                    title: 'Goal Setter', 
                    icon: 'flag', 
                    description: 'Complete 5 study goals', 
                    required: 5, 
                    credits: 10 
                },
                { 
                    id: 'goals-20', 
                    title: 'Goal Achiever', 
                    icon: 'emoji_events', 
                    description: 'Complete 20 study goals', 
                    required: 20, 
                    credits: 20 
                },
                { 
                    id: 'goals-50', 
                    title: 'Goal Master', 
                    icon: 'military_tech', 
                    description: 'Complete 50 study goals', 
                    required: 50, 
                    credits: 50 
                }
            ],
            special: [
                { 
                    id: 'perfect-week', 
                    title: 'Perfect Week', 
                    icon: 'check_circle', 
                    description: 'Complete all daily goals for 7 consecutive days', 
                    required: 1, 
                    credits: 30 
                },
                { 
                    id: 'daily-5', 
                    title: 'Daily Grind', 
                    icon: 'all_inclusive', 
                    description: 'Complete 5 goals in a single day', 
                    required: 1, 
                    credits: 20 
                },
                { 
                    id: 'balanced', 
                    title: 'Balanced Learner', 
                    icon: 'balance', 
                    description: 'Complete goals in 3 different categories', 
                    required: 1, 
                    credits: 20 
                }
            ]
        };

        // User state
        const userState = {
            currentUser: null,
            credits: 0,
            achievements: {
                streak: [],
                leetcode: [],
                goals: [],
                special: []
            },
            progress: {
                streak: 0,
                leetcode: 0,
                goals: 0
            }
        };

        // Initialize the app
        function init() {
            createParticles();
            createStars();
            
            auth.onAuthStateChanged(user => {
                if (user) {
                    userState.currentUser = user;
                    loadUserData();
                } else {
                    window.location.href = 'auth.html';
                }
            });
            
            // Trophy FAB click handler
            document.getElementById('trophy-fab').addEventListener('click', () => {
                showToast('Your trophy case is coming soon!', 'info');
            });
        }

        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random position
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                
                // Random size
                const size = Math.random() * 3 + 1;
                
                // Random animation duration
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 5;
                
                // Apply styles
                particle.style.left = `${posX}%`;
                particle.style.top = `${posY}%`;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                
                // Random color
                const colors = ['#8a2be2', '#00ffff', '#ffffff'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.backgroundColor = color;
                
                particlesContainer.appendChild(particle);
            }
        }

        // Create floating stars
        function createStars() {
            const starsContainer = document.getElementById('floating-stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // Random position
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                
                // Random animation
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 5;
                
                // Apply styles
                star.style.left = `${posX}%`;
                star.style.top = `${posY}%`;
                star.style.animationDuration = `${duration}s`;
                star.style.animationDelay = `${delay}s`;
                
                starsContainer.appendChild(star);
            }
        }

        /**
         * Load user data including credits and achievements
         */
        async function loadUserData() {
            try {
                const userDoc = await db.collection('users').doc(userState.currentUser.uid).get();
                
                if (userDoc.exists) {
                    const data = userDoc.data();
                    
                    // Update user state
                    userState.credits = data.credits || 0;
                    document.getElementById('user-credits').textContent = userState.credits;
                    
                    if (data.achievements) {
                        userState.achievements = data.achievements;
                    }

                    // Load current progress and render achievements
                    await loadProgressAndRenderAchievements();
                }
                
                // Hide loading overlay
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-overlay').style.display = 'none';
                    }, 500);
                }, 1000);
            } catch (error) {
                console.error('Error loading user data:', error);
                showToast('Failed to load user data', 'error');
            }
        }

        /**
         * Load progress data and render achievements
         */
        async function loadProgressAndRenderAchievements() {
            try {
                // Get current streak
                const userDoc = await db.collection('users').doc(userState.currentUser.uid).get();
                userState.progress.streak = userDoc.data()?.streak || 0;

                // Get LeetCode problems solved (placeholder - implement your integration)
                userState.progress.leetcode = 0;

                // Get goals completed
                const goalsSnapshot = await db.collection('goals')
                    .where('userId', '==', userState.currentUser.uid)
                    .where('completed', '==', true)
                    .get();
                userState.progress.goals = goalsSnapshot.size;

                // Check for newly completed achievements
                await checkForNewAchievements();

                // Render achievements with current progress
                renderAchievements();
            } catch (error) {
                console.error('Error loading progress:', error);
                showToast('Failed to load progress data', 'error');
            }
        }

        /**
         * Check if any new achievements have been unlocked
         */
        async function checkForNewAchievements() {
            try {
                let updatesNeeded = false;
                const updates = {};
                
                // Check each achievement category
                Object.keys(achievements).forEach(category => {
                    achievements[category].forEach(achievement => {
                        const isUnlocked = userState.achievements[category]?.includes(achievement.id);
                        const isClaimed = userState.achievements[category]?.includes(`${achievement.id}-claimed`);
                        
                        if (!isUnlocked && !isClaimed) {
                            let conditionMet = false;
                            
                            // Check condition based on category
                            switch(category) {
                                case 'streak':
                                    conditionMet = userState.progress.streak >= achievement.required;
                                    break;
                                case 'leetcode':
                                    conditionMet = userState.progress.leetcode >= achievement.required;
                                    break;
                                case 'goals':
                                    conditionMet = userState.progress.goals >= achievement.required;
                                    break;
                                case 'special':
                                    // Implement special conditions here
                                    break;
                            }
                            
                            if (conditionMet) {
                                userState.achievements[category].push(achievement.id);
                                updates[`achievements.${category}`] = userState.achievements[category];
                                updatesNeeded = true;
                            }
                        }
                    });
                });
                
                if (updatesNeeded) {
                    await db.collection('users').doc(userState.currentUser.uid).update(updates);
                    showToast('New achievements unlocked!', 'success');
                }
            } catch (error) {
                console.error('Error checking for new achievements:', error);
            }
        }

        /**
         * Render all achievements with progress
         */
        function renderAchievements() {
            const grid = document.getElementById('achievements-grid');
            grid.innerHTML = '';

            // Render each category
            Object.keys(achievements).forEach(category => {
                // Add category header
                const categoryHeader = document.createElement('h2');
                categoryHeader.className = 'category-header';
                categoryHeader.textContent = `${category.charAt(0).toUpperCase() + category.slice(1)} Achievements`;
                grid.appendChild(categoryHeader);

                // Render achievements in this category
                achievements[category].forEach(achievement => {
                    const isUnlocked = userState.achievements[category]?.includes(achievement.id) || 
                                     userState.achievements[category]?.includes(`${achievement.id}-claimed`);
                    const isClaimed = userState.achievements[category]?.includes(`${achievement.id}-claimed`);

                    // Calculate current progress
                    let currentProgress = 0;
                    switch(category) {
                        case 'streak':
                            currentProgress = userState.progress.streak;
                            break;
                        case 'leetcode':
                            currentProgress = userState.progress.leetcode;
                            break;
                        case 'goals':
                            currentProgress = userState.progress.goals;
                            break;
                        case 'special':
                            currentProgress = 0; // Implement special tracking
                            break;
                    }

                    const progressPercent = Math.min(100, (currentProgress / achievement.required) * 100);
                    const isCompleted = currentProgress >= achievement.required;

                    const card = document.createElement('div');
                    card.className = `achievement-card ${isUnlocked ? 'unlocked' : ''}`;
                    
                    card.innerHTML = `
                        <div class="achievement-header">
                            <div class="achievement-icon ${isUnlocked ? 'unlocked' : 'locked'}">
                                <i class="material-icons">${achievement.icon}</i>
                            </div>
                            <div>
                                <h3 class="achievement-title">${achievement.title}</h3>
                                <p class="achievement-description">${achievement.description}</p>
                            </div>
                        </div>
                        <div class="achievement-progress">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                        <div class="achievement-footer">
                            <span class="achievement-status">${isUnlocked ? 'Unlocked!' : `${Math.min(currentProgress, achievement.required)}/${achievement.required}`}</span>
                            ${isUnlocked ? 
                                (isClaimed ? 
                                    '<span class="claimed-badge"><i class="material-icons">check_circle</i>+${achievement.credits} Credits</span>' : 
                                    `<button class="claim-btn" data-category="${category}" data-id="${achievement.id}" data-credits="${achievement.credits}">
                                        <i class="material-icons">card_giftcard</i>
                                        Claim ${achievement.credits} Credits
                                    </button>`) : 
                                (isCompleted ? 'Complete! Refresh to claim' : '')}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });

            // Add event listeners to claim buttons
            document.querySelectorAll('.claim-btn').forEach(btn => {
                btn.addEventListener('click', claimAchievement);
            });
        }

        /**
         * Handle claiming an achievement
         */
        async function claimAchievement(e) {
            const btn = e.currentTarget;
            const category = btn.dataset.category;
            const achievementId = btn.dataset.id;
            const credits = parseInt(btn.dataset.credits);

            // Disable button during processing
            btn.disabled = true;
            btn.innerHTML = `<i class="material-icons">hourglass_top</i> Processing...`;

            try {
                // Update user data in Firestore
                await db.collection('users').doc(userState.currentUser.uid).update({
                    [`achievements.${category}`]: firebase.firestore.FieldValue.arrayUnion(`${achievementId}-claimed`),
                    credits: firebase.firestore.FieldValue.increment(credits)
                });

                // Update local state
                userState.achievements[category].push(`${achievementId}-claimed`);
                userState.credits += credits;
                document.getElementById('user-credits').textContent = userState.credits;

                // Create confetti effect
                createConfetti();

                // Re-render achievements
                renderAchievements();

                // Show success message
                showToast(`+${credits} credits claimed!`, 'success');
            } catch (error) {
                console.error('Error claiming achievement:', error);
                showToast('Failed to claim achievement', 'error');
                btn.disabled = false;
                btn.innerHTML = `<i class="material-icons">card_giftcard</i> Claim ${credits} Credits`;
            }
        }

        // Create confetti effect
        function createConfetti() {
            const colors = ['#8a2be2', '#00ffff', '#ffffff', '#ff4d4d', '#00ffaa'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                
                // Random position
                const posX = Math.random() * window.innerWidth;
                
                // Random size
                const size = Math.random() * 8 + 4;
                
                // Random animation duration
                const duration = Math.random() * 3 + 2;
                const delay = Math.random() * 0.5;
                
                // Random shape
                const shapes = ['circle', 'square', 'triangle'];
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                
                // Apply styles
                confetti.style.left = `${posX}px`;
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.animationDuration = `${duration}s`;
                confetti.style.animationDelay = `${delay}s`;
                
                // Random color
                const color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.backgroundColor = color;
                
                // Shape specific styles
                if (shape === 'circle') {
                    confetti.style.borderRadius = '50%';
                } else if (shape === 'triangle') {
                    confetti.style.width = '0';
                    confetti.style.height = '0';
                    confetti.style.backgroundColor = 'transparent';
                    confetti.style.borderLeft = `${size/2}px solid transparent`;
                    confetti.style.borderRight = `${size/2}px solid transparent`;
                    confetti.style.borderBottom = `${size}px solid ${color}`;
                }
                
                document.body.appendChild(confetti);
                
                // Remove confetti after animation
                setTimeout(() => {
                    confetti.remove();
                }, duration * 1000);
            }
        }

        /**
         * Show toast notification
         */
        function showToast(message, type = 'info') {
            // In a real app, you'd implement a proper toast notification system
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '100px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--primary)' : 'var(--card-bg)';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = 'var(--border-radius-md)';
            toast.style.boxShadow = '0 4px 15px rgba(0, 0, 0, 0.3)';
            toast.style.zIndex = '1000';
            toast.style.display = 'flex';
            toast.style.alignItems = 'center';
            toast.style.gap = '10px';
            toast.style.animation = 'fadeInOut 3s forwards';
            toast.innerHTML = `
                <i class="material-icons">${type === 'error' ? 'error' : type === 'success' ? 'check_circle' : 'info'}</i>
                ${message}
            `;
            
            document.body.appendChild(toast);
            
            // Remove toast after animation
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Initialize the app when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>

    <!-- Right-click disable -->
    <script>
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
    </script>
</body>
