<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whizan - Digital Library</title>
    <link rel="icon" type="image/png" href="smart study.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #00d4ff;
            --secondary: #0099cc;
            --accent: #ff6b6b;
            --success: #4ecdc4;
            --warning: #ffe66d;
            --bg-primary: #000000;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-tertiary: #888888;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #000000, #111111, #000000);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            animation: float 20s infinite linear;
            opacity: 0.6;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) translateX(100px);
                opacity: 0;
            }
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .app-logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
            }
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Search Container */
        .search-container {
            padding: 1.5rem;
            margin: 1rem;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        #query {
            flex: 1;
            padding: 1rem 1.25rem;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        #query::placeholder {
            color: var(--text-tertiary);
        }

        #query:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
            transform: scale(1.02);
        }

        .search-btn {
            padding: 1rem 1.5rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .search-btn:hover, .search-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        /* Content Sections */
        .content-section {
            margin: 1.5rem 1rem;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            text-align: center;
            position: relative;
            color: var(--text-primary);
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border-radius: 2px;
        }

        /* Books Grid */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .book-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .book-card:hover, .book-card:active {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.2);
            border-color: var(--primary);
        }

        .book-thumb {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .book-card:hover .book-thumb {
            transform: scale(1.1);
        }

        .book-info {
            padding: 1rem;
        }

        .book-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-author {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .read-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            flex: 1;
        }

        .read-btn:hover, .read-btn:active {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .fav-btn {
            background: var(--glass);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            width: 40px;
            height: 40px;
        }

        .fav-btn:hover, .fav-btn:active {
            background: var(--accent);
            color: white;
            transform: scale(1.1);
        }

        .fav-btn.favorited {
            background: var(--accent);
            color: white;
        }

        /* Load More Button */
        .load-more {
            display: block;
            margin: 2rem auto;
            padding: 1rem 2rem;
            background: linear-gradient(45deg, var(--success), #36b09e);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        .load-more:hover, .load-more:active {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(78, 205, 196, 0.4);
        }

        /* Fullscreen Modal */
        .fullscreen-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .fullscreen-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            transform: scale(0.9);
            transition: all 0.4s ease;
        }

        .fullscreen-modal.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            padding: 1rem;
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            margin-right: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .close-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover, .close-btn:active {
            transform: rotate(90deg) scale(1.1);
            background: #ff5252;
        }

        .modal-body {
            flex: 1;
            display: flex;
        }

        .book-iframe {
            flex: 1;
            border: none;
            background: var(--bg-secondary);
        }

        .modal-footer {
            padding: 1rem;
            background: var(--bg-secondary);
            display: flex;
            justify-content: center;
            gap: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        .modal-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .share-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }

        .share-btn:hover, .share-btn:active {
            transform: scale(1.05);
        }

        .download-btn {
            background: linear-gradient(45deg, var(--warning), #ffd93d);
            color: var(--bg-primary);
        }

        .download-btn:hover, .download-btn:active {
            transform: scale(1.05);
        }

        /* No Results */
        .no-results, .error {
            text-align: center;
            color: var(--text-secondary);
            grid-column: 1 / -1;
            padding: 2rem;
            font-size: 1rem;
        }

        /* Mobile Optimizations */
        @media (max-width: 480px) {
            .search-container {
                margin: 0.5rem;
                padding: 1rem;
            }

            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.75rem;
            }

            .book-thumb {
                height: 180px;
            }

            .book-info {
                padding: 0.75rem;
            }

            .modal-footer {
                flex-direction: column;
            }

            .modal-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Touch Feedback */
        .touch-feedback {
            position: relative;
            overflow: hidden;
        }

        .touch-feedback::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .touch-feedback:active::before {
            width: 200px;
            height: 200px;
        }

        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="animated-bg"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <img src="smart study.png" alt="Whizan Logo" class="app-logo">
            <h1 class="app-title">Whizan</h1>
        </div>
    </header>

    <main>
        <!-- Search Container -->
        <div class="search-container">
            <div class="search-bar">
                <input type="text" id="query" placeholder="Search books, authors, genres...">
                <button class="search-btn touch-feedback" id="searchBtn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <!-- Recommendations Section -->
        <div class="content-section">
            <h2 class="section-title">Recommended For You</h2>
            <div class="books-grid" id="recommendationsGrid"></div>
        </div>

        <!-- Search Results Section -->
        <div class="content-section" id="searchResults" style="display: none;">
            <h2 class="section-title">Search Results</h2>
            <div class="books-grid" id="resultsGrid"></div>
            <button class="load-more touch-feedback" id="loadMore">Load More Books</button>
        </div>
    </main>

    <!-- Fullscreen Modal -->
    <div class="fullscreen-modal" id="fullscreenModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Book Preview</h3>
                <button class="close-btn touch-feedback" id="closeModalBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <iframe class="book-iframe" id="bookIframe" allowfullscreen></iframe>
            </div>
            <div class="modal-footer">
                <button class="modal-btn share-btn touch-feedback" id="modalShareBtn">
                    <i class="fas fa-share-alt"></i> Share
                </button>
                <button class="modal-btn download-btn touch-feedback" id="modalDownloadBtn">
                    <i class="fas fa-download"></i> Download
                </button>
            </div>
        </div>
    </div>

    <script>
        // API Key
        const apiKey = 'AIzaSyDvdyjYPX0MTlDPEwWIiCW1MdtQ6K9ri6Y';

        // DOM Elements
        const searchBtn = document.getElementById('searchBtn');
        const queryInput = document.getElementById('query');
        const recommendationsGrid = document.getElementById('recommendationsGrid');
        const searchResults = document.getElementById('searchResults');
        const resultsGrid = document.getElementById('resultsGrid');
        const loadMoreBtn = document.getElementById('loadMore');
        const fullscreenModal = document.getElementById('fullscreenModal');
        const bookIframe = document.getElementById('bookIframe');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modalShareBtn = document.getElementById('modalShareBtn');
        const modalDownloadBtn = document.getElementById('modalDownloadBtn');
        const modalTitle = document.getElementById('modalTitle');
        const particlesContainer = document.getElementById('particles');

        // State
        let currentQuery = '';
        let currentPage = 0;
        let currentBookId = '';
        let favoriteBooks = JSON.parse(localStorage.getItem('favoriteBooks') || '[]');

        // Popular book subjects for recommendations
        const popularSubjects = [
            'fiction', 'fantasy', 'science fiction', 'mystery',
            'romance', 'biography', 'history', 'science',
            'technology', 'art', 'philosophy', 'business'
        ];

        // Initialize the app
        function init() {
            createParticles();
            loadRecommendations();
            setupEventListeners();
        }

        // Create animated particles
        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random position
                particle.style.left = `${Math.random() * 100}%`;
                
                // Random animation duration and delay
                particle.style.animationDuration = `${Math.random() * 10 + 15}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                
                particlesContainer.appendChild(particle);
            }
        }

        // Set up event listeners
        function setupEventListeners() {
            searchBtn.addEventListener('click', searchBooks);
            queryInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchBooks();
            });

            closeModalBtn.addEventListener('click', closeFullscreenModal);
            modalShareBtn.addEventListener('click', shareBook);
            modalDownloadBtn.addEventListener('click', downloadBook);
            loadMoreBtn.addEventListener('click', loadMoreBooks);

            // Close modal when clicking outside content
            fullscreenModal.addEventListener('click', (e) => {
                if (e.target === fullscreenModal) {
                    closeFullscreenModal();
                }
            });

            // Close modal on ESC key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && fullscreenModal.classList.contains('active')) {
                    closeFullscreenModal();
                }
            });
        }

        // Load random recommendations
        async function loadRecommendations() {
            try {
                const randomSubject = popularSubjects[Math.floor(Math.random() * popularSubjects.length)];
                const url = `https://www.googleapis.com/books/v1/volumes?q=subject:${randomSubject}&key=${apiKey}&maxResults=12&orderBy=newest`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    displayBooks(data.items, recommendationsGrid, true);
                }
            } catch (error) {
                console.error('Error loading recommendations:', error);
            }
        }

        // Search for books
        async function searchBooks() {
            currentQuery = queryInput.value.trim();
            currentPage = 0;

            if (!currentQuery) {
                alert('Please enter a search term');
                return;
            }

            // Show loading state
            searchBtn.innerHTML = '<div class="loading"></div>';
            searchBtn.disabled = true;

            try {
                const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(currentQuery)}&key=${apiKey}&maxResults=12`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    searchResults.style.display = 'block';
                    document.querySelector('.content-section').style.display = 'none';
                    displayBooks(data.items, resultsGrid);
                    loadMoreBtn.style.display = data.items.length === 12 ? 'block' : 'none';
                } else {
                    resultsGrid.innerHTML = '<p class="no-results">No books found. Try a different search term.</p>';
                    loadMoreBtn.style.display = 'none';
                }
            } catch (error) {
                console.error('Error searching books:', error);
                resultsGrid.innerHTML = '<p class="error">Error loading books. Please try again.</p>';
            } finally {
                searchBtn.innerHTML = '<i class="fas fa-search"></i>';
                searchBtn.disabled = false;
            }
        }

        // Load more books
        async function loadMoreBooks() {
            currentPage++;
            loadMoreBtn.disabled = true;
            loadMoreBtn.innerHTML = '<div class="loading"></div> Loading...';

            try {
                const startIndex = currentPage * 12;
                const url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(currentQuery)}&key=${apiKey}&maxResults=12&startIndex=${startIndex}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    displayBooks(data.items, resultsGrid, false, true);
                    if (data.items.length < 12) {
                        loadMoreBtn.style.display = 'none';
                    }
                } else {
                    loadMoreBtn.style.display = 'none';
                }
            } catch (error) {
                console.error('Error loading more books:', error);
            } finally {
                loadMoreBtn.disabled = false;
                loadMoreBtn.textContent = 'Load More Books';
            }
        }

        // Display books in a grid
        function displayBooks(books, container, isRecommendation = false, append = false) {
            if (!append) {
                container.innerHTML = '';
            }

            books.forEach((book, index) => {
                const bookCard = createBookCard(book, isRecommendation);
                bookCard.style.animationDelay = `${index * 0.1}s`;
                container.appendChild(bookCard);
            });
        }

        // Create a book card element
        function createBookCard(book, isRecommendation = false) {
            const info = book.volumeInfo;
            const bookId = book.id;

            const card = document.createElement('div');
            card.className = 'book-card touch-feedback';

            const thumb = document.createElement('img');
            thumb.className = 'book-thumb';
            thumb.src = info.imageLinks?.thumbnail || 'https://via.placeholder.com/150x220/1a1a1a/ffffff?text=No+Cover';
            thumb.alt = info.title || 'Book cover';
            thumb.loading = 'lazy';

            const bookInfo = document.createElement('div');
            bookInfo.className = 'book-info';

            const title = document.createElement('h3');
            title.className = 'book-title';
            title.textContent = info.title || 'Untitled';

            const author = document.createElement('p');
            author.className = 'book-author';
            author.textContent = info.authors?.join(', ') || 'Unknown Author';

            const actions = document.createElement('div');
            actions.className = 'book-actions';

            const readBtn = document.createElement('button');
            readBtn.className = 'action-btn read-btn touch-feedback';
            readBtn.innerHTML = '<i class="fas fa-book-open"></i> Read';
            readBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openFullscreenModal(bookId, info.title);
            });

            const favBtn = document.createElement('button');
            favBtn.className = favoriteBooks.includes(bookId) ? 'action-btn fav-btn favorited touch-feedback' : 'action-btn fav-btn touch-feedback';
            favBtn.innerHTML = favoriteBooks.includes(bookId) ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
            favBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite(bookId, favBtn);
            });

            actions.appendChild(readBtn);
            actions.appendChild(favBtn);

            bookInfo.appendChild(title);
            bookInfo.appendChild(author);
            bookInfo.appendChild(actions);

            card.appendChild(thumb);
            card.appendChild(bookInfo);

            return card;
        }

        // Open book in fullscreen modal
        function openFullscreenModal(bookId, bookTitle) {
            currentBookId = bookId;
            modalTitle.textContent = bookTitle || 'Book Preview';
            bookIframe.src = `https://books.google.com/books?id=${bookId}&printsec=frontcover&output=embed`;
            fullscreenModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Close fullscreen modal
        function closeFullscreenModal() {
            fullscreenModal.classList.remove('active');
            bookIframe.src = '';
            document.body.style.overflow = '';
        }

        // Share book
        function shareBook() {
            const shareData = {
                title: modalTitle.textContent,
                text: `Check out this book: ${modalTitle.textContent}`,
                url: `https://books.google.com/books?id=${currentBookId}`
            };

            if (navigator.share) {
                navigator.share(shareData)
                    .catch(err => console.log('Error sharing:', err));
            } else {
                const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareData.text)}&url=${encodeURIComponent(shareData.url)}`;
                window.open(twitterUrl, '_blank');
            }
        }

        // Download book
        function downloadBook() {
            alert('Download functionality would be implemented here based on book availability');
        }

        // Toggle favorite status
        function toggleFavorite(bookId, button) {
            const index = favoriteBooks.indexOf(bookId);

            if (index === -1) {
                favoriteBooks.push(bookId);
                button.innerHTML = '<i class="fas fa-heart"></i>';
                button.classList.add('favorited');
                button.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    button.style.transform = 'scale(1)';
                }, 300);
            } else {
                favoriteBooks.splice(index, 1);
                button.innerHTML = '<i class="far fa-heart"></i>';
                button.classList.remove('favorited');
            }

            localStorage.setItem('favoriteBooks', JSON.stringify(favoriteBooks));
        }

        // Initialize the app
        init();
    </script>

    <script>
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
