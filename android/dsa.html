<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whizan - DSA Visualizer</title>
    <link rel="icon" type="image/png" href="smart study.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/editor/editor.main.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-dark: #5b21b6;
            --secondary: #a855f7;
            --accent: #c084fc;
            --bg-primary: #000000;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --border: #27272a;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .floating-shape {
            position: absolute;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite linear;
        }

        .floating-shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-shape:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 15%;
            animation-delay: -5s;
        }

        .floating-shape:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 30%;
            left: 20%;
            animation-delay: -10s;
        }

        .floating-shape:nth-child(4) {
            width: 100px;
            height: 100px;
            top: 10%;
            right: 30%;
            animation-delay: -15s;
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.1;
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 0.2;
            }
            100% {
                transform: translateY(0px) rotate(360deg);
                opacity: 0.1;
            }
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            border-radius: 8px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Main Container */
        .container {
            padding: 20px;
            max-width: 100%;
        }

        /* Code Section */
        .code-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .section-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls {
            padding: 15px 20px;
            background: var(--bg-tertiary);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .language-select {
            flex: 1;
            min-width: 120px;
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-family: 'Fira Code', monospace;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #editor {
            height: 300px;
            border-top: 1px solid var(--border);
        }

        /* Visualization Section */
        .viz-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .viz-controls {
            padding: 15px 20px;
            background: var(--bg-tertiary);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .speed-slider {
            width: 100px;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            outline: none;
            -webkit-appearance: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        #visualization {
            padding: 20px;
            min-height: 300px;
            background: var(--bg-primary);
        }

        /* Step Info */
        .step-info {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }

        .step-info h4 {
            color: var(--secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Array Visualization */
        .array-viz {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .array-element {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.5s ease;
            position: relative;
            color: var(--text-primary);
        }

        .array-element::before {
            content: attr(data-index);
            position: absolute;
            top: -20px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .array-element.highlight {
            background: var(--warning);
            border-color: var(--warning);
            color: black;
            transform: translateY(-5px) scale(1.1);
        }

        .array-element.compare {
            background: var(--error);
            border-color: var(--error);
            color: white;
        }

        .array-element.sorted {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error/Success Messages */
        .error, .success {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error);
            color: var(--error);
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
            color: var(--success);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0;
            transition: width 0.5s ease;
        }

        /* Stats */
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.2rem;
            }
            
            .logo {
                width: 35px;
                height: 35px;
            }
            
            .container {
                padding: 15px;
            }
            
            .control-row {
                flex-direction: column;
            }
            
            .btn {
                justify-content: center;
            }
            
            .speed-control {
                margin-left: 0;
                width: 100%;
                justify-content: space-between;
            }
            
            .array-element {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }
            
            #editor {
                height: 250px;
            }
            
            #visualization {
                padding: 15px;
                min-height: 250px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px;
            }
            
            .container {
                padding: 10px;
            }
            
            .array-element {
                width: 35px;
                height: 35px;
                font-size: 12px;
            }
            
            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="animated-bg">
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>
    </div>
    
    <div class="header">
        <img src="smart study.png" alt="Whizan" class="logo">
        <h1>Whizan DSA Visualizer</h1>
    </div>

    <div class="container">
        <div class="code-section">
            <div class="section-header">
                <i class="fas fa-code"></i>
                Code Editor
            </div>
            <div class="controls">
                <div class="control-row">
                    <select id="languageSelect" class="language-select">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                        <option value="c">C</option>
                    </select>
                </div>
                <div class="control-row">
                    <button id="analyzeBtn" class="btn btn-primary">
                        <i class="fas fa-search"></i> Analyze
                    </button>
                    <button id="clearBtn" class="btn btn-secondary">
                        <i class="fas fa-trash-alt"></i> Clear
                    </button>
                </div>
            </div>
            <div id="editor"></div>
        </div>

        <div class="viz-section">
            <div class="section-header">
                <i class="fas fa-play-circle"></i>
                Visualization
            </div>
            <div class="viz-controls">
                <button id="playBtn" class="btn btn-primary" disabled>
                    <i class="fas fa-play"></i> Play
                </button>
                <button id="pauseBtn" class="btn btn-secondary" disabled>
                    <i class="fas fa-pause"></i> Pause
                </button>
                <button id="stepBtn" class="btn btn-secondary" disabled>
                    <i class="fas fa-step-forward"></i> Step
                </button>
                <button id="resetBtn" class="btn btn-secondary" disabled>
                    <i class="fas fa-redo"></i> Reset
                </button>
                <div class="speed-control">
                    <label><i class="fas fa-tachometer-alt"></i> Speed:</label>
                    <input type="range" id="speedSlider" class="speed-slider" min="1" max="10" value="5">
                    <span id="speedValue">5x</span>
                </div>
            </div>
            <div id="visualization">
                <div class="loading">
                    <i class="fas fa-magic" style="font-size: 2rem; color: var(--primary); margin-bottom: 15px;"></i>
                    <h3>Ready to Visualize!</h3>
                    <p>Paste your DSA code and click "Analyze" to see the magic happen!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>
    <script>
        class DSAVisualizer {
            constructor() {
                this.editor = null;
                this.animationSteps = [];
                this.currentStep = 0;
                this.isPlaying = false;
                this.animationSpeed = 1000;
                this.apiKey = 'AIzaSyAM1p730RTRu40S1sHghd1KD4501K6iCsI';
                this.animationInterval = null;
                
                this.initializeEditor();
                this.attachEventListeners();
                this.loadSampleCode();
            }

            initializeEditor() {
                require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs' } });
                require(['vs/editor/editor.main'], () => {
                    this.editor = monaco.editor.create(document.getElementById('editor'), {
                        value: '',
                        language: 'javascript',
                        theme: 'vs-dark',
                        fontSize: 14,
                        minimap: { enabled: false },
                        scrollBeyondLastLine: false,
                        automaticLayout: true,
                        wordWrap: 'on'
                    });
                });
            }

            attachEventListeners() {
                document.getElementById('analyzeBtn').addEventListener('click', () => this.analyzeCode());
                document.getElementById('clearBtn').addEventListener('click', () => this.clearEditor());
                document.getElementById('playBtn').addEventListener('click', () => this.playAnimation());
                document.getElementById('pauseBtn').addEventListener('click', () => this.pauseAnimation());
                document.getElementById('stepBtn').addEventListener('click', () => this.stepAnimation());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetAnimation());
                
                document.getElementById('languageSelect').addEventListener('change', (e) => {
                    if (this.editor) {
                        monaco.editor.setModelLanguage(this.editor.getModel(), e.target.value);
                    }
                    this.loadSampleCode();
                });

                document.getElementById('speedSlider').addEventListener('input', (e) => {
                    const speed = parseInt(e.target.value);
                    this.animationSpeed = 2000 / speed;
                    document.getElementById('speedValue').textContent = speed + 'x';
                });
            }

            loadSampleCode() {
                const language = document.getElementById('languageSelect').value;
                const samples = {
                    javascript: `// Bubble Sort Algorithm
function bubbleSort(arr) {
    const n = arr.length;
    for (let i = 0; i < n - 1; i++) {
        for (let j = 0; j < n - i - 1; j++) {
            if (arr[j] > arr[j + 1]) {
                // Swap elements
                let temp = arr[j];
                arr[j] = arr[j + 1];
                arr[j + 1] = temp;
            }
        }
    }
    return arr;
}

// Test array
const testArray = [64, 34, 25, 12, 22, 11, 90];
console.log("Sorted:", bubbleSort([...testArray]));`,
                    
                    python: `# Binary Search Algorithm
def binary_search(arr, target):
    left, right = 0, len(arr) - 1
    
    while left <= right:
        mid = (left + right) // 2
        
        if arr[mid] == target:
            return mid
        elif arr[mid] < target:
            left = mid + 1
        else:
            right = mid - 1
    
    return -1

# Test array
test_arr = [2, 3, 4, 10, 40, 50, 60, 70]
target = 10
result = binary_search(test_arr, target)
print(f"Element found at index: {result}")`
                };

                if (this.editor && samples[language]) {
                    this.editor.setValue(samples[language]);
                }
            }

            async analyzeCode() {
                const code = this.editor.getValue();
                const language = document.getElementById('languageSelect').value;
                
                if (!code.trim()) {
                    this.showError('Please enter some code to analyze!');
                    return;
                }

                this.showLoading();
                this.disableControls();

                try {
                    const analysis = await this.callGeminiAPI(code, language);
                    this.generateVisualization(analysis);
                    this.enableControls();
                } catch (error) {
                    console.error('Analysis error:', error);
                    this.showError('Failed to analyze code: ' + error.message);
                    this.generateFallbackVisualization(code, language);
                    this.enableControls();
                }
            }

            async callGeminiAPI(code, language) {
                const prompt = `Analyze this ${language} code and provide a step-by-step explanation for visualization.

Code:
${code}

Provide a JSON response with:
{
    "algorithm": "algorithm name",
    "description": "brief description",
    "complexity": {"time": "O(n)", "space": "O(1)"},
    "steps": [
        {
            "step": 1,
            "description": "step description",
            "data": [64, 34, 25, 12, 22, 11, 90],
            "highlights": [0, 1],
            "action": "visual action description"
        }
    ]
}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${this.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.1, maxOutputTokens: 2048 }
                    })
                });

                if (!response.ok) {
                    throw new Error(`API request failed: ${response.status}`);
                }

                const data = await response.json();
                const responseText = data.candidates[0].content.parts[0].text;
                return this.parseAPIResponse(responseText);
            }

            parseAPIResponse(responseText) {
                try {
                    const jsonMatch = responseText.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        return JSON.parse(jsonMatch[0]);
                    }
                    throw new Error('No JSON found');
                } catch (error) {
                    return this.createFallbackAnalysis();
                }
            }

            createFallbackAnalysis() {
                return {
                    algorithm: 'Sorting Algorithm',
                    description: 'Step-by-step sorting visualization',
                    complexity: { time: 'O(n²)', space: 'O(1)' },
                    steps: [
                        {
                            step: 1,
                            description: 'Initialize array',
                            data: [64, 34, 25, 12, 22, 11, 90],
                            highlights: [0],
                            action: 'Starting with unsorted array'
                        },
                        {
                            step: 2,
                            description: 'Compare adjacent elements',
                            data: [64, 34, 25, 12, 22, 11, 90],
                            highlights: [0, 1],
                            action: 'Comparing elements at positions 0 and 1'
                        },
                        {
                            step: 3,
                            description: 'Swap if needed',
                            data: [34, 64, 25, 12, 22, 11, 90],
                            highlights: [0, 1],
                            action: 'Swapped 64 and 34'
                        },
                        {
                            step: 4,
                            description: 'Continue sorting',
                            data: [11, 12, 22, 25, 34, 64, 90],
                            highlights: [],
                            action: 'Array is now sorted'
                        }
                    ]
                };
            }

            generateFallbackVisualization(code, language) {
                const analysis = this.createFallbackAnalysis();
                this.generateVisualization(analysis);
            }

            generateVisualization(analysis) {
                this.animationSteps = analysis.steps || [];
                this.currentStep = 0;
                
                const vizArea = document.getElementById('visualization');
                vizArea.innerHTML = `
                    <div class="step-info">
                        <h4><i class="fas fa-project-diagram"></i> ${analysis.algorithm || 'Algorithm'}</h4>
                        <p><strong>Description:</strong> ${analysis.description || 'No description'}</p>
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-value">${analysis.complexity?.time || 'N/A'}</div>
                                <div class="stat-label">Time Complexity</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${analysis.complexity?.space || 'N/A'}</div>
                                <div class="stat-label">Space Complexity</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${this.animationSteps.length}</div>
                                <div class="stat-label">Steps</div>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                    </div>
                    <div id="step-display">
                        <h4><i class="fas fa-play"></i> Ready to start</h4>
                        <p>Click play to begin visualization</p>
                    </div>
                    <div id="visual-container"></div>
                `;

                if (this.animationSteps.length > 0) {
                    this.showSuccess(`Analysis complete! ${this.animationSteps.length} steps ready.`);
                }
            }

            playAnimation() {
                if (this.animationSteps.length === 0) return;
                
                this.isPlaying = true;
                document.getElementById('playBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                
                if (this.animationInterval) clearInterval(this.animationInterval);
                
                this.animationInterval = setInterval(() => {
                    if (this.currentStep < this.animationSteps.length && this.isPlaying) {
                        this.displayStep(this.currentStep);
                        this.currentStep++;
                        
                        const progress = (this.currentStep / this.animationSteps.length) * 100;
                        document.getElementById('progressBar').style.width = `${progress}%`;
                    } else {
                        this.pauseAnimation();
                        if (this.currentStep >= this.animationSteps.length) {
                            this.showSuccess('Animation completed!');
                        }
                    }
                }, this.animationSpeed);
            }

            pauseAnimation() {
                this.isPlaying = false;
                document.getElementById('playBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                
                if (this.animationInterval) {
                    clearInterval(this.animationInterval);
                    this.animationInterval = null;
                }
            }

            stepAnimation() {
                if (this.currentStep < this.animationSteps.length) {
                    this.displayStep(this.currentStep);
                    this.currentStep++;
                    
                    const progress = (this.currentStep / this.animationSteps.length) * 100;
                    document.getElementById('progressBar').style.width = `${progress}%`;
                }
            }

            resetAnimation() {
                this.currentStep = 0;
                this.pauseAnimation();
                document.getElementById('progressBar').style.width = '0%';
                
                const stepDisplay = document.getElementById('step-display');
                if (stepDisplay) {
                    stepDisplay.innerHTML = `
                        <h4><i class="fas fa-play"></i> Ready to start</h4>
                        <p>Click play to begin visualization</p>
                    `;
                }
                
                const visualContainer = document.getElementById('visual-container');
                if (visualContainer) {
                    visualContainer.innerHTML = '';
                }
            }

            displayStep(stepIndex) {
                const step = this.animationSteps[stepIndex];
                if (!step) return;

                const stepDisplay = document.getElementById('step-display');
                stepDisplay.innerHTML = `
                    <h4><i class="fas fa-step-forward"></i> Step ${step.step || stepIndex + 1}</h4>
                    <p><strong>Action:</strong> ${step.description || 'Processing...'}</p>
                    ${step.action ? `<p><em>${step.action}</em></p>` : ''}
                `;

                this.updateVisualization(step);
            }

            updateVisualization(step) {
                const container = document.getElementById('visual-container');
                if (!container) return;

                const data = step.data || [];
                const highlights = step.highlights || [];
                
                this.renderArrayVisualization(container, data, highlights, step.action || '');
            }

            renderArrayVisualization(container, data, highlights = [], action = '') {
                const arrayHtml = data.map((value, index) => {
                    let className = 'array-element';
                    if (highlights.includes(index)) {
                        className += ' highlight';
                    }
                    
                    return `<div class="${className}" data-index="${index}">${value}</div>`;
                }).join('');

                container.innerHTML = `
                    ${action ? `<p style="text-align: center; margin-bottom: 15px; color: var(--secondary);">
                        <i class="fas fa-arrow-down"></i> ${action}
                    </p>` : ''}
                    <div class="array-viz">${arrayHtml}</div>
                `;
            }

            clearEditor() {
                if (this.editor) {
                    this.editor.setValue('');
                }
                this.resetVisualization();
            }

            resetVisualization() {
                const vizArea = document.getElementById('visualization');
                vizArea.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-magic" style="font-size: 2rem; color: var(--primary); margin-bottom: 15px;"></i>
                        <h3>Ready to Visualize!</h3>
                        <p>Paste your DSA code and click "Analyze" to see the magic happen!</p>
                    </div>
                `;
                this.animationSteps = [];
                this.currentStep = 0;
                this.disableControls();
            }

            showLoading() {
                const vizArea = document.getElementById('visualization');
                vizArea.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <h4>Analyzing your code...</h4>
                        <p>AI is understanding your algorithm...</p>
                    </div>
                `;
            }

            showError(message) {
                const vizArea = document.getElementById('visualization');
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.innerHTML = `<strong>Error:</strong> ${message}`;
                vizArea.insertBefore(errorDiv, vizArea.firstChild);
                
                setTimeout(() => {
                    if (errorDiv.parentNode) {
                        errorDiv.remove();
                    }
                }, 5000);
            }

            showSuccess(message) {
                const vizArea = document.getElementById('visualization');
                const successDiv = document.createElement('div');
                successDiv.className = 'success';
                successDiv.innerHTML = `<strong>Success:</strong> ${message}`;
                vizArea.insertBefore(successDiv, vizArea.firstChild);
                
                setTimeout(() => {
                    if (successDiv.parentNode) {
                        successDiv.remove();
                    }
                }, 3000);
            }

            enableControls() {
                document.getElementById('playBtn').disabled = false;
                document.getElementById('stepBtn').disabled = false;
                document.getElementById('resetBtn').disabled = false;
                document.getElementById('analyzeBtn').disabled = false;
            }

            disableControls() {
                document.getElementById('playBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('stepBtn').disabled = true;
                document.getElementById('resetBtn').disabled = true;
            }
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new DSAVisualizer();
        });

        // Prevent context menu
        document.addEventListener("contextmenu", function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
