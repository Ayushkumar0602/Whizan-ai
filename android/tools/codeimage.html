<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Snippet Image Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .editor-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .preview-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 20px;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
            grid-column: 1 / -1;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            margin-bottom: 40px;
            grid-column: 1 / -1;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: white;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        textarea, select, input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'SF Mono', Consolas, 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        textarea:focus, select:focus, input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-1px);
        }

        textarea {
            height: 300px;
            resize: vertical;
        }

        select option {
            background: #2a2a2a;
            color: white;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .code-preview {
            background: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transform: scale(0.8);
            transform-origin: top;
            margin-bottom: 20px;
        }

        .window-controls {
            background: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .control-dot:hover {
            transform: scale(1.1);
        }

        .control-dot.red { background: #ff5f57; }
        .control-dot.yellow { background: #ffbd2e; }
        .control-dot.green { background: #28ca42; }

        .window-title {
            color: #888;
            font-size: 13px;
            margin-left: 10px;
        }

        .code-content {
            padding: 25px;
            font-family: 'SF Mono', Consolas, 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre;
            overflow-x: auto;
            min-height: 200px;
        }

        .line-numbers {
            color: #666;
            margin-right: 20px;
            user-select: none;
        }

        .download-btn {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        /* Syntax highlighting colors */
        .keyword { color: #ff79c6; }
        .string { color: #f1fa8c; }
        .comment { color: #6272a4; }
        .number { color: #bd93f9; }
        .operator { color: #ff79c6; }
        .function { color: #50fa7b; }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .code-preview {
                transform: scale(0.9);
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Code Image Generator</h1>
        <p class="subtitle">Transform your code snippets into beautiful, shareable images</p>
        
        <div class="editor-panel">
            <div class="form-group">
                <label for="codeInput">Your Code</label>
                <textarea id="codeInput" placeholder="Paste your code here...">function fibonacci(n) {
    if (n <= 1) return n;
    return fibonacci(n - 1) + fibonacci(n - 2);
}

// Generate first 10 fibonacci numbers
for (let i = 0; i < 10; i++) {
    console.log(`F(${i}) = ${fibonacci(i)}`);
}</textarea>
            </div>
            
            <div class="controls-grid">
                <div class="form-group">
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="json">JSON</option>
                        <option value="bash">Bash</option>
                        <option value="sql">SQL</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="theme">Theme</label>
                    <select id="theme">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                        <option value="dracula">Dracula</option>
                        <option value="monokai">Monokai</option>
                    </select>
                </div>
            </div>
            
            <div class="controls-grid">
                <div class="form-group">
                    <label for="windowTitle">Window Title</label>
                    <input type="text" id="windowTitle" value="main.js" placeholder="filename.ext">
                </div>
                
                <div class="form-group">
                    <label for="showLineNumbers">
                        <input type="checkbox" id="showLineNumbers" checked style="width: auto; margin-right: 8px;">
                        Show Line Numbers
                    </label>
                </div>
            </div>
        </div>
        
        <div class="preview-panel">
            <div class="code-preview" id="codePreview">
                <div class="window-controls">
                    <div class="control-dot red"></div>
                    <div class="control-dot yellow"></div>
                    <div class="control-dot green"></div>
                    <span class="window-title" id="previewTitle">main.js</span>
                </div>
                <div class="code-content" id="codeContent"></div>
            </div>
            
            <button class="download-btn" onclick="downloadImage()">
                📸 Download as PNG
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        // Theme configurations
        const themes = {
            dark: {
                background: '#1e1e1e',
                windowBg: '#2d2d2d',
                text: '#d4d4d4',
                keyword: '#ff79c6',
                string: '#f1fa8c',
                comment: '#6272a4',
                number: '#bd93f9',
                function: '#50fa7b'
            },
            light: {
                background: '#ffffff',
                windowBg: '#f5f5f5',
                text: '#333333',
                keyword: '#0077aa',
                string: '#aa5500',
                comment: '#999999',
                number: '#7700aa',
                function: '#00aa00'
            },
            dracula: {
                background: '#282a36',
                windowBg: '#44475a',
                text: '#f8f8f2',
                keyword: '#ff79c6',
                string: '#f1fa8c',
                comment: '#6272a4',
                number: '#bd93f9',
                function: '#50fa7b'
            },
            monokai: {
                background: '#2d2a2e',
                windowBg: '#403e41',
                text: '#fcfcfa',
                keyword: '#ff6188',
                string: '#ffd866',
                comment: '#727072',
                number: '#ab9df2',
                function: '#a9dc76'
            }
        };

        // Basic syntax highlighting
        function highlightCode(code, language) {
            let highlighted = code;
            
            // Keywords by language
            const keywords = {
                javascript: ['function', 'const', 'let', 'var', 'if', 'else', 'for', 'while', 'return', 'class', 'import', 'export'],
                python: ['def', 'class', 'if', 'else', 'elif', 'for', 'while', 'import', 'from', 'return', 'try', 'except'],
                java: ['public', 'private', 'class', 'interface', 'if', 'else', 'for', 'while', 'return', 'import', 'package'],
                cpp: ['#include', 'int', 'void', 'class', 'if', 'else', 'for', 'while', 'return', 'namespace'],
                html: ['<!DOCTYPE', '<html>', '<head>', '<body>', '<div>', '<span>', '<p>', '<a>', '<img>'],
                css: ['color', 'background', 'margin', 'padding', 'display', 'position', 'width', 'height']
            };

            // Highlight strings
            highlighted = highlighted.replace(/(["'`])((?:\\.|(?!\1)[^\\\r\n])*)\1/g, '<span class="string">$1$2$1</span>');
            
            // Highlight comments
            highlighted = highlighted.replace(/(\/\/.*$|\/\*[\s\S]*?\*\/|#.*$)/gm, '<span class="comment">$1</span>');
            
            // Highlight numbers
            highlighted = highlighted.replace(/\b(\d+\.?\d*)\b/g, '<span class="number">$1</span>');
            
            // Highlight keywords
            if (keywords[language]) {
                keywords[language].forEach(keyword => {
                    const regex = new RegExp(`\\b${keyword}\\b`, 'g');
                    highlighted = highlighted.replace(regex, `<span class="keyword">${keyword}</span>`);
                });
            }
            
            // Highlight function names
            highlighted = highlighted.replace(/(\w+)(?=\s*\()/g, '<span class="function">$1</span>');
            
            return highlighted;
        }

        function addLineNumbers(code) {
            const lines = code.split('\n');
            const maxDigits = lines.length.toString().length;
            
            return lines.map((line, index) => {
                const lineNum = (index + 1).toString().padStart(maxDigits, ' ');
                return `<span class="line-numbers">${lineNum}</span>${line}`;
            }).join('\n');
        }

        function updatePreview() {
            const code = document.getElementById('codeInput').value;
            const language = document.getElementById('language').value;
            const theme = document.getElementById('theme').value;
            const windowTitle = document.getElementById('windowTitle').value;
            const showLineNumbers = document.getElementById('showLineNumbers').checked;
            
            const themeConfig = themes[theme];
            const codePreview = document.getElementById('codePreview');
            const codeContent = document.getElementById('codeContent');
            const previewTitle = document.getElementById('previewTitle');
            
            // Apply theme
            codePreview.style.background = themeConfig.background;
            codePreview.querySelector('.window-controls').style.background = themeConfig.windowBg;
            codeContent.style.color = themeConfig.text;
            
            // Update title
            previewTitle.textContent = windowTitle;
            
            // Process code
            let processedCode = highlightCode(code, language);
            if (showLineNumbers) {
                processedCode = addLineNumbers(processedCode);
            }
            
            codeContent.innerHTML = processedCode;
            
            // Apply syntax highlighting colors
            const style = document.createElement('style');
            style.textContent = `
                .code-content .keyword { color: ${themeConfig.keyword}; }
                .code-content .string { color: ${themeConfig.string}; }
                .code-content .comment { color: ${themeConfig.comment}; }
                .code-content .number { color: ${themeConfig.number}; }
                .code-content .function { color: ${themeConfig.function}; }
            `;
            document.head.appendChild(style);
        }

        async function downloadImage() {
            const codePreview = document.getElementById('codePreview');
            
            try {
                const canvas = await html2canvas(codePreview, {
                    backgroundColor: null,
                    scale: 2,
                    useCORS: true,
                    allowTaint: true
                });
                
                const link = document.createElement('a');
                link.download = 'code-snippet.png';
                link.href = canvas.toDataURL();
                link.click();
            } catch (error) {
                console.error('Error generating image:', error);
                alert('Error generating image. Please try again.');
            }
        }

        // Event listeners
        document.getElementById('codeInput').addEventListener('input', updatePreview);
        document.getElementById('language').addEventListener('change', updatePreview);
        document.getElementById('theme').addEventListener('change', updatePreview);
        document.getElementById('windowTitle').addEventListener('input', updatePreview);
        document.getElementById('showLineNumbers').addEventListener('change', updatePreview);

        // Initial preview
        updatePreview();
    </script>
</body>
</html>
