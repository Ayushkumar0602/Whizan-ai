<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 119, 198, 0.2) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(1deg); }
            66% { transform: translateY(10px) rotate(-1deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: white;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.3rem;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .mode-switcher {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .mode-btn {
            padding: 12px 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .mode-btn.active {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        .mode-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.15);
        }

        .panel-title {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            width: 6px;
            height: 30px;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border-radius: 3px;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 20px;
            border: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'SF Mono', Consolas, 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .file-upload-area {
            border: 3px dashed rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 60px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .file-upload-area:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .file-upload-area.dragover {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .upload-text {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .file-input {
            display: none;
        }

        .image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stat-item {
            color: white;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .hidden {
            display: none;
        }

        .success-message {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid rgba(40, 167, 69, 0.5);
            color: #28a745;
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
            
            .panel {
                padding: 25px;
            }
            
            .mode-switcher {
                flex-direction: column;
                align-items: center;
            }
            
            .mode-btn {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Base64 Converter</h1>
            <p class="subtitle">Encode and decode text or images to/from Base64 format</p>
            
            <div class="mode-switcher">
                <button class="mode-btn active" data-mode="text">📝 Text Mode</button>
                <button class="mode-btn" data-mode="image">🖼️ Image Mode</button>
            </div>
        </div>

        <div class="main-content">
            <!-- Text Mode -->
            <div id="textMode">
                <div class="panel">
                    <h3 class="panel-title">Input</h3>
                    <textarea id="textInput" placeholder="Enter your text here to encode to Base64, or paste Base64 to decode..."></textarea>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="encodeText()">🔒 Encode</button>
                        <button class="btn btn-secondary" onclick="decodeText()">🔓 Decode</button>
                        <button class="btn btn-secondary" onclick="clearText()">🗑️ Clear</button>
                    </div>
                </div>
            </div>

            <!-- Image Mode -->
            <div id="imageMode" class="hidden">
                <div class="panel">
                    <h3 class="panel-title">Image Input</h3>
                    
                    <!-- Upload Section -->
                    <div id="uploadSection">
                        <div class="file-upload-area" onclick="document.getElementById('imageInput').click()">
                            <span class="upload-icon">📁</span>
                            <div class="upload-text">Click to upload or drag & drop</div>
                            <div class="upload-subtext">Supports JPG, PNG, GIF, WebP</div>
                        </div>
                        <input type="file" id="imageInput" class="file-input" accept="image/*">
                        <div id="imagePreview"></div>
                    </div>
                    
                    <!-- OR Divider -->
                    <div style="text-align: center; margin: 20px 0; color: rgba(255,255,255,0.6);">
                        <span style="background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px;">OR</span>
                    </div>
                    
                    <!-- Base64 Input Section -->
                    <div id="base64Section">
                        <textarea id="base64Input" placeholder="Paste Base64 image data here to decode (data:image/png;base64,iVBORw0K... or just the base64 string)" style="height: 120px; margin-bottom: 15px;"></textarea>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="encodeImage()">🔒 Encode to Base64</button>
                        <button class="btn btn-primary" onclick="decodeImage()">🔓 Decode from Base64</button>
                        <button class="btn btn-secondary" onclick="clearImage()">🗑️ Clear</button>
                    </div>
                </div>
            </div>

            <!-- Output Panel -->
            <div class="panel">
                <h3 class="panel-title">Output</h3>
                <textarea id="output" placeholder="Results will appear here..." readonly></textarea>
                
                <!-- Image Output Preview -->
                <div id="decodedImagePreview" class="hidden" style="margin: 20px 0; text-align: center;">
                    <div style="color: white; margin-bottom: 10px; font-weight: 600;">🖼️ Decoded Image:</div>
                    <div id="decodedImageContainer"></div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="copyOutput()">📋 Copy</button>
                    <button class="btn btn-secondary" onclick="downloadOutput()">💾 Download</button>
                    <button class="btn btn-secondary" onclick="clearOutput()">🗑️ Clear</button>
                </div>
                <div id="successMessage" class="success-message hidden">✅ Copied to clipboard!</div>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="inputSize">0</span>
                <span class="stat-label">Input Size</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="outputSize">0</span>
                <span class="stat-label">Output Size</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="efficiency">0%</span>
                <span class="stat-label">Size Change</span>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'text';
        let uploadedFile = null;

        // Mode switching
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                switchMode(mode);
            });
        });

        function switchMode(mode) {
            currentMode = mode;
            
            // Update button states
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            
            // Show/hide panels
            document.getElementById('textMode').classList.toggle('hidden', mode !== 'text');
            document.getElementById('imageMode').classList.toggle('hidden', mode !== 'image');
            
            // Clear previous data
            clearAll();
        }

        // Text encoding/decoding
        function encodeText() {
            const input = document.getElementById('textInput').value;
            if (!input.trim()) {
                alert('Please enter some text to encode');
                return;
            }
            
            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                document.getElementById('output').value = encoded;
                updateStats(input.length, encoded.length);
                animateSuccess();
            } catch (error) {
                alert('Error encoding text: ' + error.message);
            }
        }

        function decodeText() {
            const input = document.getElementById('textInput').value;
            if (!input.trim()) {
                alert('Please enter Base64 text to decode');
                return;
            }
            
            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                document.getElementById('output').value = decoded;
                updateStats(input.length, decoded.length);
                animateSuccess();
            } catch (error) {
                alert('Invalid Base64 format. Please check your input.');
            }
        }

        // Image handling
        document.getElementById('imageInput').addEventListener('change', handleImageSelect);

        // Drag and drop
        const uploadArea = document.querySelector('.file-upload-area');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleImageFile(files[0]);
            }
        });

        function handleImageSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleImageFile(file);
            }
        }

        function handleImageFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select a valid image file');
                return;
            }
            
            uploadedFile = file;
            
            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById('imagePreview');
                preview.innerHTML = `<img src="${e.target.result}" class="image-preview" alt="Preview">`;
            };
            reader.readAsDataURL(file);
        }

        function encodeImage() {
            if (!uploadedFile) {
                alert('Please select an image first');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const base64 = e.target.result;
                document.getElementById('output').value = base64;
                updateStats(uploadedFile.size, base64.length);
                hideDecodedImage();
                animateSuccess();
            };
            reader.readAsDataURL(uploadedFile);
        }

        function decodeImage() {
            const base64Input = document.getElementById('base64Input').value.trim();
            if (!base64Input) {
                alert('Please paste Base64 image data to decode');
                return;
            }
            
            try {
                let base64Data = base64Input;
                
                // If it doesn't start with data:, assume it's just the base64 string
                if (!base64Data.startsWith('data:')) {
                    // Try to detect image type or default to PNG
                    base64Data = `data:image/png;base64,${base64Data}`;
                }
                
                // Validate base64 format
                if (!base64Data.match(/^data:image\/(png|jpg|jpeg|gif|webp);base64,/)) {
                    throw new Error('Invalid image Base64 format');
                }
                
                // Create image to test if it's valid
                const img = new Image();
                img.onload = () => {
                    // Success - show the decoded image
                    document.getElementById('output').value = `Decoded image successfully!\nDimensions: ${img.width}x${img.height}px\nFormat: ${getImageFormat(base64Data)}`;
                    showDecodedImage(base64Data);
                    updateStats(base64Data.length, calculateImageSize(img.width, img.height));
                    animateSuccess();
                };
                img.onerror = () => {
                    throw new Error('Invalid or corrupted image data');
                };
                img.src = base64Data;
                
            } catch (error) {
                alert('Error decoding image: ' + error.message);
            }
        }

        function showDecodedImage(base64Data) {
            const preview = document.getElementById('decodedImagePreview');
            const container = document.getElementById('decodedImageContainer');
            
            container.innerHTML = `
                <img src="${base64Data}" class="image-preview" alt="Decoded Image" style="max-width: 100%; max-height: 300px;">
                <div style="margin-top: 10px;">
                    <button class="btn btn-secondary" onclick="downloadDecodedImage('${base64Data}')" style="margin-right: 10px;">💾 Download Image</button>
                    <button class="btn btn-secondary" onclick="copyImageToClipboard('${base64Data}')">📋 Copy Image</button>
                </div>
            `;
            
            preview.classList.remove('hidden');
        }

        function hideDecodedImage() {
            document.getElementById('decodedImagePreview').classList.add('hidden');
        }

        function downloadDecodedImage(base64Data) {
            const link = document.createElement('a');
            link.href = base64Data;
            link.download = `decoded-image.${getImageFormat(base64Data)}`;
            link.click();
        }

        function copyImageToClipboard(base64Data) {
            // Copy the base64 data URL to clipboard
            navigator.clipboard.writeText(base64Data).then(() => {
                showSuccessMessage();
            }).catch(() => {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = base64Data;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showSuccessMessage();
            });
        }

        function getImageFormat(base64Data) {
            const match = base64Data.match(/data:image\/([^;]+);base64,/);
            return match ? match[1] : 'png';
        }

        function calculateImageSize(width, height) {
            // Rough estimate of uncompressed image size
            return width * height * 4; // 4 bytes per pixel (RGBA)
        }

        // Utility functions
        function copyOutput() {
            const output = document.getElementById('output');
            if (!output.value) {
                alert('Nothing to copy');
                return;
            }
            
            output.select();
            document.execCommand('copy');
            showSuccessMessage();
        }

        function downloadOutput() {
            const output = document.getElementById('output').value;
            if (!output) {
                alert('Nothing to download');
                return;
            }
            
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentMode === 'text' ? 'base64-text.txt' : 'base64-image.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearText() {
            document.getElementById('textInput').value = '';
        }

        function clearImage() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('base64Input').value = '';
            uploadedFile = null;
            hideDecodedImage();
        }

        function clearOutput() {
            document.getElementById('output').value = '';
            hideDecodedImage();
            updateStats(0, 0);
        }

        function clearAll() {
            clearText();
            clearImage();
            clearOutput();
        }

        function updateStats(inputSize, outputSize) {
            const inputSizeFormatted = formatBytes(inputSize);
            const outputSizeFormatted = formatBytes(outputSize);
            const efficiency = inputSize > 0 ? Math.round(((outputSize - inputSize) / inputSize) * 100) : 0;
            
            document.getElementById('inputSize').textContent = inputSizeFormatted;
            document.getElementById('outputSize').textContent = outputSizeFormatted;
            document.getElementById('efficiency').textContent = efficiency >= 0 ? `+${efficiency}%` : `${efficiency}%`;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function showSuccessMessage() {
            const message = document.getElementById('successMessage');
            message.classList.remove('hidden');
            setTimeout(() => {
                message.classList.add('hidden');
            }, 2000);
        }

        function animateSuccess() {
            const output = document.getElementById('output');
            output.style.transform = 'scale(1.02)';
            output.style.boxShadow = '0 0 20px rgba(255, 107, 107, 0.3)';
            setTimeout(() => {
                output.style.transform = 'scale(1)';
                output.style.boxShadow = 'none';
            }, 300);
        }

        // Real-time input tracking for text mode
        document.getElementById('textInput').addEventListener('input', (e) => {
            if (currentMode === 'text') {
                updateStats(e.target.value.length, 0);
            }
        });
    </script>
</body>
</html>
