<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Whizan Music Player</title>
  <link rel="icon" type="image/png" href="smart study.png">
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000000;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated Background */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .music-wave {
      position: absolute;
      background: linear-gradient(45deg, #1db954, #1ed760);
      border-radius: 50%;
      opacity: 0.1;
      animation: musicFloat 15s infinite ease-in-out;
    }

    .music-wave:nth-child(1) {
      width: 100px;
      height: 100px;
      top: 20%;
      left: 10%;
      animation-delay: 0s;
    }

    .music-wave:nth-child(2) {
      width: 150px;
      height: 150px;
      top: 60%;
      right: 15%;
      animation-delay: -5s;
    }

    .music-wave:nth-child(3) {
      width: 80px;
      height: 80px;
      bottom: 30%;
      left: 20%;
      animation-delay: -10s;
    }

    @keyframes musicFloat {
      0%, 100% {
        transform: translateY(0px) scale(1);
        opacity: 0.1;
      }
      50% {
        transform: translateY(-30px) scale(1.2);
        opacity: 0.2;
      }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #111111, #1a1a1a);
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      width: 40px;
      height: 40px;
      margin-right: 15px;
      border-radius: 8px;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(45deg, #1db954, #1ed760);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .container {
      padding: 20px;
      max-width: 100%;
    }

    #loginBtn {
      background: linear-gradient(45deg, #1db954, #1ed760);
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(29, 185, 84, 0.3);
      display: block;
      margin: 20px auto;
    }

    #loginBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(29, 185, 84, 0.4);
    }

    .player-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 20px;
    }

    .section {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section-title {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: #1db954;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 15px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.02);
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    button {
      background: linear-gradient(45deg, #1db954, #1ed760);
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 5px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(29, 185, 84, 0.4);
    }

    .results, .playlist-items {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 15px;
    }

    .track-item, .playlist-item {
      display: flex;
      align-items: center;
      padding: 12px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .track-item:hover, .playlist-item:hover {
      background: rgba(29, 185, 84, 0.2);
      transform: translateX(5px);
    }

    .track-image, .playlist-image {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      margin-right: 15px;
      object-fit: cover;
    }

    .track-info, .playlist-info {
      flex: 1;
    }

    .track-name, .playlist-name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .track-artist, .playlist-description {
      opacity: 0.7;
      font-size: 14px;
    }

    .now-playing {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .now-playing-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    #cover {
      width: 120px;
      height: 120px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease;
    }

    #cover:hover {
      transform: scale(1.05);
    }

    .track-details {
      text-align: center;
    }

    #trackInfo {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .control {
      font-size: 20px;
      padding: 12px 15px;
      border-radius: 50px;
      min-width: 50px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
    }

    .control:hover {
      background: linear-gradient(45deg, #1db954, #1ed760);
    }

    .volume-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: 15px;
    }

    input[type="range"] {
      width: 150px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #1db954;
      cursor: pointer;
    }

    .loading {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #1db954;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    .error {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin: 10px 0;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Library Tabs */
    .library-tabs {
      display: flex;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      overflow-x: auto;
    }

    .tab-button {
      background: none;
      border: none;
      padding: 10px 15px;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }

    .tab-button.active {
      color: #1db954;
      border-bottom: 2px solid #1db954;
    }

    .library-content {
      display: none;
    }

    .library-content.active {
      display: block;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.2rem;
      }
      
      .logo {
        width: 35px;
        height: 35px;
      }
      
      .container {
        padding: 15px;
      }
      
      .now-playing-content {
        flex-direction: column;
      }
      
      .controls {
        gap: 8px;
      }
      
      .control {
        padding: 10px 12px;
        font-size: 18px;
      }
      
      #cover {
        width: 100px;
        height: 100px;
      }
      
      .volume-control {
        flex-direction: column;
        gap: 10px;
      }
      
      input[type="range"] {
        width: 200px;
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 15px;
      }
      
      .container {
        padding: 10px;
      }
      
      .section {
        padding: 15px;
      }
      
      .track-image, .playlist-image {
        width: 40px;
        height: 40px;
      }
      
      .controls {
        gap: 5px;
      }
      
      .control {
        padding: 8px 10px;
        font-size: 16px;
        min-width: 40px;
      }
    }
  </style>
</head>

<body>
  <div class="animated-bg">
    <div class="music-wave"></div>
    <div class="music-wave"></div>
    <div class="music-wave"></div>
  </div>

  <div class="header">
    <img src="smart study.png" alt="Whizan" class="logo">
    <h1>Whizan Music Player</h1>
  </div>

  <div class="container">
    <button id="loginBtn">🎵 Connect to Spotify</button>

    <div id="playerUI" style="display:none">
      <div class="player-container">
        <div class="section">
          <h3 class="section-title">🔍 Search Music</h3>
          <input id="searchInput" type="text" placeholder="Search for tracks, artists, albums..." />
          <button onclick="search()">Search</button>
          <div id="results" class="results"></div>
        </div>

        <div class="section">
          <div class="library-tabs">
            <button class="tab-button active" onclick="openLibraryTab('playlists')">Playlists</button>
            <button class="tab-button" onclick="openLibraryTab('liked-songs')">Liked Songs</button>
            <button class="tab-button" onclick="openLibraryTab('albums')">Albums</button>
            <button class="tab-button" onclick="openLibraryTab('artists')">Artists</button>
          </div>

          <div id="playlists-tab" class="library-content active">
            <button onclick="createPlaylist()">➕ New Playlist</button>
            <div id="playlists" class="playlist-items"></div>
          </div>

          <div id="liked-songs-tab" class="library-content">
            <div id="likedSongs" class="playlist-items"></div>
          </div>

          <div id="albums-tab" class="library-content">
            <div id="albums" class="playlist-items"></div>
          </div>

          <div id="artists-tab" class="library-content">
            <div id="artists" class="playlist-items"></div>
          </div>
        </div>
      </div>

      <div class="now-playing">
        <h3 class="section-title">🎶 Now Playing</h3>
        <div class="now-playing-content">
          <img id="cover" src="https://via.placeholder.com/120x120/1db954/ffffff?text=♪" alt="Album Cover" />
          <div class="track-details">
            <div id="trackInfo">Select a track to start playing...</div>
            <div id="artistInfo"></div>
            <div id="albumInfo"></div>
          </div>
        </div>

        <div class="controls">
          <button class="control" onclick="previousTrack()" title="Previous">⏮️</button>
          <button class="control" onclick="togglePlay()" title="Play/Pause" id="playBtn">⏯️</button>
          <button class="control" onclick="nextTrack()" title="Next">⏭️</button>
          <button class="control" onclick="toggleShuffle()" title="Shuffle" id="shuffleBtn">🔀</button>
          <button class="control" onclick="toggleRepeat()" title="Repeat" id="repeatBtn">🔁</button>
        </div>

        <div class="volume-control">
          <span>🔊</span>
          <input type="range" min="0" max="1" step="0.01" value="0.5" onchange="setVolume(this.value)" />
          <span>Volume</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const clientId = "e88322dea3144c5d8a09d69dc7b71b3b";
    const redirectUri = window.location.origin + window.location.pathname;
    const scopes = [
      'streaming',
      'user-read-email',
      'user-read-private',
      'user-modify-playback-state',
      'user-read-playback-state',
      'playlist-read-private',
      'playlist-read-collaborative',
      'user-library-read',
      'user-library-modify',
      'playlist-modify-public',
      'playlist-modify-private'
    ].join(' ');

    let player, deviceId;
    let currentPlaylistTracks = [];
    let isShuffled = false;
    let repeatMode = 0;
    let isPlaying = false;
    let currentTrack = null;

    function generateCodeVerifier(length = 64) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
      let result = '';
      for (let i = 0; i < length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
      return result;
    }

    async function generateCodeChallenge(codeVerifier) {
      const data = new TextEncoder().encode(codeVerifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    document.getElementById("loginBtn").onclick = async () => {
      const verifier = generateCodeVerifier();
      const challenge = await generateCodeChallenge(verifier);
      sessionStorage.setItem("code_verifier", verifier);
      const params = new URLSearchParams({
        client_id: clientId,
        response_type: "code",
        redirect_uri: redirectUri,
        code_challenge_method: "S256",
        code_challenge: challenge,
        scope: scopes
      });
      window.location = `https://accounts.spotify.com/authorize?${params.toString()}`;
    };

    async function getAccessToken() {
      const code = new URLSearchParams(window.location.search).get("code");
      if (!code) return null;

      const verifier = sessionStorage.getItem("code_verifier");
      if (!verifier) return null;

      const body = new URLSearchParams({
        client_id: clientId,
        grant_type: "authorization_code",
        code,
        redirect_uri: redirectUri,
        code_verifier: verifier
      });

      try {
        const res = await fetch("https://accounts.spotify.com/api/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body
        });

        if (!res.ok) throw new Error(`Token request failed: ${res.status}`);

        const data = await res.json();
        sessionStorage.setItem("access_token", data.access_token);
        sessionStorage.setItem("refresh_token", data.refresh_token);
        window.history.replaceState({}, document.title, redirectUri);
        return data.access_token;
      } catch (error) {
        console.error('Token exchange error:', error);
        return null;
      }
    }

    async function apiRequest(url, options = {}) {
      const token = sessionStorage.getItem("access_token");
      const defaultOptions = {
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      };

      const mergedOptions = { ...defaultOptions, ...options };
      const response = await fetch(url, mergedOptions);

      if (!response.ok) {
        throw new Error(`API request failed: ${response.status}`);
      }

      return response.json();
    }

    function search() {
      const query = document.getElementById("searchInput").value;
      if (!query.trim()) return;

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';

      apiRequest(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=10`)
        .then(data => {
          resultsDiv.innerHTML = "";
          if (data.tracks && data.tracks.items.length > 0) {
            data.tracks.items.forEach(track => {
              const div = document.createElement("div");
              div.className = "track-item";
              div.innerHTML = `
                <img src="${track.album.images[2]?.url || 'https://via.placeholder.com/50x50/1db954/ffffff?text=♪'}" alt="Track" class="track-image">
                <div class="track-info">
                  <div class="track-name">${track.name}</div>
                  <div class="track-artist">${track.artists.map(a => a.name).join(', ')}</div>
                </div>
              `;
              div.onclick = () => playTrack(track.uri, track);
              resultsDiv.appendChild(div);
            });
          } else {
            resultsDiv.innerHTML = '<div class="loading">No results found</div>';
          }
        })
        .catch(err => {
          console.error('Search error:', err);
          resultsDiv.innerHTML = '<div class="error">Search failed. Please try again.</div>';
        });
    }

    async function loadPlaylists() {
      const playlistsDiv = document.getElementById("playlists");
      playlistsDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Loading playlists...</div>';

      try {
        const data = await apiRequest('https://api.spotify.com/v1/me/playlists?limit=20');
        playlistsDiv.innerHTML = "";
        
        if (data.items && data.items.length > 0) {
          data.items.forEach(playlist => {
            const div = document.createElement("div");
            div.className = "playlist-item";
            div.innerHTML = `
              <img src="${playlist.images?.[0]?.url || 'https://via.placeholder.com/50x50/1db954/ffffff?text=♪'}" alt="Playlist" class="playlist-image">
              <div class="playlist-info">
                <div class="playlist-name">${playlist.name}</div>
                <div class="playlist-description">${playlist.tracks.total} tracks</div>
              </div>
            `;
            div.onclick = () => loadPlaylistTracks(playlist.id, playlist.name);
            playlistsDiv.appendChild(div);
          });
        } else {
          playlistsDiv.innerHTML = '<div class="loading">No playlists found</div>';
        }
      } catch (error) {
        console.error('Error loading playlists:', error);
        playlistsDiv.innerHTML = '<div class="error">Failed to load playlists</div>';
      }
    }

    async function loadPlaylistTracks(playlistId, playlistName) {
      try {
        const data = await apiRequest(`https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=50`);
        currentPlaylistTracks = data.items.filter(item => item.track && item.track.uri).map(item => item.track);

        if (currentPlaylistTracks.length > 0) {
          const firstTrack = currentPlaylistTracks[0];
          await playPlaylist(currentPlaylistTracks.map(t => t.uri));
          updateNowPlaying(firstTrack, `Playing from: ${playlistName}`);
        }
      } catch (error) {
        console.error('Error loading playlist tracks:', error);
      }
    }

    async function playPlaylist(uris) {
      if (!deviceId) return;
      try {
        await apiRequest(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
          method: "PUT",
          body: JSON.stringify({ uris })
        });
      } catch (error) {
        console.error('Error playing playlist:', error);
      }
    }

    async function playTrack(uri, track) {
      if (!deviceId) return;
      try {
        await apiRequest(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
          method: "PUT",
          body: JSON.stringify({ uris: [uri] })
        });
        currentTrack = track;
        updateNowPlaying(track);
      } catch (error) {
        console.error('Error playing track:', error);
      }
    }

    function updateNowPlaying(track, subtitle = '') {
      document.getElementById("trackInfo").textContent = track.name;
      document.getElementById("cover").src = track.album.images[1]?.url || track.album.images[0]?.url || 'https://via.placeholder.com/120x120/1db954/ffffff?text=♪';
      
      const artistInfo = document.getElementById("artistInfo");
      const albumInfo = document.getElementById("albumInfo");
      if (artistInfo) artistInfo.textContent = track.artists.map(a => a.name).join(', ');
      if (albumInfo) albumInfo.textContent = subtitle || track.album.name;
    }

    function togglePlay() {
      if (player) {
        player.togglePlay().then(() => {
          isPlaying = !isPlaying;
          const playBtn = document.getElementById('playBtn');
          if (playBtn) playBtn.textContent = isPlaying ? '⏸️' : '▶️';
        });
      }
    }

    function nextTrack() {
      if (player) player.nextTrack();
    }

    function previousTrack() {
      if (player) player.previousTrack();
    }

    function setVolume(volume) {
      if (player) player.setVolume(parseFloat(volume));
    }

    function toggleShuffle() {
      isShuffled = !isShuffled;
      const btn = document.getElementById('shuffleBtn');
      btn.style.background = isShuffled ? 'linear-gradient(45deg, #1db954, #1ed760)' : 'rgba(255, 255, 255, 0.1)';
    }

    function toggleRepeat() {
      repeatMode = (repeatMode + 1) % 3;
      const btn = document.getElementById('repeatBtn');
      const colors = ['rgba(255, 255, 255, 0.1)', 'linear-gradient(45deg, #1db954, #1ed760)', 'linear-gradient(45deg, #1ed760, #1db954)'];
      btn.style.background = colors[repeatMode];
      btn.textContent = repeatMode === 2 ? '🔂' : '🔁';
    }

    function openLibraryTab(tabName) {
      document.querySelectorAll('.library-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelectorAll('.tab-button').forEach(button => {
        button.classList.remove('active');
      });

      document.getElementById(`${tabName}-tab`).classList.add('active');
      document.querySelector(`.tab-button[onclick="openLibraryTab('${tabName}')"]`).classList.add('active');

      if (tabName === 'playlists') {
        loadPlaylists();
      }
    }

    function createPlaylist() {
      const name = prompt("Enter playlist name:");
      if (name) {
        // Implementation for creating playlist
        alert("Playlist creation feature coming soon!");
      }
    }

    document.getElementById("searchInput").addEventListener("keypress", function (event) {
      if (event.key === "Enter") {
        search();
      }
    });

    window.onSpotifyWebPlaybackSDKReady = () => {
      const token = sessionStorage.getItem("access_token");
      if (!token) return;

      player = new Spotify.Player({
        name: "Whizan Music Player",
        getOAuthToken: cb => cb(token),
        volume: 0.5
      });

      player.addListener("ready", ({ device_id }) => {
        deviceId = device_id;
        console.log("Ready with Device ID", deviceId);
      });

      player.addListener("player_state_changed", state => {
        if (state && state.track_window && state.track_window.current_track) {
          const track = state.track_window.current_track;
          currentTrack = track;
          updateNowPlaying(track);
          isPlaying = !state.paused;
          const playBtn = document.getElementById('playBtn');
          if (playBtn) playBtn.textContent = isPlaying ? '⏸️' : '▶️';
        }
      });

      player.connect();
    };

    (async () => {
      const params = new URLSearchParams(window.location.search);
      let token = sessionStorage.getItem("access_token");

      if (!token && params.get("code")) {
        token = await getAccessToken();
      }

      if (token) {
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("playerUI").style.display = "block";
        
        if (typeof Spotify !== 'undefined' && !player) {
          window.onSpotifyWebPlaybackSDKReady();
        }
        
        loadPlaylists();
      }
    })();

    // Prevent context menu
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });
  </script>
</body>
</html>
