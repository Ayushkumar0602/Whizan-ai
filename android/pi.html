<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whizan - AI Companion</title>
    <link rel="icon" type="image/png" href="smart study.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0 50%; }
        }

        /* Animated background elements */
        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -2;
            animation: pulseGlow 8s ease infinite;
        }
        
        .glow-1 {
            background: #8a2be2;
            top: 10%;
            left: 5%;
        }
        
        .glow-2 {
            background: #ff6b6b;
            bottom: 5%;
            right: 5%;
            animation-delay: 2s;
        }
        
        .glow-3 {
            background: #4ecdc4;
            top: 50%;
            right: 20%;
            animation-delay: 4s;
        }
        
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.3); opacity: 0.25; }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            background: rgba(138, 43, 226, 0.6);
            border-radius: 50%;
            filter: blur(1px);
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(20vw);
                opacity: 0;
            }
        }

        .app-header {
            background: linear-gradient(135deg, #1a1a1a, #000000);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .app-logo {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .app-title {
            flex: 1;
        }

        .app-title h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #8a2be2, #ff6b6b, #4ecdc4);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGradient 3s ease infinite;
        }

        @keyframes textGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-title p {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .voice-toggle {
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid #8a2be2;
            color: white;
            cursor: pointer;
            font-size: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .voice-toggle:hover {
            background: rgba(138, 43, 226, 0.4);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
        }

        .privacy-note {
            color: #888;
            font-size: 13px;
            margin: 15px 20px;
            text-align: center;
            background: rgba(26, 26, 26, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chatbot-container {
            flex: 1;
            margin: 0 20px 20px 20px;
            background: rgba(26, 26, 26, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(15px);
            border: 1px solid #333;
            height: calc(100vh - 200px);
            animation: containerSlide 0.8s ease;
        }

        @keyframes containerSlide {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .message {
            margin-bottom: 15px;
            max-width: 85%;
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.5;
            animation: messageSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            font-size: 15px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: linear-gradient(135deg, #8a2be2, #6a1b9a);
            color: #fff;
            margin-left: auto;
            border-top-right-radius: 8px;
            box-shadow: 0 8px 25px rgba(138, 43, 226, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bot-message {
            background: rgba(40, 40, 40, 0.8);
            color: #fff;
            margin-right: auto;
            border-top-left-radius: 8px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(138, 43, 226, 0.4);
        }

        .thinking-indicator {
            display: flex;
            gap: 8px;
            padding: 10px 0;
            justify-content: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #8a2be2, #ff6b6b);
            border-radius: 50%;
            animation: bounce 1.6s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .chat-footer {
            padding: 20px;
            border-top: 1px solid #333;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .chat-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            border: 1px solid #444;
            border-radius: 25px;
            padding: 15px 20px;
            resize: none;
            outline: none;
            font-size: 16px;
            max-height: 120px;
            min-height: 50px;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-family: inherit;
            line-height: 1.4;
        }

        .message-input:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.2);
            transform: translateY(-2px);
        }

        .message-input::placeholder {
            color: #666;
        }

        .send-button {
            background: linear-gradient(135deg, #8a2be2, #ff6b6b);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
            box-shadow: 0 8px 25px rgba(138, 43, 226, 0.3);
            position: relative;
            overflow: hidden;
        }

        .send-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: all 0.6s ease;
        }

        .send-button:hover::before {
            left: 100%;
        }

        .send-button:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 12px 35px rgba(138, 43, 226, 0.5);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            font-weight: 500;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.3);
        }

        .navigation {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(26, 26, 26, 0.9);
            padding: 10px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            z-index: 1000;
        }

        .nav-btn {
            padding: 12px 20px;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid #8a2be2;
            border-radius: 20px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-align: center;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #8a2be2;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.4);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(138, 43, 226, 0.5);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(138, 43, 226, 0.8);
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .app-header {
                padding: 12px 15px;
            }

            .app-logo {
                width: 40px;
                height: 40px;
            }

            .app-title h1 {
                font-size: 20px;
            }

            .chatbot-container {
                margin: 0 15px 15px 15px;
                height: calc(100vh - 180px);
            }

            .chat-body {
                padding: 15px;
            }

            .message {
                font-size: 14px;
                padding: 12px 16px;
                max-width: 90%;
            }

            .send-button {
                width: 45px;
                height: 45px;
                font-size: 16px;
            }

            .voice-toggle {
                width: 45px;
                height: 45px;
                font-size: 16px;
            }

            .message-input {
                padding: 12px 16px;
                font-size: 15px;
            }

            .privacy-note {
                font-size: 12px;
                margin: 10px 15px;
                padding: 8px 15px;
            }

            .navigation {
                bottom: 15px;
                flex-wrap: wrap;
                max-width: calc(100% - 30px);
            }

            .nav-btn {
                padding: 10px 15px;
                font-size: 12px;
            }
        }

        /* Touch-friendly improvements */
        .send-button, .voice-toggle, .nav-btn {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
    </style>
</head>

<body>
    <!-- Background elements -->
    <div class="particles" id="particles"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>

    <div class="main-content">
        <div class="app-header">
            <img src="smart study.png" alt="Whizan Logo" class="app-logo">
            <div class="app-title">
                <h1>Whizan</h1>
                <p>AI Companion</p>
            </div>
            <button class="voice-toggle" id="voice-toggle">🔊</button>
        </div>

        <div class="privacy-note">
            We do not store your chats — feel free to share your thoughts 🧠💬
        </div>

        <div class="chatbot-container">
            <div class="chat-body" id="chat-body">
                <div class="message bot-message">
                    Hello there! I'm your emotional AI companion. I'm here to listen, understand, and support you.
                    Whether you need someone to talk to, motivation, or just a friendly ear, I'm here for you.
                    What's on your mind today?
                </div>
            </div>

            <div class="chat-footer">
                <form class="chat-form" id="chat-form">
                    <textarea class="message-input" id="message-input" placeholder="Type your message..." rows="1"></textarea>
                    <button type="submit" class="send-button">➤</button>
                </form>
                <div id="error-message" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- <div class="navigation">
        <a href="cheat.html" class="nav-btn">📄 Cheat</a>
        <a href="humaniser.html" class="nav-btn">🤖 Humanizer</a>
        <a href="pi.html" class="nav-btn active">💬 AI Chat</a>
    </div> -->

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Create floating particles
            function createParticles() {
                const particlesContainer = document.getElementById('particles');
                const particleCount = window.innerWidth < 768 ? 20 : 40;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    
                    const size = Math.random() * 6 + 2;
                    const posX = Math.random() * 100;
                    const posY = Math.random() * 100 + 100;
                    const duration = Math.random() * 20 + 10;
                    const delay = Math.random() * 10;
                    const opacity = Math.random() * 0.5 + 0.1;
                    
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.left = `${posX}%`;
                    particle.style.top = `${posY}%`;
                    particle.style.animationDuration = `${duration}s`;
                    particle.style.animationDelay = `-${delay}s`;
                    particle.style.opacity = opacity;
                    
                    const colors = ['rgba(138, 43, 226, 0.6)', 'rgba(255, 107, 107, 0.6)', 'rgba(78, 205, 196, 0.6)'];
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    
                    particlesContainer.appendChild(particle);
                }
            }

            const chatBody = document.getElementById('chat-body');
            const messageInput = document.getElementById('message-input');
            const chatForm = document.getElementById('chat-form');
            const voiceToggle = document.getElementById('voice-toggle');
            const errorMessage = document.getElementById('error-message');

            const GEMINI_API_KEY = "AIzaSyAM1p730RTRu40S1sHghd1KD4501K6iCsI";
            const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

            const ELEVENLABS_API_KEY = "sk_2fc9127e6f6e89ee237b7aeb82ad9759abe91b63d679a12d";
            const ELEVENLABS_VOICE_ID = "XB0fDUnXU5powFXDhCwa";

            const SYSTEM_INSTRUCTION = {
                role: "user",
                parts: [{
                    text: `You are an emotional AI companion named "Empathy". Your purpose is to provide compassionate, understanding responses to users who need emotional support. Be warm, empathetic, and non-judgmental. Adapt your tone to match the user's emotional state - if they're sad, be comforting; if they're happy, be celebratory. Offer thoughtful advice when asked, but primarily focus on active listening and validation. Keep responses conversational and human-like, but maintain appropriate boundaries. Help users process their feelings and explore solutions when appropriate.`
                }]
            };

            let voiceEnabled = true;
            let chatHistory = [SYSTEM_INSTRUCTION];

            createParticles();

            voiceToggle.addEventListener('click', function () {
                voiceEnabled = !voiceEnabled;
                this.textContent = voiceEnabled ? '🔊' : '🔇';
                if (voiceEnabled) {
                    this.style.boxShadow = '0 0 20px rgba(138, 43, 226, 0.6)';
                } else {
                    this.style.boxShadow = '0 0 20px rgba(255, 0, 0, 0.5)';
                }
            });

            async function speak(text) {
                if (!voiceEnabled) return;

                try {
                    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'xi-api-key': ELEVENLABS_API_KEY
                        },
                        body: JSON.stringify({
                            text: text,
                            model_id: "eleven_monolingual_v1",
                            voice_settings: {
                                stability: 0.5,
                                similarity_boost: 0.7
                            }
                        })
                    });

                    if (!response.ok) throw new Error("Failed to fetch audio");

                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                } catch (error) {
                    console.error("Error with ElevenLabs TTS:", error);
                }
            }

            function addMessage(text, isUser) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                messageDiv.textContent = text;
                chatBody.appendChild(messageDiv);
                chatBody.scrollTop = chatBody.scrollHeight;

                if (!isUser) speak(text);
            }

            function showThinking() {
                const thinkingDiv = document.createElement('div');
                thinkingDiv.className = 'message bot-message';
                thinkingDiv.innerHTML = `
                        <div class="thinking-indicator">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>`;
                chatBody.appendChild(thinkingDiv);
                chatBody.scrollTop = chatBody.scrollHeight;
                return thinkingDiv;
            }

            async function generateAIResponse(userMessage) {
                chatHistory.push({ role: "user", parts: [{ text: userMessage }] });

                try {
                    const response = await fetch(GEMINI_API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: chatHistory,
                            generationConfig: {
                                temperature: 0.7,
                                topP: 0.9,
                                topK: 40
                            }
                        })
                    });

                    if (!response.ok) throw new Error(`API error ${response.status}`);
                    const data = await response.json();

                    const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!aiResponse) throw new Error("Invalid response format");

                    chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
                    return aiResponse;
                } catch (err) {
                    console.error("Gemini error:", err);
                    throw err;
                }
            }

            chatForm.addEventListener('submit', async function (e) {
                e.preventDefault();

                const userMessage = messageInput.value.trim();
                if (!userMessage) return;

                errorMessage.textContent = '';
                addMessage(userMessage, true);
                messageInput.value = '';
                messageInput.style.height = 'auto';

                const thinkingDiv = showThinking();

                try {
                    const aiResponse = await generateAIResponse(userMessage);
                    chatBody.removeChild(thinkingDiv);
                    addMessage(aiResponse, false);
                } catch (error) {
                    chatBody.removeChild(thinkingDiv);
                    errorMessage.textContent = "Sorry, I'm having trouble responding. Please try again.";
                }
            });

            messageInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    chatForm.dispatchEvent(new Event('submit'));
                }
            });

            // Auto-resize textarea
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            messageInput.focus();
        });

        // Disable context menu
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
