<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whizan - Course Discussion</title>
    <link rel="icon" type="image/png" href="smart study.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --success-gradient: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --warning-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --error-gradient: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --bg-card: #1e1e1e;
            --bg-input: #252525;
            
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-tertiary: #666666;
            --text-accent: #667eea;
            
            --border-primary: #333333;
            --border-secondary: #444444;
            --border-accent: #667eea;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-10px) rotate(1deg); }
            66% { transform: translateY(5px) rotate(-1deg); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .bg-orb:nth-child(1) {
            width: 300px;
            height: 300px;
            background: var(--primary-gradient);
            top: -150px;
            right: -150px;
            animation-delay: 0s;
        }

        .bg-orb:nth-child(2) {
            width: 200px;
            height: 200px;
            background: var(--secondary-gradient);
            bottom: -100px;
            left: -100px;
            animation-delay: -7s;
        }

        .bg-orb:nth-child(3) {
            width: 250px;
            height: 250px;
            background: var(--accent-gradient);
            top: 50%;
            right: -125px;
            animation-delay: -14s;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-primary);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--primary-gradient);
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }

        .app-logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
        }

        .app-logo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            animation: shimmer 3s infinite;
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            border: 1px solid var(--border-primary);
            transition: all 0.3s ease;
        }

        .user-profile:hover {
            border-color: var(--border-accent);
            box-shadow: var(--shadow-glow);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* Main Container */
        .main-container {
            display: flex;
            height: calc(100vh - 65px);
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-primary);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            z-index: 50;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-primary);
        }

        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .sidebar-subtitle {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .course-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .course-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.3s ease-out;
        }

        .course-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary-gradient);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: -1;
        }

        .course-item:hover::before {
            left: 0;
            opacity: 0.1;
        }

        .course-item:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-accent);
            transform: translateX(4px);
        }

        .course-item.active {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-accent);
            box-shadow: var(--shadow-glow);
        }

        .course-item.active::before {
            left: 0;
            opacity: 0.15;
        }

        .course-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: var(--shadow-sm);
        }

        .course-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
        }

        .course-badge {
            background: var(--success-gradient);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .course-item:hover .course-badge {
            opacity: 1;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
        }

        .chat-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px);
        }

        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-gradient);
            animation: pulse 2s infinite;
        }

        .chat-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            position: relative;
            width: 200px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: var(--bg-input);
            border: 1px solid var(--border-primary);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--border-accent);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 16px;
        }

        .online-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            border: 1px solid var(--border-primary);
        }

        .online-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success-gradient);
            animation: pulse 2s infinite;
        }

        .online-count {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
            position: relative;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--border-secondary);
            border-radius: 2px;
        }

        .message {
            margin-bottom: 16px;
            animation: slideUp 0.3s ease-out;
            position: relative;
        }

        .message.own {
            display: flex;
            justify-content: flex-end;
        }

        .message.other {
            display: flex;
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .message-bubble:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .message.own .message-bubble {
            background: var(--primary-gradient);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.other .message-bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-primary);
            border-bottom-left-radius: 6px;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            font-size: 12px;
            opacity: 0.8;
        }

        .message-author {
            font-weight: 600;
        }

        .message.own .message-author {
            color: rgba(255, 255, 255, 0.9);
        }

        .message.other .message-author {
            color: var(--text-accent);
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
        }

        .message-text {
            line-height: 1.4;
            font-size: 14px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            margin-left: 8px;
            opacity: 0.6;
            transition: all 0.3s ease;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        /* Typing Indicator */
        .typing-indicator {
            padding: 0 20px 12px;
            font-size: 12px;
            color: var(--text-tertiary);
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 20px;
        }

        .typing-dots {
            display: flex;
            gap: 2px;
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--text-tertiary);
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        /* Input Area */
        .input-area {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-primary);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-primary);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .message-input:focus {
            border-color: var(--border-accent);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .message-input::placeholder {
            color: var(--text-tertiary);
        }

        .send-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .send-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .send-button:hover::before {
            transform: translateX(100%);
        }

        .send-button:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: var(--shadow-glow);
        }

        .send-button:disabled {
            background: var(--bg-tertiary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .send-button i {
            font-size: 18px;
            z-index: 1;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: float 3s infinite ease-in-out;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-subtitle {
            font-size: 14px;
            opacity: 0.7;
            max-width: 300px;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                left: -100%;
                z-index: 200;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
            }

            .search-box {
                display: none;
            }

            .user-name {
                display: none;
            }

            .message-bubble {
                max-width: 85%;
            }

            .course-name {
                font-size: 13px;
            }

            .app-title {
                font-size: 18px;
            }

            .chat-title {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 10px 16px;
            }

            .input-area {
                padding: 12px 16px;
            }

            .messages-container {
                padding: 16px;
            }

            .message-bubble {
                max-width: 90%;
                padding: 10px 14px;
            }
        }

        /* Loading Animation */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-primary);
            border-top: 3px solid var(--text-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
            box-shadow: var(--shadow-lg);
        }

        .notification.success {
            background: var(--success-gradient);
        }

        .notification.error {
            background: var(--error-gradient);
        }

        /* Menu Toggle for Mobile */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .menu-toggle:hover {
            background: var(--bg-tertiary);
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }
        }

        /* Overlay for mobile sidebar */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 768px) {
            .sidebar-overlay.active {
                display: block;
            }
        }
    </style>
</head>

<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>

    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Header -->
    <div class="header">
        <div class="logo-section">
            <button class="menu-toggle" id="menu-toggle">
                <i class="material-icons">menu</i>
            </button>
            <div class="app-logo">
                <img src="smart study.png" alt="Smart Study" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <i class="material-icons" style="display: none; color: white;">school</i>
            </div>
            <div class="app-title">Whizan</div>
        </div>
        <div class="user-profile">
            <div class="user-avatar" id="user-avatar">U</div>
            <span class="user-name" id="user-name">User</span>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Course Discussions</div>
                <div class="sidebar-subtitle">Select a course to start chatting</div>
            </div>
            <div class="course-list" id="course-list">
                <!-- Courses will be loaded here -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-title" id="chat-title">
                    <div class="chat-status"></div>
                    Select a course
                </div>
                <div class="chat-actions">
                    <div class="search-box">
                        <input type="text" class="search-input" id="message-search" placeholder="Search messages...">
                        <i class="material-icons search-icon">search</i>
                    </div>
                    <div class="online-indicator" id="online-users">
                        <div class="online-dot"></div>
                        <span class="online-count" id="online-count">0 online</span>
                    </div>
                </div>
            </div>

            <div class="messages-container" id="messages-container">
                <div class="empty-state">
                    <i class="material-icons empty-icon">forum</i>
                    <div class="empty-title">Welcome to Whizan</div>
                    <div class="empty-subtitle">Select a course from the sidebar to start your discussion</div>
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator"></div>

            <div class="input-area">
                <input type="text" class="message-input" id="message-input" placeholder="Type your message..." disabled>
                <button class="send-button" id="send-button" disabled>
                    <i class="material-icons">send</i>
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        let currentUser = null;
        let currentCourse = null;
        let typingTimeout = null;
        let onlineUsers = {};

        // DOM elements
        const courseList = document.getElementById('course-list');
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const chatTitle = document.getElementById('chat-title');
        const onlineCount = document.getElementById('online-count');
        const typingIndicator = document.getElementById('typing-indicator');
        const userAvatar = document.getElementById('user-avatar');
        const userName = document.getElementById('user-name');
        const messageSearch = document.getElementById('message-search');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        // Cache for user names
        const userNameCache = {};

        // Mobile menu functionality
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('active');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        });

        // Initialize the app
        async function init() {
            // Initialize Firebase from backend config
            const configResponse = await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/getConfig');
            const config = await configResponse.json();
            firebase.initializeApp(config.firebase);
            
            const auth = firebase.auth();
            const db = firebase.firestore();

            auth.onAuthStateChanged(async user => {
                if (user) {
                    currentUser = user;
                    try {
                        const idToken = await user.getIdToken();
                        setupUserProfile();
                        await loadEnrolledCourses(idToken);
                    } catch (error) {
                        console.error('Authentication error:', error);
                        window.location.href = "auth.html";
                    }
                } else {
                    window.location.href = "auth.html";
                }
            });
        }

        // Set up user profile display
        function setupUserProfile() {
            const initial = currentUser.displayName ? currentUser.displayName.charAt(0).toUpperCase() : 'U';
            userAvatar.textContent = initial;
            userName.textContent = currentUser.displayName || 'User';
            userNameCache[currentUser.uid] = currentUser.displayName || 'User';
        }

        // Load user's enrolled courses
        async function loadEnrolledCourses(idToken) {
            try {
                const response = await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/getEnrolledCourses', {
                    headers: {
                        'Authorization': `Bearer ${idToken}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load courses');
                }

                const { courses } = await response.json();
                renderCourseList(courses);
            } catch (error) {
                console.error("Error loading enrolled courses:", error);
                showNotification('Failed to load courses. Please refresh.', 'error');
            }
        }

        // Render the list of enrolled courses
        function renderCourseList(courses) {
            courseList.innerHTML = '';

            if (courses.length === 0) {
                courseList.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: var(--text-tertiary);">
                        <i class="material-icons" style="font-size: 48px; margin-bottom: 12px; opacity: 0.5;">school</i>
                        <div>No courses enrolled yet</div>
                    </div>
                `;
                return;
            }

            courses.forEach((course, index) => {
                const li = document.createElement('div');
                li.className = 'course-item';
                li.dataset.courseId = course.id;
                li.style.animationDelay = `${index * 0.1}s`;
                li.innerHTML = `
                    <div class="course-icon">
                        <i class="material-icons">${course.icon || 'book'}</i>
                    </div>
                    <span class="course-name">${course.name}</span>
                    <span class="course-badge">NEW</span>
                `;
                li.addEventListener('click', () => {
                    selectCourse(course);
                    // Close mobile sidebar
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('open');
                        sidebarOverlay.classList.remove('active');
                    }
                });
                courseList.appendChild(li);
            });
        }

        // Select a course to chat in
        async function selectCourse(course) {
            // Update UI
            document.querySelectorAll('.course-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`.course-item[data-course-id="${course.id}"]`).classList.add('active');

            // Set current course
            currentCourse = course;
            chatTitle.innerHTML = `
                <div class="chat-status"></div>
                ${course.name}
            `;

            // Enable input
            messageInput.disabled = false;
            sendButton.disabled = false;

            // Show loading state
            messagesContainer.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            `;

            try {
                const idToken = await currentUser.getIdToken();
                await loadExistingMessages(course.id, idToken);
                setupRealtimeListeners(idToken);
                await updatePresence(true, idToken);
                
                // Mark as read
                localStorage.setItem(`lastRead_${course.id}`, Date.now());
            } catch (error) {
                console.error("Error selecting course:", error);
                showNotification('Failed to load chat. Please try again.', 'error');
            }
        }

        // Load existing messages for the selected course
        async function loadExistingMessages(courseId, idToken) {
            try {
                const response = await fetch(`https://us-central1-study2-7bdc7.cloudfunctions.net/getChatMessages?courseId=${courseId}`, {
                    headers: {
                        'Authorization': `Bearer ${idToken}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load messages');
                }

                const { messages } = await response.json();
                messagesContainer.innerHTML = '';

                if (messages.length === 0) {
                    messagesContainer.innerHTML = `
                        <div class="empty-state">
                            <i class="material-icons empty-icon">chat</i>
                            <div class="empty-title">No messages yet</div>
                            <div class="empty-subtitle">Be the first to start the conversation!</div>
                        </div>
                    `;
                    return;
                }

                // Render each message
                for (const message of messages) {
                    await renderMessage(message, message.id);
                }

                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } catch (error) {
                console.error("Error loading messages:", error);
                messagesContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="material-icons empty-icon">error</i>
                        <div class="empty-title">Failed to load messages</div>
                        <div class="empty-subtitle">Please try again later</div>
                    </div>
                `;
            }
        }

        // Set up realtime database listeners
        function setupRealtimeListeners(idToken) {
            if (!currentCourse) return;

            // Initialize Firebase Realtime Database
            const rtdb = firebase.database();

            // Clear previous listeners
            if (window.messageListener) {
                rtdb.ref(`course_chats/${currentCourse.id}/messages`).off('child_added', window.messageAddedListener);
            }
            if (window.typingListener) {
                rtdb.ref(`course_chats/${currentCourse.id}/typing`).off('value', window.typingListener);
            }
            if (window.presenceListener) {
                rtdb.ref(`course_chats/${currentCourse.id}/online`).off('value', window.presenceListener);
            }

            // Listen for new messages
            window.messageAddedListener = rtdb.ref(`course_chats/${currentCourse.id}/messages`).on('child_added', async snapshot => {
                // Only render messages that were added after our initial load
                setTimeout(async () => {
                    const message = snapshot.val();
                    if (!document.querySelector(`.message[data-message-id="${snapshot.key}"]`)) {
                        await renderMessage(message, snapshot.key);
                    }
                }, 100);
            });

            // Listen for typing indicators
            window.typingListener = rtdb.ref(`course_chats/${currentCourse.id}/typing`).on('value', snapshot => {
                const typingData = snapshot.val() || {};
                const typingUsers = Object.keys(typingData).filter(uid => uid !== currentUser.uid && typingData[uid]);

                if (typingUsers.length > 0) {
                    typingIndicator.innerHTML = `
                        <span>${typingUsers.length > 1 ? 'Several people' : 'Someone'} is typing</span>
                        <div class="typing-dots">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    `;
                } else {
                    typingIndicator.innerHTML = '';
                }
            });

            // Listen for online users
            window.presenceListener = rtdb.ref(`course_chats/${currentCourse.id}/online`).on('value', snapshot => {
                onlineUsers = snapshot.val() || {};
                const count = Object.keys(onlineUsers).length;
                onlineCount.textContent = `${count} online`;
            });
        }

        // Send a new message
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentCourse) return;

            try {
                const idToken = await currentUser.getIdToken();
                
                const response = await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/sendMessage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({
                        courseId: currentCourse.id,
                        text: text
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to send message');
                }

                messageInput.value = '';
                // Clear typing indicator
                await updateTypingStatus(false, idToken);
            } catch (error) {
                console.error("Error sending message:", error);
                showNotification('Failed to send message. Please try again.', 'error');
            }
        }

        // Delete a message
        async function deleteMessage(messageId) {
            if (!currentCourse || !messageId) return;

            if (confirm('Are you sure you want to delete this message?')) {
                try {
                    const idToken = await currentUser.getIdToken();
                    
                    const response = await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/deleteMessage', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${idToken}`
                        },
                        body: JSON.stringify({
                            courseId: currentCourse.id,
                            messageId: messageId
                        })
                    });

                    if (!response.ok) {
                        throw new Error('Failed to delete message');
                    }
                } catch (error) {
                    console.error("Error deleting message:", error);
                    showNotification('Failed to delete message.', 'error');
                }
            }
        }

        // Update typing status
        async function updateTypingStatus(isTyping, idToken) {
            if (!currentCourse) return;

            try {
                await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/updateTypingStatus', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({
                        courseId: currentCourse.id,
                        isTyping: isTyping
                    })
                });

                // Clear previous timeout if exists
                if (typingTimeout) clearTimeout(typingTimeout);

                // Automatically set typing to false after 3 seconds
                if (isTyping) {
                    typingTimeout = setTimeout(() => {
                        updateTypingStatus(false, idToken);
                    }, 3000);
                }
            } catch (error) {
                console.error("Error updating typing status:", error);
            }
        }

        // Update user presence
        async function updatePresence(isOnline, idToken) {
            if (!currentCourse) return;

            try {
                await fetch('https://us-central1-study2-7bdc7.cloudfunctions.net/updatePresence', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${idToken}`
                    },
                    body: JSON.stringify({
                        courseId: currentCourse.id,
                        isOnline: isOnline
                    })
                });
            } catch (error) {
                console.error("Error updating presence:", error);
            }
        }

        // Show notification
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;

            document.body.appendChild(notification);
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Render a message in the chat
        async function renderMessage(message, messageId) {
            // Get or fetch user name
            let userName = userNameCache[message.userId];
            if (!userName) {
                try {
                    // Try to fetch user name if not cached
                    const idToken = await currentUser.getIdToken();
                    const response = await fetch(`https://us-central1-study2-7bdc7.cloudfunctions.net/getUserName?userId=${message.userId}`, {
                        headers: {
                            'Authorization': `Bearer ${idToken}`
                        }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        userName = data.name || 'Unknown User';
                        userNameCache[message.userId] = userName;
                    } else {
                        userName = 'Unknown User';
                    }
                } catch (error) {
                    userName = 'Unknown User';
                }
            }

            // Create message element
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${message.userId === currentUser.uid ? 'own' : 'other'}`;
            messageDiv.dataset.messageId = messageId;

            // Format timestamp
            const timestamp = message.createdAt ? new Date(message.createdAt.seconds * 1000 || message.createdAt) : new Date();
            const timeString = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Create message HTML
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-header">
                        <span class="message-author">${userName}</span>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="message-time">${timeString}</span>
                            ${message.userId === currentUser.uid ? `<button class="delete-btn" onclick="deleteMessage('${messageId}')" title="Delete message">×</button>` : ''}
                        </div>
                    </div>
                    <div class="message-text">${escapeHtml(message.text)}</div>
                </div>
            `;

            // Add to messages container
            messagesContainer.appendChild(messageDiv);

            // Auto-scroll to bottom if user is near bottom
            const isNearBottom = messagesContainer.scrollTop + messagesContainer.clientHeight >= messagesContainer.scrollHeight - 100;
            if (isNearBottom) {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        messageInput.addEventListener('input', async () => {
            if (currentUser) {
                const idToken = await currentUser.getIdToken();
                updateTypingStatus(messageInput.value.trim().length > 0, idToken);
            }
        });
        document.addEventListener('visibilitychange', async () => {
            if (currentUser) {
                const idToken = await currentUser.getIdToken();
                updatePresence(document.visibilityState === 'visible', idToken);
            }
        });
        messageSearch.addEventListener('input', (e) => {
            // Implement message search functionality here
        });

        // Initialize the app
        window.addEventListener('load', async () => {
            await init();
            window.addEventListener('beforeunload', async () => {
                if (currentUser) {
                    const idToken = await currentUser.getIdToken();
                    await updatePresence(false, idToken);
                }
            });
        });

        // Prevent context menu
        document.addEventListener("contextmenu", function (e) {
            e.preventDefault();
        });
    </script>
</body>

</html>
