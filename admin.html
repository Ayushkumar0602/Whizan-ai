<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One-Night Stand with a Subject - Admin Panel</title>
    <link rel="icon" type="image/png" href="Smart Study.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root {
            --primary-color: #6c63ff;
            --secondary-color: #4d44db;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --info-color: #17a2b8;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--dark-color);
            background-color: #100f0f;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: rgb(32, 11, 11);
            box-shadow: var(--box-shadow);
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
        }

        .stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: var(--border-radius);
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .nav-tab {
            padding: 12px 20px;
            background: white;
            border: none;
            border-radius: var(--border-radius) var(--border-radius) 0 0;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-tab.active {
            background: var(--primary-color);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .page-title {
            font-size: 32px;
            margin-bottom: 20px;
            color: var(--secondary-color);
        }

        .card {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 25px;
            margin-bottom: 25px;
        }

        .card-title {
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--secondary-color);
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark-color);
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: var(--border-radius);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
        }

        .btn-secondary {
            background-color: var(--light-color);
            color: var(--dark-color);
        }

        .btn-secondary:hover {
            background-color: #e2e6ea;
        }

        .btn-danger {
            background-color: var(--danger-color);
        }

        .btn-danger:hover {
            background-color: #c82333;
        }

        .btn-warning {
            background-color: var(--warning-color);
            color: var(--dark-color);
        }

        .btn-warning:hover {
            background-color: #e0a800;
        }

        .btn-success {
            background-color: var(--success-color);
        }

        .btn-success:hover {
            background-color: #218838;
        }

        .btn-info {
            background-color: var(--info-color);
        }

        .btn-info:hover {
            background-color: #138496;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .video-section {
            border: 2px dashed #ddd;
            border-radius: var(--border-radius);
            padding: 20px;
            margin: 15px 0;
            background: #fafafa;
        }

        .video-section.active {
            border-color: var(--primary-color);
            background: rgba(108, 99, 255, 0.05);
        }

        .video-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 15px;
        }

        .video-title {
            font-weight: 600;
            color: var(--secondary-color);
            flex-grow: 1;
        }

        .subject-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .subject-card {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            border-left: 4px solid #ddd;
        }

        .subject-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .subject-card.highlighted {
            border-left-color: var(--warning-color);
            background: linear-gradient(135deg, #fffaf0, white);
        }

        .subject-card.featured {
            border-left-color: var(--success-color);
            background: linear-gradient(135deg, #f0fff4, white);
        }

        .subject-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--secondary-color);
        }

        .subject-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .subject-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .meta-tag {
            background: var(--light-color);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .meta-tag.difficulty-easy {
            background: #d4edda;
            color: #155724;
        }

        .meta-tag.difficulty-medium {
            background: #fff3cd;
            color: #856404;
        }

        .meta-tag.difficulty-hard {
            background: #f8d7da;
            color: #721c24;
        }

        .video-count {
            background: var(--info-color);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .subject-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .search-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .filter-select {
            min-width: 150px;
        }

        .bulk-actions {
            background: var(--light-color);
            padding: 15px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            display: none;
        }

        .bulk-actions.active {
            display: block;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .hidden {
            display: none !important;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            color: white;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--success-color);
        }

        .notification.error {
            background: var(--danger-color);
        }

        .notification.info {
            background: var(--info-color);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .stats {
                justify-content: center;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .subject-list {
                grid-template-columns: 1fr;
            }

            .subject-actions {
                flex-direction: column;
            }

            .search-filter {
                flex-direction: column;
                align-items: stretch;
            }

            .nav-tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
            }
        }

        .export-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .analytics-card {
            background: white;
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            text-align: center;
        }

        .analytics-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .analytics-label {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <header>
        <div class="container header-content">
            <div class="logo">📚 One-Night Stand with a Subject - Enhanced Admin</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="total-subjects">0</div>
                    <div class="stat-label">Total Subjects</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-videos">0</div>
                    <div class="stat-label">Total Videos</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="highlighted-count">0</div>
                    <div class="stat-label">Highlighted</div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('create')">✨ Create Subject</button>
            <button class="nav-tab" onclick="switchTab('manage')">📋 Manage Subjects</button>
            <button class="nav-tab" onclick="switchTab('analytics')">📊 Analytics</button>
            <button class="nav-tab" onclick="switchTab('settings')">⚙️ Settings</button>
        </div>

        <!-- Create Subject Tab -->
        <div id="create-tab" class="tab-content active">
            <div class="card">
                <h2 class="card-title">
                    <span>Create New Subject</span>
                    <button type="button" onclick="resetForm()" class="btn-secondary btn-small">🔄 Reset Form</button>
                </h2>
                <form id="subject-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="subject-name">📝 Subject Name *</label>
                            <input type="text" id="subject-name" required placeholder="e.g., Advanced Mathematics">
                        </div>

                        <div class="form-group">
                            <label for="subject-category">🏷️ Category</label>
                            <select id="subject-category">
                                <option value="Mathematics">Mathematics</option>
                                <option value="Physics">Physics</option>
                                <option value="chemistry">chemistry</option>

                                <option value="Programming">Programming</option>
                                <option value="Language">Language</option>
                                <option value="Business">Business</option>
                                <option value="Arts">Arts</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="difficulty-level">⭐ Difficulty Level</label>
                            <select id="difficulty-level">
                                <option value="Beginner">Beginner</option>
                                <option value="Intermediate">Intermediate</option>
                                <option value="Advanced">Advanced</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="estimated-time">⏱️ Estimated Study Time (hours)</label>
                            <input type="number" id="estimated-time" min="1" max="100" placeholder="e.g., 10">
                        </div>

                        <div class="form-group full-width">
                            <label for="subject-desc">📄 Description *</label>
                            <textarea id="subject-desc" rows="4" required
                                placeholder="Provide a detailed description of the subject..."></textarea>
                        </div>

                        <div class="form-group full-width">
                            <label for="learning-objectives">🎯 Learning Objectives</label>
                            <textarea id="learning-objectives" rows="3"
                                placeholder="What will students learn? (One objective per line)"></textarea>
                        </div>
                    </div>

                    <!-- Videos Section -->
                    <div class="form-group full-width">
                        <label>🎥 YouTube Videos</label>
                        <div id="videos-container">
                            <!-- Video sections will be added here -->
                        </div>
                        <button type="button" onclick="addVideoSection()" class="btn-info">➕ Add Video</button>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="practice-links">📚 Practice Materials (Google Drive Links)</label>
                            <textarea id="practice-links" rows="4" placeholder="Enter one link per line"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="recall-links">❓ Recall Questions (Google Drive Links)</label>
                            <textarea id="recall-links" rows="4" placeholder="Enter one link per line"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="additional-resources">🔗 Additional Resources</label>
                            <textarea id="additional-resources" rows="4"
                                placeholder="Enter useful links, books, websites, etc."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="prerequisites">📋 Prerequisites</label>
                            <textarea id="prerequisites" rows="4"
                                placeholder="What knowledge is required before starting?"></textarea>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="highlight-subject">
                            <label for="highlight-subject">🌟 Highlight this subject</label>
                        </div>
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="feature-subject">
                            <label for="feature-subject">⭐ Feature this subject</label>
                        </div>
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="is-public">
                            <label for="is-public">🌐 Make this subject public</label>
                        </div>
                    </div>

                    <div class="progress-bar hidden" id="upload-progress">
                        <div class="progress-fill"></div>
                    </div>

                    <button type="submit" id="submit-btn">💾 Save Subject</button>
                    <button type="button" onclick="previewSubject()" class="btn-info">👁️ Preview</button>
                </form>
            </div>
        </div>

        <!-- Manage Subjects Tab -->
        <div id="manage-tab" class="tab-content">
            <div class="card">
                <h2 class="card-title">📋 Manage Subjects</h2>

                <div class="search-filter">
                    <input type="text" placeholder="🔍 Search subjects..." class="search-box" id="search-input"
                        onkeyup="filterSubjects()">
                    <select class="filter-select" id="category-filter" onchange="filterSubjects()">
                        <option value="">All Categories</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Science">Science</option>
                        <option value="Programming">Programming</option>
                        <option value="Language">Language</option>
                        <option value="Business">Business</option>
                        <option value="Arts">Arts</option>
                        <option value="Other">Other</option>
                    </select>
                    <select class="filter-select" id="difficulty-filter" onchange="filterSubjects()">
                        <option value="">All Levels</option>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                    <button onclick="toggleBulkMode()" class="btn-secondary" id="bulk-mode-btn">☑️ Bulk Select</button>
                </div>

                <div class="bulk-actions" id="bulk-actions">
                    <strong>Bulk Actions:</strong>
                    <button onclick="bulkHighlight()" class="btn-warning btn-small">🌟 Highlight Selected</button>
                    <button onclick="bulkDelete()" class="btn-danger btn-small">🗑️ Delete Selected</button>
                    <button onclick="bulkExport()" class="btn-info btn-small">📤 Export Selected</button>
                    <span id="selected-count">0 selected</span>
                </div>

                <div class="subject-list" id="admin-subject-list">
                    <!-- Subjects will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Analytics Tab -->
        <div id="analytics-tab" class="tab-content">
            <div class="card">
                <h2 class="card-title">📊 Analytics Dashboard</h2>
                <div class="analytics-grid">
                    <div class="analytics-card">
                        <div class="analytics-number" id="total-subjects-analytics">0</div>
                        <div class="analytics-label">Total Subjects</div>
                    </div>
                    <div class="analytics-card">
                        <div class="analytics-number" id="total-videos-analytics">0</div>
                        <div class="analytics-label">Total Videos</div>
                    </div>
                    <div class="analytics-card">
                        <div class="analytics-number" id="avg-videos-per-subject">0</div>
                        <div class="analytics-label">Avg Videos/Subject</div>
                    </div>
                    <div class="analytics-card">
                        <div class="analytics-number" id="most-popular-category">-</div>
                        <div class="analytics-label">Popular Category</div>
                    </div>
                </div>

                <div class="export-options">
                    <button onclick="exportToJSON()" class="btn-info">📄 Export to JSON</button>
                    <button onclick="exportToCSV()" class="btn-success">📊 Export to CSV</button>
                    <button onclick="generateReport()" class="btn-warning">📋 Generate Report</button>
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings-tab" class="tab-content">
            <div class="card">
                <h2 class="card-title">⚙️ Application Settings</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="default-category">Default Category</label>
                        <select id="default-category">
                            <option value="Other">Other</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Science">Science</option>
                            <option value="Programming">Programming</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="auto-save">Auto-save interval (minutes)</label>
                        <input type="number" id="auto-save" value="5" min="1" max="60">
                    </div>
                </div>
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="enable-notifications" checked>
                    <label for="enable-notifications">Enable notifications</label>
                </div>
                <button onclick="saveSettings()" class="btn-success">💾 Save Settings</button>
                <button onclick="resetSettings()" class="btn-danger">🔄 Reset to Default</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCVYdfql5aqHrChlA1v3nxRLkIbYyWMvUg",
            authDomain: "study2-7bdc7.firebaseapp.com",
            databaseURL: "https://study2-7bdc7-default-rtdb.firebaseio.com",
            projectId: "study2-7bdc7",
            storageBucket: "study2-7bdc7.appspot.com",
            messagingSenderId: "320617984870",
            appId: "1:320617984870:web:04b61ea4ee88ae057e4ea7",
            measurementId: "G-VRM14GRNWG"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Global variables
        let editingSubjectId = null;
        let videoCount = 0;
        let bulkMode = false;
        let selectedSubjects = new Set();
        let allSubjects = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function () {
            addVideoSection(); // Add first video section by default
            loadAdminSubjects();
            updateStats();
        });

        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));

            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'analytics') {
                updateAnalytics();
            }
        }

        // Video section management
        function addVideoSection() {
            videoCount++;
            const container = document.getElementById('videos-container');
            const videoSection = document.createElement('div');
            videoSection.className = 'video-section';
            videoSection.id = `video-section-${videoCount}`;

            videoSection.innerHTML = `
                <div class="video-header">
                    <span class="video-title">Video ${videoCount}</span>
                    <button type="button" onclick="removeVideoSection(${videoCount})" class="btn-danger btn-small">🗑️ Remove</button>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="video-title-${videoCount}">Video Title *</label>
                        <input type="text" id="video-title-${videoCount}" required placeholder="e.g., Introduction to Calculus">
                    </div>
                    <div class="form-group">
                        <label for="video-duration-${videoCount}">Duration (minutes)</label>
                        <input type="number" id="video-duration-${videoCount}" min="1" placeholder="e.g., 45">
                    </div>
                    <div class="form-group full-width">
                        <label for="video-url-${videoCount}">YouTube URL *</label>
                        <input type="url" id="video-url-${videoCount}" required placeholder="https://www.youtube.com/watch?v=...">
                    </div>
                    <div class="form-group full-width">
                        <label for="video-description-${videoCount}">Video Description</label>
                        <textarea id="video-description-${videoCount}" rows="3" placeholder="What does this video cover?"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="video-order-${videoCount}">Order</label>
                        <input type="number" id="video-order-${videoCount}" value="${videoCount}" min="1">
                    </div>
                    <div class="form-group">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="video-featured-${videoCount}">
                            <label for="video-featured-${videoCount}">Featured Video</label>
                        </div>
                    </div>
                </div>
            `;

            container.appendChild(videoSection);
        }

        function removeVideoSection(id) {
            const section = document.getElementById(`video-section-${id}`);
            if (section) {
                section.remove();
            }
        }

        // Form handling
        const subjectForm = document.getElementById('subject-form');
        subjectForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            showProgress(true);

            try {
                const formData = collectFormData();

                if (editingSubjectId) {
                    await db.collection("subjects").doc(editingSubjectId).update({
                        ...formData,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showNotification('Subject updated successfully!', 'success');
                } else {
                    await db.collection("subjects").add({
                        ...formData,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showNotification('Subject created successfully!', 'success');
                }

                resetForm();
                loadAdminSubjects();
                updateStats();

            } catch (error) {
                console.error("Error saving subject: ", error);
                showNotification('Error saving subject. Please try again.', 'error');
            } finally {
                showProgress(false);
            }
        });

        function collectFormData() {
            const videos = [];
            const videoSections = document.querySelectorAll('.video-section');

            videoSections.forEach((section, index) => {
                const sectionId = section.id.split('-')[2];
                const title = document.getElementById(`video-title-${sectionId}`)?.value;
                const url = document.getElementById(`video-url-${sectionId}`)?.value;

                if (title && url) {
                    videos.push({
                        title: title,
                        url: url,
                        description: document.getElementById(`video-description-${sectionId}`)?.value || '',
                        duration: parseInt(document.getElementById(`video-duration-${sectionId}`)?.value) || 0,
                        order: parseInt(document.getElementById(`video-order-${sectionId}`)?.value) || index + 1,
                        featured: document.getElementById(`video-featured-${sectionId}`)?.checked || false
                    });
                }
            });

            return {
                name: document.getElementById('subject-name').value,
                description: document.getElementById('subject-desc').value,
                category: document.getElementById('subject-category').value,
                difficulty: document.getElementById('difficulty-level').value,
                estimatedTime: parseInt(document.getElementById('estimated-time').value) || 0,
                learningObjectives: document.getElementById('learning-objectives').value.split('\n').filter(obj => obj.trim()),
                videos: videos,
                practiceLinks: document.getElementById('practice-links').value.split('\n').filter(link => link.trim()),
                recallLinks: document.getElementById('recall-links').value.split('\n').filter(link => link.trim()),
                additionalResources: document.getElementById('additional-resources').value.split('\n').filter(link => link.trim()),
                prerequisites: document.getElementById('prerequisites').value.split('\n').filter(req => req.trim()),
                highlighted: document.getElementById('highlight-subject').checked,
                featured: document.getElementById('feature-subject').checked,
                isPublic: document.getElementById('is-public').checked
            };
        }

        function resetForm() {
            subjectForm.reset();
            document.getElementById('videos-container').innerHTML = '';
            videoCount = 0;
            editingSubjectId = null;
            addVideoSection();
            document.getElementById('submit-btn').textContent = '💾 Save Subject';
        }

        // Load and display subjects
        function loadAdminSubjects() {
            const subjectList = document.getElementById('admin-subject-list');
            subjectList.innerHTML = '<div style="text-align: center; padding: 20px;">Loading subjects...</div>';

            db.collection("subjects").orderBy("createdAt", "desc").get().then((querySnapshot) => {
                allSubjects = [];
                subjectList.innerHTML = '';

                if (querySnapshot.empty) {
                    subjectList.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">No subjects found. Create your first subject!</div>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const subject = { id: doc.id, ...doc.data() };
                    allSubjects.push(subject);
                    renderSubjectCard(subject);
                });

                updateStats();
            }).catch(error => {
                console.error("Error loading subjects: ", error);
                subjectList.innerHTML = '<div style="text-align: center; padding: 40px; color: #dc3545;">Error loading subjects. Please refresh the page.</div>';
            });
        }

        function renderSubjectCard(subject) {
            const subjectList = document.getElementById('admin-subject-list');
            const subjectCard = document.createElement('div');
            subjectCard.className = `subject-card ${subject.highlighted ? 'highlighted' : ''} ${subject.featured ? 'featured' : ''}`;
            subjectCard.id = `subject-${subject.id}`;
            subjectCard.dataset.category = subject.category || '';
            subjectCard.dataset.difficulty = subject.difficulty || '';
            subjectCard.dataset.name = subject.name.toLowerCase();

            const videoCount = subject.videos ? subject.videos.length : 0;
            const estimatedTime = subject.estimatedTime || 0;

            subjectCard.innerHTML = `
                ${bulkMode ? `<div class="checkbox-wrapper" style="position: absolute; top: 10px; right: 10px;">
                    <input type="checkbox" class="bulk-checkbox" data-subject-id="${subject.id}" onchange="updateBulkSelection()">
                </div>` : ''}
                
                <h3 class="subject-name">${subject.name}</h3>
                <p class="subject-desc">${subject.description}</p>
                
                <div class="subject-meta">
                    <span class="meta-tag">${subject.category || 'Uncategorized'}</span>
                    <span class="meta-tag difficulty-${(subject.difficulty || 'medium').toLowerCase()}">${subject.difficulty || 'Medium'}</span>
                    ${videoCount > 0 ? `<span class="video-count">${videoCount} video${videoCount > 1 ? 's' : ''}</span>` : ''}
                    ${estimatedTime > 0 ? `<span class="meta-tag">⏱️ ${estimatedTime}h</span>` : ''}
                    ${subject.highlighted ? '<span class="meta-tag" style="background: #fff3cd; color: #856404;">🌟 Highlighted</span>' : ''}
                    ${subject.featured ? '<span class="meta-tag" style="background: #d4edda; color: #155724;">⭐ Featured</span>' : ''}
                </div>
                
                ${subject.videos && subject.videos.length > 0 ? `
                    <div style="margin: 10px 0;">
                        <strong>Videos:</strong>
                        <ul style="margin-left: 20px; font-size: 13px; color: #666;">
                            ${subject.videos.slice(0, 3).map(video => `<li>${video.title}${video.duration ? ` (${video.duration}min)` : ''}</li>`).join('')}
                            ${subject.videos.length > 3 ? `<li><em>... and ${subject.videos.length - 3} more videos</em></li>` : ''}
                        </ul>
                    </div>
                ` : ''}
                
                <div class="subject-actions">
                    <button onclick="editSubject('${subject.id}')" class="btn-warning btn-small">✏️ Edit</button>
                    <button onclick="duplicateSubject('${subject.id}')" class="btn-info btn-small">📋 Duplicate</button>
                    <button onclick="toggleHighlight('${subject.id}', ${subject.highlighted || false})" class="btn-secondary btn-small">
                        ${subject.highlighted ? '🌟 Unhighlight' : '⭐ Highlight'}
                    </button>
                    <button onclick="viewSubject('${subject.id}')" class="btn-success btn-small">👁️ View</button>
                    <button onclick="deleteSubject('${subject.id}')" class="btn-danger btn-small">🗑️ Delete</button>
                </div>
            `;

            subjectList.appendChild(subjectCard);
        }

        // Subject operations
        function editSubject(subjectId) {
            db.collection("subjects").doc(subjectId).get().then((doc) => {
                if (doc.exists) {
                    const subject = doc.data();
                    editingSubjectId = subjectId;

                    // Fill basic fields
                    document.getElementById('subject-name').value = subject.name || '';
                    document.getElementById('subject-desc').value = subject.description || '';
                    document.getElementById('subject-category').value = subject.category || 'Other';
                    document.getElementById('difficulty-level').value = subject.difficulty || 'Intermediate';
                    document.getElementById('estimated-time').value = subject.estimatedTime || '';
                    document.getElementById('learning-objectives').value = (subject.learningObjectives || []).join('\n');
                    document.getElementById('practice-links').value = (subject.practiceLinks || []).join('\n');
                    document.getElementById('recall-links').value = (subject.recallLinks || []).join('\n');
                    document.getElementById('additional-resources').value = (subject.additionalResources || []).join('\n');
                    document.getElementById('prerequisites').value = (subject.prerequisites || []).join('\n');
                    document.getElementById('highlight-subject').checked = subject.highlighted || false;
                    document.getElementById('feature-subject').checked = subject.featured || false;
                    document.getElementById('is-public').checked = subject.isPublic || false;

                    // Clear and rebuild video sections
                    document.getElementById('videos-container').innerHTML = '';
                    videoCount = 0;

                    if (subject.videos && subject.videos.length > 0) {
                        subject.videos.forEach((video, index) => {
                            addVideoSection();
                            const currentVideoCount = videoCount;

                            setTimeout(() => {
                                document.getElementById(`video-title-${currentVideoCount}`).value = video.title || '';
                                document.getElementById(`video-url-${currentVideoCount}`).value = video.url || '';
                                document.getElementById(`video-description-${currentVideoCount}`).value = video.description || '';
                                document.getElementById(`video-duration-${currentVideoCount}`).value = video.duration || '';
                                document.getElementById(`video-order-${currentVideoCount}`).value = video.order || index + 1;
                                document.getElementById(`video-featured-${currentVideoCount}`).checked = video.featured || false;
                            }, 100);
                        });
                    } else {
                        addVideoSection();
                    }

                    document.getElementById('submit-btn').textContent = '💾 Update Subject';
                    switchTab('create');
                    document.getElementById('subject-name').scrollIntoView({ behavior: 'smooth' });
                    showNotification('Subject loaded for editing', 'info');
                }
            }).catch(error => {
                console.error("Error loading subject: ", error);
                showNotification('Error loading subject for editing', 'error');
            });
        }

        function duplicateSubject(subjectId) {
            if (confirm('Create a copy of this subject?')) {
                db.collection("subjects").doc(subjectId).get().then((doc) => {
                    if (doc.exists) {
                        const subject = doc.data();
                        const duplicatedSubject = {
                            ...subject,
                            name: subject.name + ' (Copy)',
                            highlighted: false,
                            featured: false,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        };

                        db.collection("subjects").add(duplicatedSubject).then(() => {
                            showNotification('Subject duplicated successfully!', 'success');
                            loadAdminSubjects();
                        });
                    }
                });
            }
        }

        function deleteSubject(subjectId) {
            if (confirm('Are you sure you want to delete this subject? This action cannot be undone.')) {
                db.collection("subjects").doc(subjectId).delete()
                    .then(() => {
                        showNotification('Subject deleted successfully', 'success');
                        loadAdminSubjects();
                        updateStats();
                    })
                    .catch(error => {
                        console.error("Error deleting subject: ", error);
                        showNotification('Error deleting subject', 'error');
                    });
            }
        }

        function toggleHighlight(subjectId, currentlyHighlighted) {
            db.collection("subjects").doc(subjectId).update({
                highlighted: !currentlyHighlighted,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                showNotification(currentlyHighlighted ? 'Subject unhighlighted' : 'Subject highlighted', 'success');
                loadAdminSubjects();
            }).catch(error => {
                console.error("Error toggling highlight: ", error);
                showNotification('Error updating subject', 'error');
            });
        }

        function viewSubject(subjectId) {
            const subject = allSubjects.find(s => s.id === subjectId);
            if (subject) {
                let content = `
                    <div style="max-width: 600px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        <h2>${subject.name}</h2>
                        <p><strong>Category:</strong> ${subject.category || 'Uncategorized'}</p>
                        <p><strong>Difficulty:</strong> ${subject.difficulty || 'Not specified'}</p>
                        <p><strong>Estimated Time:</strong> ${subject.estimatedTime || 'Not specified'} hours</p>
                        <p><strong>Description:</strong> ${subject.description}</p>
                `;

                if (subject.videos && subject.videos.length > 0) {
                    content += `<h3>Videos (${subject.videos.length}):</h3><ul>`;
                    subject.videos.forEach(video => {
                        content += `<li><strong>${video.title}</strong>${video.duration ? ` (${video.duration} min)` : ''}<br>`;
                        content += `<small>${video.description || 'No description'}</small></li>`;
                    });
                    content += '</ul>';
                }

                content += `<button onclick="closeModal()" style="margin-top: 20px; padding: 10px 20px; background: #6c63ff; color: white; border: none; border-radius: 4px; cursor: pointer;">Close</button></div>
                `;

                const modal = document.createElement('div');
                modal.id = 'subject-modal';
                modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;';
                modal.innerHTML = content;
                document.body.appendChild(modal);
            }
        }

        function closeModal() {
            const modal = document.getElementById('subject-modal');
            if (modal) modal.remove();
        }

        // Filtering and search
        function filterSubjects() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const categoryFilter = document.getElementById('category-filter').value;
            const difficultyFilter = document.getElementById('difficulty-filter').value;

            const subjectCards = document.querySelectorAll('.subject-card');

            subjectCards.forEach(card => {
                const name = card.dataset.name;
                const category = card.dataset.category;
                const difficulty = card.dataset.difficulty;

                const matchesSearch = !searchTerm || name.includes(searchTerm);
                const matchesCategory = !categoryFilter || category === categoryFilter;
                const matchesDifficulty = !difficultyFilter || difficulty === difficultyFilter;

                if (matchesSearch && matchesCategory && matchesDifficulty) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Bulk operations
        function toggleBulkMode() {
            bulkMode = !bulkMode;
            const button = document.getElementById('bulk-mode-btn');
            const bulkActions = document.getElementById('bulk-actions');

            if (bulkMode) {
                button.textContent = '❌ Exit Bulk Mode';
                bulkActions.classList.add('active');
            } else {
                button.textContent = '☑️ Bulk Select';
                bulkActions.classList.remove('active');
                selectedSubjects.clear();
            }

            loadAdminSubjects(); // Reload to show/hide checkboxes
        }

        function updateBulkSelection() {
            const checkboxes = document.querySelectorAll('.bulk-checkbox:checked');
            selectedSubjects.clear();

            checkboxes.forEach(checkbox => {
                selectedSubjects.add(checkbox.dataset.subjectId);
            });

            document.getElementById('selected-count').textContent = `${selectedSubjects.size} selected`;
        }

        function bulkHighlight() {
            if (selectedSubjects.size === 0) {
                showNotification('Please select subjects first', 'error');
                return;
            }

            const promises = Array.from(selectedSubjects).map(subjectId => {
                return db.collection("subjects").doc(subjectId).update({
                    highlighted: true,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            });

            Promise.all(promises).then(() => {
                showNotification(`${selectedSubjects.size} subjects highlighted`, 'success');
                loadAdminSubjects();
                selectedSubjects.clear();
            }).catch(error => {
                console.error("Error bulk highlighting: ", error);
                showNotification('Error highlighting subjects', 'error');
            });
        }

        function bulkDelete() {
            if (selectedSubjects.size === 0) {
                showNotification('Please select subjects first', 'error');
                return;
            }

            if (confirm(`Delete ${selectedSubjects.size} selected subjects? This cannot be undone.`)) {
                const promises = Array.from(selectedSubjects).map(subjectId => {
                    return db.collection("subjects").doc(subjectId).delete();
                });

                Promise.all(promises).then(() => {
                    showNotification(`${selectedSubjects.size} subjects deleted`, 'success');
                    loadAdminSubjects();
                    selectedSubjects.clear();
                    updateStats();
                }).catch(error => {
                    console.error("Error bulk deleting: ", error);
                    showNotification('Error deleting subjects', 'error');
                });
            }
        }

        function bulkExport() {
            if (selectedSubjects.size === 0) {
                showNotification('Please select subjects first', 'error');
                return;
            }

            const selectedData = allSubjects.filter(subject => selectedSubjects.has(subject.id));
            const dataStr = JSON.stringify(selectedData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'selected_subjects.json';
            link.click();
            URL.revokeObjectURL(url);

            showNotification(`${selectedSubjects.size} subjects exported`, 'success');
        }

        // Analytics and statistics
        function updateStats() {
            const totalSubjects = allSubjects.length;
            const totalVideos = allSubjects.reduce((sum, subject) => sum + (subject.videos ? subject.videos.length : 0), 0);
            const highlightedCount = allSubjects.filter(subject => subject.highlighted).length;

            document.getElementById('total-subjects').textContent = totalSubjects;
            document.getElementById('total-videos').textContent = totalVideos;
            document.getElementById('highlighted-count').textContent = highlightedCount;
        }

        function updateAnalytics() {
            const totalSubjects = allSubjects.length;
            const totalVideos = allSubjects.reduce((sum, subject) => sum + (subject.videos ? subject.videos.length : 0), 0);
            const avgVideos = totalSubjects > 0 ? (totalVideos / totalSubjects).toFixed(1) : 0;

            // Find most popular category
            const categories = {};
            allSubjects.forEach(subject => {
                const category = subject.category || 'Other';
                categories[category] = (categories[category] || 0) + 1;
            });

            const mostPopularCategory = Object.keys(categories).reduce((a, b) =>
                categories[a] > categories[b] ? a : b, 'None');

            document.getElementById('total-subjects-analytics').textContent = totalSubjects;
            document.getElementById('total-videos-analytics').textContent = totalVideos;
            document.getElementById('avg-videos-per-subject').textContent = avgVideos;
            document.getElementById('most-popular-category').textContent = mostPopularCategory;
        }

        // Export functions
        function exportToJSON() {
            const dataStr = JSON.stringify(allSubjects, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'all_subjects.json';
            link.click();
            URL.revokeObjectURL(url);
            showNotification('Data exported to JSON', 'success');
        }

        function exportToCSV() {
            const csvContent = [
                ['Name', 'Category', 'Difficulty', 'Video Count', 'Highlighted', 'Featured'],
                ...allSubjects.map(subject => [
                    subject.name,
                    subject.category || 'Other',
                    subject.difficulty || 'Medium',
                    subject.videos ? subject.videos.length : 0,
                    subject.highlighted ? 'Yes' : 'No',
                    subject.featured ? 'Yes' : 'No'
                ])
            ].map(row => row.join(',')).join('\n');

            const dataBlob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'subjects_report.csv';
            link.click();
            URL.revokeObjectURL(url);
            showNotification('Report exported to CSV', 'success');
        }

        function generateReport() {
            const report = `
                Subject Management Report
                ========================
                Generated: ${new Date().toLocaleDateString()}
                
                Summary:
                - Total Subjects: ${allSubjects.length}
                - Total Videos: ${allSubjects.reduce((sum, s) => sum + (s.videos?.length || 0), 0)}
                - Highlighted Subjects: ${allSubjects.filter(s => s.highlighted).length}
                - Featured Subjects: ${allSubjects.filter(s => s.featured).length}
                
                Categories:
                ${Object.entries(allSubjects.reduce((acc, s) => {
                const cat = s.category || 'Other';
                acc[cat] = (acc[cat] || 0) + 1;
                return acc;
            }, {})).map(([cat, count]) => `- ${cat}: ${count}`).join('\n')}
                
                Difficulty Distribution:
                ${Object.entries(allSubjects.reduce((acc, s) => {
                const diff = s.difficulty || 'Medium';
                acc[diff] = (acc[diff] || 0) + 1;
                return acc;
            }, {})).map(([diff, count]) => `- ${diff}: ${count}`).join('\n')}
            `;

            const dataBlob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'subject_report.txt';
            link.click();
            URL.revokeObjectURL(url);
            showNotification('Report generated successfully', 'success');
        }

        // Utility functions
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => notification.classList.add('show'), 100);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function showProgress(show) {
            const progressBar = document.getElementById('upload-progress');
            if (show) {
                progressBar.classList.remove('hidden');
                progressBar.querySelector('.progress-fill').style.width = '100%';
            } else {
                setTimeout(() => {
                    progressBar.classList.add('hidden');
                    progressBar.querySelector('.progress-fill').style.width = '0%';
                }, 1000);
            }
        }

        function previewSubject() {
            const formData = collectFormData();
            let preview = `
                <div style="max-width: 600px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <h2>📚 ${formData.name}</h2>
                    <p><strong>Category:</strong> ${formData.category}</p>
                    <p><strong>Difficulty:</strong> ${formData.difficulty}</p>
                    <p><strong>Estimated Time:</strong> ${formData.estimatedTime} hours</p>
                    <p><strong>Description:</strong> ${formData.description}</p>
            `;

            if (formData.videos.length > 0) {
                preview += `<h3>Videos (${formData.videos.length}):</h3><ul>`;
                formData.videos.forEach(video => {
                    preview += `<li><strong>${video.title}</strong>${video.duration ? ` (${video.duration} min)` : ''}<br>`;
                    preview += `<small>${video.description || 'No description'}</small></li>`;
                });
                preview += '</ul>';
            }

            preview += `<button onclick="closeModal()" style="margin-top: 20px; padding: 10px 20px; background: #6c63ff; color: white; border: none; border-radius: 4px; cursor: pointer;">Close Preview</button></div>`;

            const modal = document.createElement('div');
            modal.id = 'subject-modal';
            modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto;';
            modal.innerHTML = preview;
            document.body.appendChild(modal);
        }

        // Settings
        function saveSettings() {
            const settings = {
                defaultCategory: document.getElementById('default-category').value,
                autoSave: document.getElementById('auto-save').value,
                enableNotifications: document.getElementById('enable-notifications').checked
            };

            localStorage.setItem('adminSettings', JSON.stringify(settings));
            showNotification('Settings saved successfully', 'success');
        }

        function resetSettings() {
            localStorage.removeItem('adminSettings');
            document.getElementById('default-category').value = 'Other';
            document.getElementById('auto-save').value = '5';
            document.getElementById('enable-notifications').checked = true;
            showNotification('Settings reset to default', 'info');
        }

        // Load settings on page load
        function loadSettings() {
            const settings = JSON.parse(localStorage.getItem('adminSettings') || '{}');
            if (settings.defaultCategory) document.getElementById('default-category').value = settings.defaultCategory;
            if (settings.autoSave) document.getElementById('auto-save').value = settings.autoSave;
            if (settings.enableNotifications !== undefined) document.getElementById('enable-notifications').checked = settings.enableNotifications;
        }

        // Initialize settings
        loadSettings();
    </script>
</body>

</html>
