<!DOCTYPE html>
<html>
  <head>
    <title>Export to CSV</title>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

      const firebaseConfig = {
            apiKey: "AIzaSyCVYdfql5aqHrChlA1v3nxRLkIbYyWMvUg",
            authDomain: "study2-7bdc7.firebaseapp.com",
            databaseURL: "https://study2-7bdc7-default-rtdb.firebaseio.com",
            projectId: "study2-7bdc7",
            storageBucket: "study2-7bdc7.appspot.com",
            messagingSenderId: "320617984870",
            appId: "1:320617984870:web:04b61ea4ee88ae057e4ea7",
            measurementId: "G-VRM14GRNWG"
        };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      async function exportToCSV() {
        const snapshot = await getDocs(collection(db, "testResults"));
        const results = snapshot.docs.map(doc => doc.data());

        const csvRows = [];
        const headers = ['userId', 'name', 'course', 'topic', 'score', 'date'];
        csvRows.push(headers.join(','));

        results.forEach(result => {
          const row = headers.map(field => JSON.stringify(result[field] || ""));
          csvRows.push(row.join(','));
        });

        const csvString = csvRows.join("\n");
        const blob = new Blob([csvString], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = "results.csv";
        a.click();
      }

      // ✅ Expose function to global scope
      window.exportToCSV = exportToCSV;
    </script>
  </head>
  <body>
    <button onclick="exportToCSV()">Export Results to Excel</button>
  </body>
</html>
