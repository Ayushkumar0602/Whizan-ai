<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Problem Visualizer</title>
    <link rel="icon" type="image/png" href="Smart Study.jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/editor/editor.main.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #7e57c2;
            --primary-purple-dark: #5e35b1;
            --primary-purple-light: #b39ddb;
            --secondary-purple: #9575cd;
            --accent-purple: #673ab7;
            --dark-bg: #121212;
            --darker-bg: #0a0a0a;
            --light-bg: #f5f5f5;
            --lighter-bg: #ffffff;
            --text-light: #f5f5f5;
            --text-dark: #333333;
            --text-muted: #757575;
            --success-color: #4caf50;
            --error-color: #f44336;
            --warning-color: #ff9800;
            --info-color: #2196f3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            color: var(--text-light);
            transition: all 0.5s ease;
        }

        body.light-mode {
            background: var(--light-bg);
            color: var(--text-dark);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Floating particles background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(126, 87, 194, 0.3);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-1000px) translateX(500px) rotate(720deg);
                opacity: 0;
            }
        }

        /* Header with animated gradient */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            padding: 20px;
            border-radius: 15px;
            background: linear-gradient(135deg, var(--primary-purple) 0%, var(--accent-purple) 100%);
            box-shadow: 0 10px 30px rgba(126, 87, 194, 0.3);
            overflow: hidden;
            animation: gradientShift 8s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            font-weight: 700;
            position: relative;
            z-index: 2;
            animation: fadeInDown 1s ease;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Theme toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(126, 87, 194, 0.8);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            background: var(--primary-purple);
        }

        .theme-toggle i {
            font-size: 24px;
            color: white;
        }

        /* Main content grid */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            height: calc(100vh - 200px);
            animation: fadeIn 1s ease 0.4s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .left-panel, .right-panel {
            background: rgba(30, 30, 30, 0.8);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(126, 87, 194, 0.2);
        }

        body.light-mode .left-panel,
        body.light-mode .right-panel {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(126, 87, 194, 0.1);
        }

        .panel-header {
            background: linear-gradient(135deg, var(--primary-purple) 0%, var(--accent-purple) 100%);
            color: white;
            padding: 15px 25px;
            font-weight: 600;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .panel-header::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255,255,255,0) 0%,
                rgba(255,255,255,0) 45%,
                rgba(255,255,255,0.1) 48%,
                rgba(255,255,255,0.1) 52%,
                rgba(255,255,255,0) 55%,
                rgba(255,255,255,0) 100%
            );
            transform: rotate(30deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }

        .code-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .controls {
            padding: 15px 20px;
            background: rgba(40, 40, 40, 0.7);
            border-bottom: 1px solid rgba(126, 87, 194, 0.2);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }

        body.light-mode .controls {
            background: rgba(245, 245, 245, 0.9);
            border-bottom: 1px solid rgba(126, 87, 194, 0.1);
        }

        .language-select {
            padding: 10px 15px;
            border: 2px solid rgba(126, 87, 194, 0.3);
            border-radius: 10px;
            background: rgba(30, 30, 30, 0.8);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            color: var(--text-light);
            font-family: 'Fira Code', monospace;
            min-width: 150px;
        }

        body.light-mode .language-select {
            background: white;
            color: var(--text-dark);
        }

        .language-select:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 0 3px rgba(126, 87, 194, 0.3);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn:hover::after {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-purple) 0%, var(--accent-purple) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(126, 87, 194, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(126, 87, 194, 0.5);
        }

        .btn-secondary {
            background: rgba(60, 60, 60, 0.8);
            color: white;
            border: 1px solid rgba(126, 87, 194, 0.3);
        }

        body.light-mode .btn-secondary {
            background: rgba(230, 230, 230, 0.9);
            color: var(--text-dark);
        }

        .btn-secondary:hover {
            background: rgba(80, 80, 80, 0.9);
            transform: translateY(-3px);
        }

        body.light-mode .btn-secondary:hover {
            background: rgba(210, 210, 210, 0.9);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn i {
            font-size: 16px;
        }

        #editor {
            flex: 1;
            border-radius: 0 0 15px 15px;
        }

        .visualization-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .viz-controls {
            padding: 15px 20px;
            background: rgba(40, 40, 40, 0.7);
            border-bottom: 1px solid rgba(126, 87, 194, 0.2);
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }

        body.light-mode .viz-controls {
            background: rgba(245, 245, 245, 0.9);
            border-bottom: 1px solid rgba(126, 87, 194, 0.1);
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .speed-slider {
            width: 120px;
            -webkit-appearance: none;
            height: 8px;
            border-radius: 4px;
            background: rgba(126, 87, 194, 0.3);
            outline: none;
            transition: all 0.3s ease;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-purple);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .speed-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--accent-purple);
        }

        #visualization {
            flex: 1;
            padding: 20px;
            overflow: auto;
            background: rgba(25, 25, 25, 0.6);
            position: relative;
        }

        body.light-mode #visualization {
            background: rgba(250, 250, 250, 0.9);
        }

        .step-info {
            background: rgba(40, 40, 40, 0.8);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-purple);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
        }

        body.light-mode .step-info {
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .step-info:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(126, 87, 194, 0.2);
        }

        .step-info h4 {
            margin-bottom: 15px;
            color: var(--primary-purple-light);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        body.light-mode .step-info h4 {
            color: var(--primary-purple-dark);
        }

        .step-info p {
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        body.light-mode .step-info p {
            color: var(--text-dark);
        }

        .step-info strong {
            color: var(--primary-purple-light);
            font-weight: 500;
        }

        body.light-mode .step-info strong {
            color: var(--primary-purple-dark);
        }

        .step-info code {
            font-family: 'Fira Code', monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        body.light-mode .step-info code {
            background: rgba(126, 87, 194, 0.1);
        }

        .array-viz {
            display: flex;
            gap: 10px;
            margin: 30px 0;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 0.8s ease;
        }

        .array-element {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(40, 40, 40, 0.8);
            border: 2px solid rgba(126, 87, 194, 0.3);
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            font-size: 1.1rem;
            color: var(--text-light);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        body.light-mode .array-element {
            background: white;
            color: var(--text-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .array-element::before {
            content: attr(data-index);
            position: absolute;
            top: -25px;
            font-size: 12px;
            color: var(--primary-purple-light);
            font-weight: normal;
        }

        body.light-mode .array-element::before {
            color: var(--primary-purple-dark);
        }

        .array-element.highlight {
            background: var(--warning-color);
            border-color: #ffa000;
            transform: translateY(-10px) scale(1.1);
            color: white;
            z-index: 2;
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);
        }

        .array-element.compare {
            background: var(--error-color);
            border-color: #d32f2f;
            color: white;
            transform: translateY(-5px);
            z-index: 1;
            box-shadow: 0 8px 15px rgba(244, 67, 54, 0.3);
        }

        .array-element.sorted {
            background: var(--success-color);
            border-color: #388e3c;
            color: white;
            transform: rotate(360deg);
            box-shadow: 0 8px 15px rgba(76, 175, 80, 0.3);
        }

        .array-element.swapping {
            animation: swapAnimation 0.8s ease;
        }

        @keyframes swapAnimation {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .tree-viz {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
            animation: fadeIn 0.8s ease;
        }

        .tree-level {
            display: flex;
            justify-content: center;
            margin: 15px 0;
            position: relative;
        }

        .tree-node {
            width: 50px;
            height: 50px;
            background: rgba(40, 40, 40, 0.8);
            border: 2px solid rgba(126, 87, 194, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 20px;
            transition: all 0.5s ease;
            font-weight: bold;
            color: var(--text-light);
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        body.light-mode .tree-node {
            background: white;
            color: var(--text-dark);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .tree-node::before {
            content: '';
            position: absolute;
            top: -15px;
            width: 2px;
            height: 15px;
            background: rgba(126, 87, 194, 0.5);
        }

        .tree-node.visited {
            background: var(--primary-purple);
            border-color: var(--primary-purple-dark);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 8px 15px rgba(126, 87, 194, 0.4);
        }

        .tree-node.current {
            background: var(--warning-color);
            border-color: #ffa000;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }

        .tree-connector {
            position: absolute;
            background: rgba(126, 87, 194, 0.5);
            height: 2px;
            transform-origin: left center;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-light);
            flex-direction: column;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        body.light-mode .loading {
            color: var(--text-dark);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(126, 87, 194, 0.2);
            border-top: 5px solid var(--primary-purple);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading h4 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .loading p {
            max-width: 500px;
            line-height: 1.6;
            opacity: 0.8;
        }

        .error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: var(--error-color);
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            animation: shake 0.5s ease;
            border-left: 5px solid var(--error-color);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: var(--success-color);
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            animation: slideIn 0.5s ease;
            border-left: 5px solid var(--success-color);
        }

        .error h4, .success h4 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .progress-container {
            width: 100%;
            background: rgba(126, 87, 194, 0.2);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            height: 10px;
        }

        body.light-mode .progress-container {
            background: rgba(126, 87, 194, 0.1);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-purple), var(--accent-purple));
            width: 0;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding: 15px;
            background: rgba(40, 40, 40, 0.7);
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        body.light-mode .stats {
            background: rgba(245, 245, 245, 0.9);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-purple-light);
            margin-bottom: 5px;
        }

        body.light-mode .stat-value {
            color: var(--primary-purple-dark);
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .code-explanation {
            margin-top: 20px;
            padding: 15px;
            background: rgba(40, 40, 40, 0.7);
            border-radius: 10px;
            border-left: 3px solid var(--primary-purple);
        }

        body.light-mode .code-explanation {
            background: rgba(245, 245, 245, 0.9);
        }

        .code-explanation h5 {
            margin-bottom: 10px;
            color: var(--primary-purple-light);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        body.light-mode .code-explanation h5 {
            color: var(--primary-purple-dark);
        }

        .code-explanation pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-top: 10px;
        }

        body.light-mode .code-explanation pre {
            background: rgba(126, 87, 194, 0.1);
        }

        .graph-viz {
            width: 100%;
            height: 400px;
            background: rgba(40, 40, 40, 0.7);
            border-radius: 15px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        body.light-mode .graph-viz {
            background: rgba(245, 245, 245, 0.9);
        }

        .node {
            position: absolute;
            width: 40px;
            height: 40px;
            background: var(--primary-purple);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            z-index: 2;
        }

        .node.visited {
            background: var(--success-color);
            transform: scale(1.1);
        }

        .node.current {
            background: var(--warning-color);
            animation: pulse 1.5s infinite;
        }

        .edge {
            position: absolute;
            height: 2px;
            background: rgba(126, 87, 194, 0.5);
            transform-origin: left center;
            z-index: 1;
        }

        .edge.visited {
            background: var(--success-color);
        }

        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 300px;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;

function bubbleSort(arr) {

    for (let i = 0; i < n - 1; i++) {
        for (let j = 0; j < n - i - 1; j++) {
            if (arr[j] > arr[j + 1]) {

def binary_search(arr, target):
    left, right = 0, len(arr) - 1
    
    while left <= right:
        mid = (left + right) // 2
        
        if arr[mid] == target:
            return mid
        elif arr[mid] < target:
            left = mid + 1
        else:
            right = mid - 1

            java: `// Quick Sort Algorithm
public class QuickSort {
    public static void quickSort(int[] arr, int low, int high) {
        if (low < high) {
            int pi = partition(arr, low, high);
            quickSort(arr, low, pi - 1);
            quickSort(arr, pi + 1, high);
        }
    }
    
    public static int partition(int[] arr, int low, int high) {
        int pivot = arr[high];
        int i = (low - 1);
        
        for (int j = low; j < high; j++) {
            if (arr[j] < pivot) {
                i++;
                swap(arr, i, j);
            }
        }
        
        swap(arr, i + 1, high);
        return i + 1;
    }
    
    public static void swap(int[] arr, int i, int j) {
        int temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
    }
}`,

#include <vector>
using namespace std;

void merge(vector<int>& arr, int left, int mid, int right) {
    int n1 = mid - left + 1;
    int n2 = right - mid;
    
    vector<int> L(n1), R(n2);
    
    for (int i = 0; i < n1; i++)
        L[i] = arr[left + i];
    for (int j = 0; j < n2; j++)
        R[j] = arr[mid + 1 + j];
    
    int i = 0, j = 0, k = left;
    
    while (i < n1 && j < n2) {
        if (L[i] <= R[j]) {
            arr[k] = L[i];
            i++;
        } else {
            arr[k] = R[j];
            j++;
        }
        k++;
    }
    
    while (i < n1) {
        arr[k] = L[i];
        i++;
        k++;
    }
    
    while (j < n2) {
        arr[k] = R[j];
        j++;
        k++;
    }
}

void mergeSort(vector<int>& arr, int left, int right) {
    if (left < right) {
        int mid = left + (right - left) / 2;
        
        mergeSort(arr, left, mid);
        mergeSort(arr, mid + 1, right);
        
        merge(arr, left, mid, right);
    }
}`

    async callGeminiAPI(code, language) {
        const prompt = `Analyze this ${language} code and provide a detailed step-by-step explanation suitable for visualization. 

Code:
${code}

Please provide a JSON response with the following structure:
{
    "algorithm": "name of the algorithm",
    "description": "brief description of what the algorithm does",
    "complexity": {
        "time": "time complexity",
        "space": "space complexity"
    },
    "dataStructure": "primary data structure used (array, tree, graph, etc.)",
    "steps": [
        {
            "step": 1,
            "description": "what happens in this step",
            "code_line": "relevant code snippet",
            "visualization_data": {
                "type": "array",
                "data": [64, 34, 25, 12, 22, 11, 90],
                "highlights": [0, 1],
                "comparisons": [0, 1],
                "action": "description of the visual action"
            }
        }
    ],
    "sample_input": [64, 34, 25, 12, 22, 11, 90],
    "sample_output": [11, 12, 22, 25, 34, 64, 90]
}

Focus on creating detailed steps that can be visualized, especially for sorting algorithms, searching algorithms, tree traversals, and graph algorithms. Make sure to include all intermediate states of the data structure.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${this.apiKey}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: prompt
                        }]
                    }],
                    generationConfig: {
                        temperature: 0.1,
                        topK: 1,
                        topP: 1,
                        maxOutputTokens: 4096,
                    }
                })
            });

            if (!response.ok) {
                throw new Error(`API request failed with status: ${response.status}`);
            }

            const data = await response.json();
            
            if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
                throw new Error('Invalid API response format');
            }

            const responseText = data.candidates[0].content.parts[0].text;
            return this.parseAPIResponse(responseText);

        } catch (error) {
            console.error('API call failed:', error);
            throw new Error(`API call failed: ${error.message}`);
        }
    }

    parseAPIResponse(responseText) {
        try {
            // First, try to extract JSON from markdown code blocks
            const jsonBlockMatch = responseText.match(/```json\s*([\s\S]*?)\s*```/);
            if (jsonBlockMatch) {
                return JSON.parse(jsonBlockMatch[1]);
            }

            // Then try to find JSON object in the text
            const jsonMatch = responseText.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
                return JSON.parse(jsonMatch[0]);
            }

            // If no JSON found, create a fallback structure
            throw new Error('No valid JSON found in response');

        } catch (parseError) {
            console.error('JSON parsing failed:', parseError);
            console.log('Raw response:', responseText);
            
            // Return a fallback structure based on the response text
            return this.createFallbackAnalysis(responseText);
        }
    }

        // Create basic steps from the response
        const steps = [];
        const lines = responseText.split('\n').filter(line => line.trim());
        
        for (let i = 0; i < Math.min(lines.length, 10); i++) {
            const line = lines[i].trim();
            if (line && line.length > 10) {
                steps.push({
                    step: i + 1,
                    description: line,
                    code_line: '',
                    visualization_data: {
                        type: 'array',
                        data: [64, 34, 25, 12, 22, 11, 90],
                        highlights: [i % 7],
                        comparisons: [i % 7, (i + 1) % 7],
                        action: `Step ${i + 1}: ${line.substring(0, 50)}...`
                    }
                });
            }
        }

        return {
            algorithm: algorithm,
            description: 'Algorithm analysis based on code structure',
            complexity: {
                time: 'O(n)',
                space: 'O(1)'
            },
            dataStructure: 'array',
            steps: steps,
            sample_input: [64, 34, 25, 12, 22, 11, 90],
            sample_output: [11, 12, 22, 25, 34, 64, 90]
        };
    }

                    }
                }
            ],
            sample_input: [5, 3, 8, 1, 9, 2],
            sample_output: [1, 2, 3, 5, 8, 9]
        };

        this.generateVisualization(fallbackAnalysis);
    }

    generateVisualization(analysis) {
        this.animationSteps = analysis.steps || [];
        this.currentStep = 0;
        
        const vizArea = document.getElementById('visualization');
        vizArea.innerHTML = `
            <div class="step-info">
                <h4><i class="fas fa-project-diagram"></i> Algorithm: ${analysis.algorithm || 'Unknown'}</h4>
                <p><strong><i class="fas fa-info-circle"></i> Description:</strong> ${analysis.description || 'No description available'}</p>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">${analysis.complexity?.time || 'N/A'}</div>
                        <div class="stat-label">Time Complexity</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${analysis.complexity?.space || 'N/A'}</div>
                        <div class="stat-label">Space Complexity</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${analysis.dataStructure || 'N/A'}</div>
                        <div class="stat-label">Data Structure</div>
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
            </div>
            <div id="step-display">
                <h4><i class="fas fa-map-marker-alt"></i> Ready to start visualization</h4>
                <p>Click play to begin step-by-step animation</p>
            </div>
            <div id="visual-container"></div>
        `;

        if (this.animationSteps.length > 0) {
            this.showSuccess(`Analysis complete! Found ${this.animationSteps.length} steps to visualize.`);
        } else {
            this.showError('No visualization steps could be generated from the code.');
        }
    }

    playAnimation() {
        if (this.animationSteps.length === 0) return;
        
        this.isPlaying = true;
        document.getElementById('playBtn').disabled = true;
        document.getElementById('pauseBtn').disabled = false;
        
        // Clear any existing interval
        if (this.animationInterval) {
            clearInterval(this.animationInterval);
        }
        
        // Start new interval
        this.animationInterval = setInterval(() => {
            if (this.currentStep < this.animationSteps.length && this.isPlaying) {
                this.displayStep(this.currentStep);
                this.currentStep++;
                
                // Update progress bar
                const progress = (this.currentStep / this.animationSteps.length) * 100;
                document.getElementById('progressBar').style.width = `${progress}%`;
            } else {
                this.pauseAnimation();
                if (this.currentStep >= this.animationSteps.length) {
                    this.showSuccess('Animation completed!');
                }
            }
        }, this.animationSpeed);
    }

    pauseAnimation() {
        this.isPlaying = false;
        document.getElementById('playBtn').disabled = false;
        document.getElementById('pauseBtn').disabled = true;
        
        if (this.animationInterval) {
            clearInterval(this.animationInterval);
            this.animationInterval = null;
        }
    }

    stepAnimation() {
        if (this.currentStep < this.animationSteps.length) {
            this.displayStep(this.currentStep);
            this.currentStep++;
            
            // Update progress bar
            const progress = (this.currentStep / this.animationSteps.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            
            if (this.currentStep >= this.animationSteps.length) {
                this.showSuccess('Animation completed!');
            }
        }
    }

    resetAnimation() {
        this.currentStep = 0;
        this.isPlaying = false;
        document.getElementById('playBtn').disabled = false;
        document.getElementById('pauseBtn').disabled = true;
        
        if (this.animationInterval) {
            clearInterval(this.animationInterval);
            this.animationInterval = null;
        }
        
        // Reset progress bar
        document.getElementById('progressBar').style.width = '0%';
        
        const stepDisplay = document.getElementById('step-display');
        if (stepDisplay) {
            stepDisplay.innerHTML = `
                <h4><i class="fas fa-map-marker-alt"></i> Ready to start visualization</h4>
                <p>Click play to begin step-by-step animation</p>
            `;
        }
        
        const visualContainer = document.getElementById('visual-container');
        if (visualContainer) {
            visualContainer.innerHTML = '';
        }
        
        this.visitedNodes.clear();
    }

    displayStep(stepIndex) {
        const step = this.animationSteps[stepIndex];
        if (!step) return;

        // Update step info
        const stepDisplay = document.getElementById('step-display');
        stepDisplay.innerHTML = `
            <h4><i class="fas fa-step-forward"></i> Step ${step.step || stepIndex + 1} of ${this.animationSteps.length}</h4>
            <p><strong><i class="fas fa-info-circle"></i> Action:</strong> ${step.description || 'No description'}</p>
            ${step.code_line ? `<div class="code-explanation">
                <h5><i class="fas fa-code"></i> Relevant Code:</h5>
                <pre>${step.code_line}</pre>
            </div>` : ''}
        `;

        // Update visualization
        this.updateVisualization(step.visualization_data || {});
    }

    updateVisualization(vizData) {
        const container = document.getElementById('visual-container');
        if (!container) return;

        const type = vizData.type || 'array';
        const data = vizData.data || [];
        const highlights = vizData.highlights || [];
        const comparisons = vizData.comparisons || [];
        const action = vizData.action || '';

        if (type === 'array' && Array.isArray(data)) {
            this.renderArrayVisualization(container, data, highlights, comparisons, action);
        } else if (type === 'tree') {
            this.renderTreeVisualization(container, data, highlights, action);
        } else if (type === 'graph') {
            this.renderGraphVisualization(container, data, highlights, action);
        } else {
            container.innerHTML = `
                <div style="text-align: center; padding: 20px; color: var(--text-muted);">
                    <p><i class="fas fa-chart-bar"></i> Visualization for ${type} with data: ${JSON.stringify(data)}</p>
                    ${action ? `<p><em>${action}</em></p>` : ''}
                </div>
            `;
        }
    }

    renderArrayVisualization(container, data, highlights = [], comparisons = [], action = '') {
        const arrayHtml = data.map((value, index) => {
            let className = 'array-element';
            if (highlights.includes(index)) className += ' highlight';
            if (comparisons.includes(index)) className += ' compare';
            
            // Check if this element is being swapped
            if (action.toLowerCase().includes('swap') && highlights.includes(index)) {
                className += ' swapping';
            }
            
            // Check if this element is now in sorted position
            if (action.toLowerCase().includes('sorted') && highlights.includes(index)) {
                className += ' sorted';
            }
            
            return `<div class="${className}" data-index="${index}">${value}</div>`;
        }).join('');

        container.innerHTML = `
            ${action ? `<p style="text-align: center; margin-bottom: 15px; color: var(--primary-purple-light);">
                <i class="fas fa-arrow-down"></i> ${action}
            </p>` : ''}
            <div class="array-viz">${arrayHtml}</div>
        `;
    }

    renderTreeVisualization(container, data, highlights = [], action = '') {
        // Simple binary tree visualization (up to 3 levels)
        const levels = [
            [data[0]], // Root
            data.slice(1, 3), // Level 1
            data.slice(3, 7) // Level 2
        ];
        
        let treeHtml = '';
        
        levels.forEach((nodes, levelIndex) => {
            treeHtml += `<div class="tree-level">`;
            
            nodes.forEach((node, nodeIndex) => {
                const nodePos = levelIndex * 3 + nodeIndex;
                let className = 'tree-node';
                
                if (highlights.includes(nodePos)) {
                    className += ' visited';
                    this.visitedNodes.add(nodePos);
                }
                
                if (highlights.includes(nodePos) && action.toLowerCase().includes('current')) {
                    className += ' current';
                }
                
                treeHtml += `<div class="${className}">${node || 'N'}</div>`;
            });
            
            treeHtml += `</div>`;
        });
        
        // Add connectors between nodes
        const connectors = [
            { from: 0, to: 1 }, { from: 0, to: 2 }, // Root to level 1
            { from: 1, to: 3 }, { from: 1, to: 4 }, // Level 1 left to level 2
            { from: 2, to: 5 }, { from: 2, to: 6 }  // Level 1 right to level 2
        ];
        
        container.innerHTML = `
            ${action ? `<p style="text-align: center; margin-bottom: 15px; color: var(--primary-purple-light);">
                <i class="fas fa-arrow-down"></i> ${action}
            </p>` : ''}
            <div class="tree-viz">${treeHtml}</div>
        `;
        
        // Position nodes and draw connectors (simplified for this example)
        setTimeout(() => {
            const nodes = container.querySelectorAll('.tree-node');
            if (nodes.length > 0) {
                // Simple positioning - would be more sophisticated in a real implementation
                nodes.forEach((node, index) => {
                    if (index === 0) {
                        // Root node
                        node.style.margin = '0 auto';
                    } else if (index < 3) {
                        // Level 1 nodes
                        node.style.margin = index === 1 ? '0 100px 0 0' : '0 0 0 100px';
                    } else {
                        // Level 2 nodes
                        const parentIndex = Math.floor((index - 1) / 2) + 1;
                        const parentNode = nodes[parentIndex];
                        if (parentNode) {
                            node.style.margin = index % 2 === 1 ? '0 60px 0 0' : '0 0 0 60px';
                        }
                    }
                });
            }
        }, 50);
    }

    renderGraphVisualization(container, data, highlights = [], action = '') {
        // Create a simple force-directed graph using D3.js
        container.innerHTML = `
            ${action ? `<p style="text-align: center; margin-bottom: 15px; color: var(--primary-purple-light);">
                <i class="fas fa-arrow-down"></i> ${action}
            </p>` : ''}
            <div class="graph-viz" id="graph-container"></div>
        `;
        
        const graphContainer = document.getElementById('graph-container');
        if (!graphContainer) return;
        
        // Sample graph data
        const nodes = data.map((d, i) => ({ 
            id: i, 
            name: d || `Node ${i}`, 
            visited: highlights.includes(i) 
        }));
        
        // Create some sample edges
        const edges = [];
        for (let i = 0; i < nodes.length - 1; i++) {
            edges.push({ source: i, target: i + 1 });
        }
        if (nodes.length > 2) {
            edges.push({ source: 0, target: nodes.length - 1 });
        }
        
        const width = graphContainer.clientWidth;
        const height = graphContainer.clientHeight;
        
        // Create SVG
        const svg = d3.select(graphContainer)
            .append('svg')
            .attr('width', width)
            .attr('height', height);
            
        // Create simulation
        const simulation = d3.forceSimulation(nodes)
            .force('charge', d3.forceManyBody().strength(-300))
            .force('link', d3.forceLink(edges).id(d => d.id).distance(100))
            .force('x', d3.forceX(width / 2).strength(0.1))
            .force('y', d3.forceY(height / 2).strength(0.1));
            
        // Create edges
        const link = svg.append('g')
            .selectAll('line')
            .data(edges)
            .enter()
            .append('line')
            .attr('stroke', '#7e57c2')
            .attr('stroke-width', 2)
            .attr('class', d => 
                highlights.includes(d.source.id) && highlights.includes(d.target.id) ? 'edge visited' : 'edge'
            );
            
        // Create nodes
        const node = svg.append('g')
            .selectAll('circle')
            .data(nodes)
            .enter()
            .append('circle')
            .attr('r', 20)
            .attr('fill', d => d.visited ? '#4caf50' : '#7e57c2')
            .attr('class', d => 
                `node ${d.visited ? 'visited' : ''} ${
                    highlights.includes(d.id) && action.toLowerCase().includes('current') ? 'current' : ''
                }`
            )
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended));
                
        // Add node labels
        const label = svg.append('g')
            .selectAll('text')
            .data(nodes)
            .enter()
            .append('text')
            .attr('text-anchor', 'middle')
            .attr('dy', 4)
            .text(d => d.name)
            .attr('fill', 'white')
            .attr('font-size', '12px');
            
        // Update positions on simulation tick
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
                
            node
                .attr('cx', d => d.x)
                .attr('cy', d => d.y);
                
            label
                .attr('x', d => d.x)
                .attr('y', d => d.y);
        });
        
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
    }

    clearEditor() {
        if (this.editor) {
            this.editor.setValue('');
        }
        this.resetVisualization();
    }

    resetVisualization() {
        const vizArea = document.getElementById('visualization');
        vizArea.innerHTML = `
            <div style="text-align: center; padding: 60px; color: var(--text-muted);">
                <h3><i class="fas fa-magic"></i> Ready to Visualize!</h3>
                <p>Paste your DSA code and click "Analyze & Visualize" to see the magic happen!</p>
            </div>
        `;
        this.animationSteps = [];
        this.currentStep = 0;
        this.disableControls();
        this.visitedNodes.clear();
    }

    showLoading() {
        const vizArea = document.getElementById('visualization');
        vizArea.innerHTML = `
            <div class="loading">
                <div class="spinner"></div>
                <div>
                    <h4><i class="fas fa-robot"></i> Analyzing your code...</h4>
                    <p>Our AI is understanding your algorithm and preparing the visualization!</p>
                </div>
            </div>
        `;
    }

    showError(message) {
        const vizArea = document.getElementById('visualization');
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error';
        errorDiv.innerHTML = `
            <h4><i class="fas fa-exclamation-triangle"></i> Error</h4>
            <p>${message}</p>
        `;
        vizArea.insertBefore(errorDiv, vizArea.firstChild);
        
        // Remove error message after 5 seconds
        setTimeout(() => {
            if (errorDiv.parentNode) {
                errorDiv.parentNode.removeChild(errorDiv);
            }
        }, 5000);
    }

    showSuccess(message) {
        const vizArea = document.getElementById('visualization');
        const successDiv = document.createElement('div');
        successDiv.className = 'success';
        successDiv.innerHTML = `
            <h4><i class="fas fa-check-circle"></i> Success</h4>
            <p>${message}</p>
        `;
        vizArea.insertBefore(successDiv, vizArea.firstChild);
        
        // Remove success message after 3 seconds
        setTimeout(() => {
            if (successDiv.parentNode) {
                successDiv.parentNode.removeChild(successDiv);
            }
        }, 3000);
    }

    enableControls() {
        document.getElementById('playBtn').disabled = false;
        document.getElementById('stepBtn').disabled = false;
        document.getElementById('resetBtn').disabled = false;
        document.getElementById('analyzeBtn').disabled = false;
    }

    disableControls() {
        document.getElementById('playBtn').disabled = true;
        document.getElementById('pauseBtn').disabled = true;
        document.getElementById('stepBtn').disabled = true;
        document.getElementById('resetBtn').disabled = true;
    }
}

// Initialize the visualizer when the page loads
document.addEventListener('DOMContentLoaded', () => {
    new DSAVisualizer();
});
    </script>
